<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediControl · Control de medicamentos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
</style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ============================================================
   MediControl — Control personal de medicamentos
   Los datos se guardan en ESTE navegador (localStorage).
   ============================================================ */

const KEY = "medicontrol-data-v1";
const GAP_MIN = 30; // separación mínima entre tomas de distintos medicamentos
const FRECUENCIAS = [4, 6, 8, 12, 24];

const PRESENTACIONES = ["Tabletas","Cápsulas","Jarabe / Suspensión","Gotas","Inyectable","Sobres","Crema / Ungüento","Inhalador","Otro"];

const CATEGORIAS = [
  { id: "analgesico", label: "Analgésico / Dolor", cls: "bg-rose-100 text-rose-700 border-rose-200" },
  { id: "antibiotico", label: "Antibiótico", cls: "bg-sky-100 text-sky-700 border-sky-200" },
  { id: "antiinflamatorio", label: "Antiinflamatorio", cls: "bg-orange-100 text-orange-700 border-orange-200" },
  { id: "gastro", label: "Gastroprotector / Digestivo", cls: "bg-lime-100 text-lime-700 border-lime-200" },
  { id: "cardio", label: "Cardiovascular / Presión", cls: "bg-red-100 text-red-700 border-red-200" },
  { id: "diabetes", label: "Diabetes / Glucosa", cls: "bg-violet-100 text-violet-700 border-violet-200" },
  { id: "alergia", label: "Antihistamínico / Alergia", cls: "bg-teal-100 text-teal-700 border-teal-200" },
  { id: "respiratorio", label: "Respiratorio", cls: "bg-cyan-100 text-cyan-700 border-cyan-200" },
  { id: "vitamina", label: "Vitamina / Suplemento", cls: "bg-amber-100 text-amber-700 border-amber-200" },
  { id: "otro", label: "Otro", cls: "bg-slate-100 text-slate-600 border-slate-200" },
];

const DIAS_SEM = ["dom","lun","mar","mié","jue","vie","sáb"];
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const MESES_CORTO = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

/* ---------- utilidades ---------- */
const pad = (n) => String(n).padStart(2, "0");
const timeToMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
const minToTime = (m) => { const mm = ((m % 1440) + 1440) % 1440; return pad(Math.floor(mm / 60)) + ":" + pad(mm % 60); };
const fmt12 = (t) => {
  const m = timeToMin(t); let h = Math.floor(m / 60); const mm = m % 60;
  const suf = h >= 12 ? "p.m." : "a.m."; h = h % 12; if (h === 0) h = 12;
  return h + ":" + pad(mm) + " " + suf;
};
const todayStr = () => { const d = new Date(); return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); };
const parseDate = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const dateToStr = (d) => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
const addDays = (s, n) => { const d = parseDate(s); d.setDate(d.getDate() + n); return dateToStr(d); };
const fmtDate = (s) => { const d = parseDate(s); return DIAS_SEM[d.getDay()] + " " + d.getDate() + " " + MESES_CORTO[d.getMonth()]; };
const fmtDateLong = (s) => { const d = parseDate(s); return d.getDate() + " de " + MESES[d.getMonth()] + " de " + d.getFullYear(); };

const genSerie = (startMin, freq) => {
  const n = Math.round(24 / freq); const arr = [];
  for (let i = 0; i < n; i++) arr.push((startMin + i * freq * 60) % 1440);
  return arr.sort((a, b) => a - b);
};
const circDist = (a, b) => { const d = Math.abs(a - b) % 1440; return Math.min(d, 1440 - d); };
const detectarChoques = (serie, ocupados) => {
  const out = [];
  for (const s of serie) for (const o of ocupados) if (circDist(s, o.min) < GAP_MIN) out.push({ hora: minToTime(s), con: o });
  return out;
};
const fechaFin = (med) => addDays(med.startDate, med.durationDays - 1);
const doseKey = (id, fecha, hora) => id + "|" + fecha + "|" + hora;
const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
const diasTratamiento = (med) => { const out = []; for (let i = 0; i < med.durationDays; i++) out.push(addDays(med.startDate, i)); return out; };
const catInfo = (id) => CATEGORIAS.find((c) => c.id === id) || CATEGORIAS[CATEGORIAS.length - 1];
const fmtMoney = (n) => "$" + (Math.round((Number(n) || 0) * 100) / 100).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const diasCadTexto = (cad) => {
  if (!cad) return "—";
  const dias = Math.round((parseDate(cad) - parseDate(todayStr())) / 86400000);
  if (dias < 0) return "VENCIDO hace " + Math.abs(dias) + " días (" + fmtDate(cad) + ")";
  if (dias === 0) return "Vence HOY (" + fmtDate(cad) + ")";
  return "Faltan " + dias + " días (" + fmtDate(cad) + ")";
};

/* ---------- iconos ---------- */
const Sv = ({ d, cls, extra }) => (
  <svg className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {extra}{d && <path d={d} />}
  </svg>
);
const ICircle = ({ cls }) => <Sv cls={cls} extra={<circle cx="12" cy="12" r="10" />} />;
const ICheckCircle = ({ cls }) => <Sv cls={cls} d="m9 12 2 2 4-4" extra={<circle cx="12" cy="12" r="10" />} />;
const IChevD = ({ cls }) => <Sv cls={cls} d="m6 9 6 6 6-6" />;
const IChevR = ({ cls }) => <Sv cls={cls} d="m9 18 6-6-6-6" />;
const IPlus = ({ cls }) => <Sv cls={cls} d="M12 5v14M5 12h14" />;
const IClock = ({ cls }) => <Sv cls={cls} d="M12 6v6l4 2" extra={<circle cx="12" cy="12" r="10" />} />;
const IWarn = ({ cls }) => <Sv cls={cls} d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />;
const ITrash = ({ cls }) => <Sv cls={cls} d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />;
const IPill = ({ cls }) => <Sv cls={cls} d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7ZM8.5 8.5l7 7" />;
const IBox = ({ cls }) => <Sv cls={cls} d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Zm-18-.27 9 5.15 9-5.15M12 22V12" />;
const ICal = ({ cls }) => <Sv cls={cls} d="M8 2v4m8-4v4M3 10h18" extra={<rect x="3" y="4" width="18" height="18" rx="2" />} />;
const IList = ({ cls }) => <Sv cls={cls} d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />;
const IChart = ({ cls }) => <Sv cls={cls} d="M3 3v16a2 2 0 0 0 2 2h16M18 17V9m-5 8V5M8 17v-3" />;
const ISteth = ({ cls }) => <Sv cls={cls} d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4" extra={<circle cx="20" cy="10" r="2" />} />;
const IPause = ({ cls }) => <Sv cls={cls} d="M10 15V9m4 6V9" extra={<circle cx="12" cy="12" r="10" />} />;
const IRotate = ({ cls }) => <Sv cls={cls} d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5" />;
const ISun = ({ cls }) => <Sv cls={cls} d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" extra={<circle cx="12" cy="12" r="4" />} />;
const IMoon = ({ cls }) => <Sv cls={cls} d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />;
const ICheckCheck = ({ cls }) => <Sv cls={cls} d="M18 6 7 17l-5-5m20-2-7.5 7.5L13 16" />;
const IBarcode = ({ cls }) => <Sv cls={cls} d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14" />;
const ICamera = ({ cls }) => <Sv cls={cls} d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z" extra={<circle cx="12" cy="13" r="3" />} />;
const ISearch = ({ cls }) => <Sv cls={cls} d="m21 21-4.3-4.3" extra={<circle cx="11" cy="11" r="8" />} />;
const IMinus = ({ cls }) => <Sv cls={cls} d="M5 12h14" />;
const IActivity = ({ cls }) => <Sv cls={cls} d="M22 12h-4l-3 9L9 3l-3 9H2" />;
const IDrop = ({ cls }) => <Sv cls={cls} d="M12 2.7 6.3 8.4a8 8 0 1 0 11.4 0L12 2.7Z" />;
const IScale = ({ cls }) => <Sv cls={cls} d="M12 3v3m-6.5 2 2 5a3 3 0 0 1-4 0l2-5Zm13 0 2 5a3 3 0 0 1-4 0l2-5ZM7 21h10M12 6l-6.5 2M12 6l6.5 2M12 6v15" />;
const ILung = ({ cls }) => <Sv cls={cls} d="M12 4v8m0-4c0 4-2 6-5 8-2 1.3-4 .7-4-2 0-4 2-9 5-9 2 0 3 1 4 3Zm0 0c0 4 2 6 5 8 2 1.3 4 .7 4-2 0-4-2-9-5-9-2 0-3 1-4 3Z" />;
const IX = ({ cls }) => <Sv cls={cls} d="M18 6 6 18M6 6l12 12" />;
const IEdit = ({ cls }) => <Sv cls={cls} d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3Z" />;
const IUser = ({ cls }) => <Sv cls={cls} d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" extra={<circle cx="12" cy="7" r="4" />} />;
const IDownload = ({ cls }) => <Sv cls={cls} d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />;
const IUpload = ({ cls }) => <Sv cls={cls} d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />;
const IFood = ({ cls }) => <Sv cls={cls} d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />;
const DIAS_FULL = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];

/* ============================================================ */
function MediControl() {
  const [data, setData] = useState({ meds: [], taken: {}, inv: [], vitals: { readings: [], horarios: null }, perfil: {}, catalogo: {}, comidas: [], agua: {} });
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("hoy");
  const [expanded, setExpanded] = useState(null);
  const [openDay, setOpenDay] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [toast, setToast] = useState(null);
  const [editId, setEditId] = useState(null);
  const now = new Date();
  const hoy = todayStr();

  useEffect(() => {
    try {
      const v = localStorage.getItem(KEY);
      if (v) { const p = JSON.parse(v); setData({ meds: p.meds || [], taken: p.taken || {}, inv: p.inv || [], vitals: p.vitals || { readings: [], horarios: null }, perfil: p.perfil || {}, catalogo: p.catalogo || {}, comidas: p.comidas || [], agua: p.agua || {} }); }
    } catch (e) { /* sin datos previos */ }
    setLoaded(true);
  }, []);

  const persist = (next) => {
    setData(next);
    try { localStorage.setItem(KEY, JSON.stringify(next)); }
    catch (e) { console.error("No se pudo guardar", e); }
  };

  const avisar = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const toggleToma = (id, fecha, hora) => {
    const k = doseKey(id, fecha, hora);
    const taken = { ...data.taken };
    if (taken[k]) delete taken[k]; else taken[k] = new Date().toISOString();
    persist({ ...data, taken });
  };

  const cambiarEstado = (id, status) => {
    persist({ ...data, meds: data.meds.map((m) => (m.id === id ? { ...m, status } : m)) });
    avisar(status === "activo" ? "Tratamiento reactivado" : status === "terminado" ? "Tratamiento marcado como terminado" : "Tratamiento suspendido");
  };

  const eliminarMed = (id) => {
    const taken = {};
    for (const k of Object.keys(data.taken)) if (!k.startsWith(id + "|")) taken[k] = data.taken[k];
    persist({ ...data, meds: data.meds.filter((m) => m.id !== id), taken });
    setConfirmDel(null);
    avisar("Medicamento eliminado");
  };

  const guardarMed = (med) => {
    const existe = data.meds.some((m) => m.id === med.id);
    persist({ ...data, meds: existe ? data.meds.map((m) => (m.id === med.id ? med : m)) : [...data.meds, med] });
    setEditId(null);
    setTab("meds");
    setExpanded(med.id);
    avisar(existe ? "Medicamento actualizado" : "Medicamento agregado al historial");
  };

  const editarMed = (id) => { setEditId(id); setTab("agregar"); };

  const ocupados = useMemo(() => {
    const out = [];
    for (const m of data.meds) {
      if (m.status !== "activo" || m.id === editId) continue;
      for (const t of m.times) out.push({ min: timeToMin(t), med: m.name });
    }
    return out;
  }, [data.meds, editId]);

  const tomasHoy = useMemo(() => {
    const out = [];
    for (const m of data.meds) {
      if (m.status !== "activo") continue;
      if (hoy < m.startDate || hoy > fechaFin(m)) continue;
      for (const t of m.times) out.push({ med: m, hora: t, done: !!data.taken[doseKey(m.id, hoy, t)] });
    }
    return out.sort((a, b) => timeToMin(a.hora) - timeToMin(b.hora));
  }, [data, hoy]);

  const nowMin = now.getHours() * 60 + now.getMinutes();

  if (!loaded) return (
    <div className="min-h-screen flex items-center justify-center text-slate-500">
      <IPill cls="w-6 h-6 mr-2 animate-pulse" /> Cargando tu historial…
    </div>
  );

  const activos = data.meds.filter((m) => m.status === "activo");
  const inactivos = data.meds.filter((m) => m.status !== "activo");

  const tabs = [
    { id: "hoy", label: "Hoy", Icon: IClock },
    { id: "meds", label: "Medicamentos", Icon: IList },
    { id: "agregar", label: "Agregar", Icon: IPlus },
    { id: "inv", label: "Inventario", Icon: IBox },
    { id: "salud", label: "Salud", Icon: IActivity },
    { id: "comidas", label: "Comidas", Icon: IFood },
    { id: "reporte", label: "Reporte", Icon: IChart },
  ];

  return (
    <div className="min-h-screen text-slate-800">
      <header className="bg-emerald-800 text-white">
        <div className="max-w-3xl mx-auto px-4 py-5">
          <div className="flex items-center gap-3">
            <div className="bg-emerald-700 rounded-xl p-2"><ISteth cls="w-6 h-6" /></div>
            <div>
              <h1 className="text-xl font-bold tracking-tight">MediControl</h1>
              <p className="text-emerald-200 text-sm">{data.perfil && data.perfil.nombre ? data.perfil.nombre + " · " : ""}Control personal de medicamentos · {fmtDateLong(hoy)}</p>
            </div>
          </div>
        </div>
        <div className="max-w-3xl mx-auto px-4 flex gap-1 overflow-x-auto">
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={"flex items-center gap-1.5 px-4 py-2.5 text-sm font-medium rounded-t-lg whitespace-nowrap transition-colors " +
                (tab === t.id ? "bg-slate-50 text-emerald-800" : "text-emerald-100 hover:bg-emerald-700")}>
              <t.Icon cls="w-4 h-4" /> {t.label}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-6 pb-24">
        {tab === "hoy" && (
          <div>
            <ResumenHoy tomas={tomasHoy} />
            {tomasHoy.length === 0 ? (
              <VacioCard titulo="Sin tomas programadas para hoy"
                texto="Agrega un medicamento con su horario y aquí aparecerán las tomas del día para que las confirmes."
                accion={() => setTab("agregar")} accionLabel="Agregar medicamento" />
            ) : (
              <div className="space-y-2 mt-4">
                {tomasHoy.map((t, i) => {
                  const tMin = timeToMin(t.hora);
                  const pasada = tMin < nowMin && !t.done;
                  const cat = catInfo(t.med.category);
                  return (
                    <button key={i} onClick={() => toggleToma(t.med.id, hoy, t.hora)}
                      className={"w-full flex items-center gap-3 rounded-2xl border p-3.5 text-left transition-all " +
                        (t.done ? "bg-emerald-50 border-emerald-200" : pasada ? "bg-amber-50 border-amber-200" : "bg-white border-slate-200 hover:border-emerald-300")}>
                      {t.done ? <ICheckCircle cls="w-7 h-7 text-emerald-600 shrink-0" /> : <ICircle cls={"w-7 h-7 shrink-0 " + (pasada ? "text-amber-400" : "text-slate-300")} />}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className={"font-semibold " + (t.done ? "text-emerald-800" : "")}>{t.med.name}</span>
                          <span className={"text-xs px-2 py-0.5 rounded-full border " + cat.cls}>{cat.label}</span>
                        </div>
                        <div className="text-sm text-slate-500">{t.med.dose} · {t.med.presentation}</div>
                        {pasada && <div className="text-xs text-amber-700 mt-0.5 flex items-center gap-1"><IWarn cls="w-3 h-3" /> Toma pendiente — la hora ya pasó</div>}
                      </div>
                      <div className="text-right shrink-0">
                        <div className={"font-bold text-lg " + (t.done ? "text-emerald-700" : "text-slate-700")}>{fmt12(t.hora)}</div>
                        <div className="text-xs text-slate-400">{t.done ? "tomado ✓" : "clic para confirmar"}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {tab === "meds" && (
          <div>
            {data.meds.length === 0 && (
              <VacioCard titulo="Aún no tienes medicamentos registrados"
                texto="Registra lo que te recetó el médico: nombre, dosis, frecuencia y motivo. La herramienta calcula el horario y las cajas necesarias."
                accion={() => setTab("agregar")} accionLabel="Agregar el primero" />
            )}
            {activos.length > 0 && (
              <section>
                <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">En tratamiento ({activos.length})</h2>
                <div className="space-y-3">
                  {activos.map((m) => (
                    <MedCard key={m.id} med={m} data={data} hoy={hoy} onEditar={editarMed}
                      expanded={expanded === m.id} onExpand={() => setExpanded(expanded === m.id ? null : m.id)}
                      openDay={openDay} setOpenDay={setOpenDay} toggleToma={toggleToma} cambiarEstado={cambiarEstado}
                      confirmDel={confirmDel} setConfirmDel={setConfirmDel} eliminarMed={eliminarMed} />
                  ))}
                </div>
              </section>
            )}
            {inactivos.length > 0 && (
              <section className="mt-6">
                <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">Historial · terminados y suspendidos ({inactivos.length})</h2>
                <div className="space-y-3">
                  {inactivos.map((m) => (
                    <MedCard key={m.id} med={m} data={data} hoy={hoy} onEditar={editarMed}
                      expanded={expanded === m.id} onExpand={() => setExpanded(expanded === m.id ? null : m.id)}
                      openDay={openDay} setOpenDay={setOpenDay} toggleToma={toggleToma} cambiarEstado={cambiarEstado}
                      confirmDel={confirmDel} setConfirmDel={setConfirmDel} eliminarMed={eliminarMed} />
                  ))}
                </div>
              </section>
            )}
          </div>
        )}

        {tab === "agregar" && <FormAgregar ocupados={ocupados} onGuardar={guardarMed} medEditar={data.meds.find((m) => m.id === editId) || null} onCancelar={() => { setEditId(null); setTab("meds"); }} />}
        {tab === "inv" && <Inventario data={data} persist={persist} avisar={avisar} />}
        {tab === "salud" && <Salud data={data} persist={persist} avisar={avisar} hoy={hoy} />}
        {tab === "comidas" && <Comidas data={data} persist={persist} avisar={avisar} hoy={hoy} />}
        {tab === "reporte" && <Reporte data={data} now={now} avisar={avisar} />}
      </main>

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2">
          <ICheckCheck cls="w-4 h-4 text-emerald-400" /> {toast}
        </div>
      )}
    </div>
  );
}

function ResumenHoy({ tomas }) {
  const total = tomas.length;
  const hechas = tomas.filter((t) => t.done).length;
  const pct = total ? Math.round((hechas / total) * 100) : 0;
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-4">
      <div className="flex items-center justify-between mb-2">
        <div className="font-semibold text-slate-700">Avance de hoy</div>
        <div className="text-sm text-slate-500">{hechas} de {total} tomas · {pct}%</div>
      </div>
      <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
        <div className="h-full bg-emerald-500 rounded-full transition-all" style={{ width: pct + "%" }} />
      </div>
      {total > 0 && hechas === total && (
        <div className="mt-2 text-sm text-emerald-700 flex items-center gap-1.5"><ICheckCircle cls="w-4 h-4" /> ¡Completaste todas tus tomas de hoy!</div>
      )}
    </div>
  );
}

function VacioCard({ titulo, texto, accion, accionLabel }) {
  return (
    <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-8 text-center mt-4">
      <IPill cls="w-10 h-10 text-slate-300 mx-auto mb-3" />
      <div className="font-semibold text-slate-600">{titulo}</div>
      <p className="text-sm text-slate-500 mt-1 max-w-md mx-auto">{texto}</p>
      <button onClick={accion} className="mt-4 inline-flex items-center gap-1.5 bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-medium px-4 py-2 rounded-xl">
        <IPlus cls="w-4 h-4" /> {accionLabel}
      </button>
    </div>
  );
}

function MedCard({ med, data, hoy, onEditar, expanded, onExpand, openDay, setOpenDay, toggleToma, cambiarEstado, confirmDel, setConfirmDel, eliminarMed }) {
  const cat = catInfo(med.category);
  const fin = fechaFin(med);
  const dias = diasTratamiento(med);
  const tomasPorDia = med.times.length;
  const totalTomas = tomasPorDia * med.durationDays;
  const totalUnidades = totalTomas * (med.unitsPerDose || 1);
  const cajas = med.unitsPerBox ? Math.ceil(totalUnidades / med.unitsPerBox) : null;
  const tomadas = dias.reduce((acc, f) => acc + med.times.filter((t) => data.taken[doseKey(med.id, f, t)]).length, 0);
  const pct = totalTomas ? Math.round((tomadas / totalTomas) * 100) : 0;
  const terminadoPorFecha = hoy > fin;

  const estadoBadge = med.status === "activo"
    ? (terminadoPorFecha
        ? <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">fechas cumplidas</span>
        : <span className="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200">activo</span>)
    : med.status === "terminado"
      ? <span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200">terminado</span>
      : <span className="text-xs px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 border border-orange-200">suspendido</span>;

  return (
    <div className={"bg-white rounded-2xl border border-slate-200 " + (med.status === "activo" ? "" : "opacity-80")}>
      <button onClick={onExpand} className="w-full text-left p-4 flex items-start gap-3">
        <div className={"rounded-xl p-2 border shrink-0 " + cat.cls}><IPill cls="w-5 h-5" /></div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-slate-800">{med.name}</span>
            <span className={"text-xs px-2 py-0.5 rounded-full border " + cat.cls}>{cat.label}</span>
            {estadoBadge}
          </div>
          <div className="text-sm text-slate-500 mt-0.5">
            {med.dose} · {med.presentation} · cada {med.freqHours} h ({tomasPorDia} {tomasPorDia === 1 ? "toma" : "tomas"}/día)
          </div>
          {med.purpose && <div className="text-sm text-slate-600 mt-1"><span className="font-medium text-slate-500">Para:</span> {med.purpose}</div>}
          <div className="flex items-center gap-2 mt-2">
            <div className="h-2 flex-1 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-emerald-500 rounded-full" style={{ width: pct + "%" }} />
            </div>
            <span className="text-xs text-slate-500 shrink-0">{tomadas}/{totalTomas} tomas · {pct}%</span>
          </div>
        </div>
        {expanded ? <IChevD cls="w-5 h-5 text-slate-400 shrink-0 mt-1" /> : <IChevR cls="w-5 h-5 text-slate-400 shrink-0 mt-1" />}
      </button>

      {expanded && (
        <div className="border-t border-slate-100 p-4 space-y-4">
          <div className="grid grid-cols-2 gap-3 text-sm">
            <Dato Icon={ICal} label="Inicio" valor={fmtDate(med.startDate)} />
            <Dato Icon={ICal} label="Fin del tratamiento" valor={fmtDate(fin)} />
            <Dato Icon={IClock} label="Duración" valor={med.durationDays + " días · " + totalTomas + " tomas totales"} />
            <Dato Icon={IBox} label="Cantidad necesaria"
              valor={cajas ? cajas + (cajas === 1 ? " caja/frasco" : " cajas/frascos") + " (" + totalUnidades + " unid.)" : totalUnidades + " unidades en total"} />
          </div>

          <div>
            <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Horario diario</div>
            <div className="flex flex-wrap gap-2">
              {med.times.map((t) => {
                const m = timeToMin(t);
                const nocturna = m < 360 || m >= 1290;
                return (
                  <span key={t} className="inline-flex items-center gap-1.5 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm font-medium px-3 py-1 rounded-full">
                    {nocturna ? <IMoon cls="w-3.5 h-3.5" /> : <ISun cls="w-3.5 h-3.5" />} {fmt12(t)}
                  </span>
                );
              })}
            </div>
          </div>

          {med.notes && (
            <div className="bg-sky-50 border border-sky-100 rounded-xl p-3 text-sm text-sky-900">
              <div className="font-semibold flex items-center gap-1.5 mb-0.5"><ISteth cls="w-4 h-4" /> Indicaciones del médico</div>
              {med.notes}
            </div>
          )}
          {med.doctor && <div className="text-xs text-slate-500">Recetado por: {med.doctor}</div>}

          <div>
            <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Calendario del tratamiento · marca cada toma</div>
            <div className="max-h-72 overflow-y-auto rounded-xl border border-slate-200 divide-y divide-slate-100">
              {dias.map((f, idx) => {
                const done = med.times.filter((t) => data.taken[doseKey(med.id, f, t)]).length;
                const esHoy = f === hoy;
                const abierto = openDay === med.id + "|" + f;
                return (
                  <div key={f} className={esHoy ? "bg-emerald-50" : "bg-white"}>
                    <button onClick={() => setOpenDay(abierto ? null : med.id + "|" + f)}
                      className="w-full flex items-center justify-between px-3 py-2 text-sm">
                      <span className="flex items-center gap-2">
                        {abierto ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
                        <span className={"font-medium " + (esHoy ? "text-emerald-800" : "text-slate-700")}>
                          Día {idx + 1} · {fmtDate(f)} {esHoy && "· HOY"}
                        </span>
                      </span>
                      <span className={"text-xs px-2 py-0.5 rounded-full " + (done === med.times.length ? "bg-emerald-100 text-emerald-700" : done > 0 ? "bg-amber-100 text-amber-700" : "bg-slate-100 text-slate-500")}>
                        {done}/{med.times.length}
                      </span>
                    </button>
                    {abierto && (
                      <div className="px-9 pb-2.5 flex flex-wrap gap-2">
                        {med.times.map((t) => {
                          const ok = !!data.taken[doseKey(med.id, f, t)];
                          return (
                            <button key={t} onClick={() => toggleToma(med.id, f, t)}
                              className={"inline-flex items-center gap-1.5 text-sm px-3 py-1 rounded-full border transition-colors " +
                                (ok ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                              {ok ? <ICheckCircle cls="w-4 h-4" /> : <ICircle cls="w-4 h-4" />} {fmt12(t)}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="flex flex-wrap gap-2 pt-1">
            <BtnSec onClick={() => onEditar(med.id)} Icon={IEdit}>Editar</BtnSec>
            {med.status === "activo" ? (
              <React.Fragment>
                <BtnSec onClick={() => cambiarEstado(med.id, "terminado")} Icon={ICheckCircle}>Marcar terminado</BtnSec>
                <BtnSec onClick={() => cambiarEstado(med.id, "suspendido")} Icon={IPause}>Suspender</BtnSec>
              </React.Fragment>
            ) : (
              <BtnSec onClick={() => cambiarEstado(med.id, "activo")} Icon={IRotate}>Volver a activo</BtnSec>
            )}
            {confirmDel === med.id ? (
              <span className="inline-flex items-center gap-2 text-sm">
                <span className="text-rose-700">¿Eliminar definitivamente?</span>
                <button onClick={() => eliminarMed(med.id)} className="px-3 py-1.5 rounded-lg bg-rose-600 text-white text-sm font-medium">Sí, eliminar</button>
                <button onClick={() => setConfirmDel(null)} className="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 text-sm">Cancelar</button>
              </span>
            ) : (
              <BtnSec onClick={() => setConfirmDel(med.id)} Icon={ITrash} danger>Eliminar</BtnSec>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function Dato({ Icon, label, valor }) {
  return (
    <div className="bg-slate-50 rounded-xl p-2.5">
      <div className="text-xs text-slate-500 flex items-center gap-1"><Icon cls="w-3.5 h-3.5" /> {label}</div>
      <div className="font-semibold text-slate-700 text-sm mt-0.5">{valor}</div>
    </div>
  );
}

function BtnSec({ onClick, Icon, children, danger }) {
  return (
    <button onClick={onClick}
      className={"inline-flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg border transition-colors " +
        (danger ? "border-rose-200 text-rose-600 hover:bg-rose-50" : "border-slate-300 text-slate-600 hover:bg-slate-50")}>
      <Icon cls="w-4 h-4" /> {children}
    </button>
  );
}

/* ============================================================ */
function FormAgregar({ ocupados, onGuardar, medEditar, onCancelar }) {
  const [f, setF] = useState({
    name: "", presentation: PRESENTACIONES[0], dose: "", category: "analgesico",
    purpose: "", notes: "", doctor: "",
    freqHours: 8, durationDays: 7, startDate: todayStr(),
    unitsPerDose: 1, unitsPerBox: 10,
  });
  const [startTime, setStartTime] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    if (medEditar) {
      setF({
        name: medEditar.name, presentation: medEditar.presentation, dose: medEditar.dose,
        category: medEditar.category, purpose: medEditar.purpose || "", notes: medEditar.notes || "",
        doctor: medEditar.doctor || "", freqHours: medEditar.freqHours, durationDays: medEditar.durationDays,
        startDate: medEditar.startDate, unitsPerDose: medEditar.unitsPerDose, unitsPerBox: medEditar.unitsPerBox,
      });
      setStartTime(timeToMin(medEditar.times[0]));
      setErr(null);
    }
  }, [medEditar]);

  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const opciones = useMemo(() => {
    const out = [];
    for (let m = 0; m < 1440; m += 30) {
      const serie = genSerie(m, f.freqHours);
      const choques = detectarChoques(serie, ocupados);
      out.push({ min: m, hora: minToTime(m), libre: choques.length === 0, choques });
    }
    return out;
  }, [f.freqHours, ocupados]);

  const serie = startTime !== null ? genSerie(startTime, f.freqHours) : [];
  const choquesSel = startTime !== null ? detectarChoques(serie, ocupados) : [];

  const tomasDia = Math.round(24 / f.freqHours);
  const totalTomas = tomasDia * (Number(f.durationDays) || 0);
  const totalUnid = totalTomas * (Number(f.unitsPerDose) || 1);
  const cajas = Number(f.unitsPerBox) > 0 ? Math.ceil(totalUnid / Number(f.unitsPerBox)) : null;
  const fin = f.startDate && f.durationDays ? addDays(f.startDate, Number(f.durationDays) - 1) : null;

  const sugeridas = useMemo(() => {
    const base = 480;
    return opciones.filter((o) => o.libre)
      .slice().sort((a, b) => circDist(a.min, base) - circDist(b.min, base))
      .slice(0, 4);
  }, [opciones]);

  const guardar = () => {
    if (!f.name.trim()) return setErr("Escribe el nombre del medicamento.");
    if (!f.dose.trim()) return setErr("Escribe la dosis (ej. 500 mg, 1 tableta, 10 ml).");
    if (!f.durationDays || Number(f.durationDays) < 1) return setErr("Indica cuántos días dura el tratamiento.");
    if (startTime === null) return setErr("Selecciona la hora de la primera toma para generar el horario.");
    setErr(null);
    onGuardar({
      id: medEditar ? medEditar.id : uid(), name: f.name.trim(), presentation: f.presentation, dose: f.dose.trim(),
      category: f.category, purpose: f.purpose.trim(), notes: f.notes.trim(), doctor: f.doctor.trim(),
      freqHours: Number(f.freqHours), durationDays: Number(f.durationDays), startDate: f.startDate,
      times: serie.map(minToTime), unitsPerDose: Number(f.unitsPerDose) || 1, unitsPerBox: Number(f.unitsPerBox) || 0,
      status: medEditar ? medEditar.status : "activo", createdAt: medEditar ? medEditar.createdAt : new Date().toISOString(),
    });
    setF({ name: "", presentation: PRESENTACIONES[0], dose: "", category: "analgesico", purpose: "", notes: "", doctor: "", freqHours: 8, durationDays: 7, startDate: todayStr(), unitsPerDose: 1, unitsPerBox: 10 });
    setStartTime(null);
  };

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  return (
    <div className="space-y-5">
      {medEditar && (
        <div className="bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 flex items-center justify-between gap-2">
          <span className="text-sm text-amber-800 font-semibold flex items-center gap-2"><IEdit cls="w-4 h-4" /> Editando: {medEditar.name}</span>
          <button onClick={onCancelar} className="text-xs px-3 py-1.5 rounded-lg bg-white border border-amber-300 text-amber-800 hover:bg-amber-100">Cancelar edición</button>
        </div>
      )}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><ISteth cls="w-5 h-5 text-emerald-700" /> Datos de la receta</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label className={labelCls}>Nombre del medicamento *</label>
            <input className={inputCls} placeholder="Ej. Paracetamol" value={f.name} onChange={(e) => set("name", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Dosis *</label>
            <input className={inputCls} placeholder="Ej. 500 mg · 1 tableta · 10 ml" value={f.dose} onChange={(e) => set("dose", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Presentación</label>
            <select className={inputCls} value={f.presentation} onChange={(e) => set("presentation", e.target.value)}>
              {PRESENTACIONES.map((p) => <option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label className={labelCls}>Tipo / función</label>
            <select className={inputCls} value={f.category} onChange={(e) => set("category", e.target.value)}>
              {CATEGORIAS.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label className={labelCls}>¿Para qué te lo recetaron? (motivo)</label>
          <input className={inputCls} placeholder="Ej. Dolor de cabeza y fiebre por infección de garganta" value={f.purpose} onChange={(e) => set("purpose", e.target.value)} />
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label className={labelCls}>Indicaciones del médico</label>
            <textarea className={inputCls} rows={2} placeholder="Ej. Tomar con alimentos, no combinar con alcohol…" value={f.notes} onChange={(e) => set("notes", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Médico que lo recetó (opcional)</label>
            <input className={inputCls} placeholder="Ej. Dra. López — Medicina general" value={f.doctor} onChange={(e) => set("doctor", e.target.value)} />
          </div>
        </div>
      </section>

      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><IClock cls="w-5 h-5 text-emerald-700" /> Frecuencia y duración</h2>
        <div>
          <label className={labelCls}>¿Cada cuántas horas?</label>
          <div className="flex flex-wrap gap-2">
            {FRECUENCIAS.map((h) => (
              <button key={h} onClick={() => { set("freqHours", h); setStartTime(null); }}
                className={"px-4 py-2 rounded-xl text-sm font-semibold border transition-colors " +
                  (f.freqHours === h ? "bg-emerald-700 border-emerald-700 text-white" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                cada {h} h
              </button>
            ))}
          </div>
          <div className="text-xs text-slate-500 mt-1">= {tomasDia} {tomasDia === 1 ? "toma" : "tomas"} al día</div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className={labelCls}>Días de tratamiento</label>
            <input type="number" min="1" className={inputCls} value={f.durationDays} onChange={(e) => set("durationDays", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Fecha de inicio</label>
            <input type="date" className={inputCls} value={f.startDate} onChange={(e) => set("startDate", e.target.value)} />
          </div>
        </div>
        {fin && (
          <div className="text-sm text-slate-600 bg-slate-50 rounded-xl px-3 py-2 flex items-center gap-2">
            <ICal cls="w-4 h-4 text-emerald-700" />
            <span>Del <b>{fmtDate(f.startDate)}</b> al <b>{fmtDate(fin)}</b> · {totalTomas} tomas en total</span>
          </div>
        )}
      </section>

      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><ISun cls="w-5 h-5 text-emerald-700" /> Horario de tomas</h2>
        <p className="text-sm text-slate-500">Elige la hora de la <b>primera toma</b>. El sistema calcula las demás y detecta si chocan (menos de {GAP_MIN} min) con tus otros medicamentos activos.</p>

        {sugeridas.length > 0 && (
          <div>
            <label className={labelCls}>Sugerencias sin choques</label>
            <div className="flex flex-wrap gap-2">
              {sugeridas.map((o) => (
                <button key={o.min} onClick={() => setStartTime(o.min)}
                  className={"px-3 py-1.5 rounded-full text-sm font-medium border " +
                    (startTime === o.min ? "bg-emerald-700 border-emerald-700 text-white" : "bg-emerald-50 border-emerald-200 text-emerald-800 hover:bg-emerald-100")}>
                  {fmt12(o.hora)} ✓
                </button>
              ))}
            </div>
          </div>
        )}

        <div>
          <label className={labelCls}>Todas las horas (verde = libre · ámbar = choca con otro medicamento)</label>
          <div className="grid grid-cols-4 sm:grid-cols-6 gap-1.5 max-h-48 overflow-y-auto pr-1">
            {opciones.map((o) => (
              <button key={o.min} onClick={() => setStartTime(o.min)}
                title={o.libre ? "Hora libre" : "Choca con: " + [...new Set(o.choques.map((c) => c.con.med))].join(", ")}
                className={"text-xs px-1 py-1.5 rounded-lg border font-medium transition-colors " +
                  (startTime === o.min ? "bg-emerald-700 border-emerald-700 text-white" :
                   o.libre ? "bg-white border-emerald-200 text-emerald-800 hover:bg-emerald-50" :
                   "bg-amber-50 border-amber-200 text-amber-700")}>
                {fmt12(o.hora)}
              </button>
            ))}
          </div>
        </div>

        {startTime !== null && (
          <div className={"rounded-xl border p-3 " + (choquesSel.length ? "bg-amber-50 border-amber-200" : "bg-emerald-50 border-emerald-200")}>
            <div className="text-sm font-semibold mb-1.5 flex items-center gap-1.5">
              {choquesSel.length
                ? <React.Fragment><IWarn cls="w-4 h-4 text-amber-600" /> <span className="text-amber-800">Horario con choques — considera moverlo 30 min o más</span></React.Fragment>
                : <React.Fragment><ICheckCircle cls="w-4 h-4 text-emerald-600" /> <span className="text-emerald-800">Horario generado sin choques</span></React.Fragment>}
            </div>
            <div className="flex flex-wrap gap-2">
              {serie.map((m) => (
                <span key={m} className="bg-white border border-slate-200 text-slate-700 text-sm font-semibold px-3 py-1 rounded-full">{fmt12(minToTime(m))}</span>
              ))}
            </div>
            {choquesSel.length > 0 && (
              <ul className="mt-2 text-xs text-amber-800 space-y-0.5">
                {choquesSel.map((c, i) => <li key={i}>• {fmt12(c.hora)} queda muy cerca de {c.con.med} ({fmt12(minToTime(c.con.min))})</li>)}
              </ul>
            )}
          </div>
        )}
      </section>

      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><IBox cls="w-5 h-5 text-emerald-700" /> ¿Cuánto necesitas comprar?</h2>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className={labelCls}>Unidades por toma</label>
            <input type="number" min="1" step="0.5" className={inputCls} value={f.unitsPerDose} onChange={(e) => set("unitsPerDose", e.target.value)} />
            <div className="text-xs text-slate-400 mt-0.5">Ej. 1 tableta, 2 cápsulas, 10 (ml)</div>
          </div>
          <div>
            <label className={labelCls}>Contenido por caja / frasco</label>
            <input type="number" min="0" className={inputCls} value={f.unitsPerBox} onChange={(e) => set("unitsPerBox", e.target.value)} />
            <div className="text-xs text-slate-400 mt-0.5">Ej. caja con 10 tabletas, frasco de 120 ml</div>
          </div>
        </div>
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2.5 text-sm text-emerald-900">
          Necesitas <b>{totalUnid}</b> unidades en total ({totalTomas} tomas × {f.unitsPerDose || 1}).
          {cajas ? <span> Compra <b>{cajas} {cajas === 1 ? "caja/frasco" : "cajas/frascos"}</b>.</span> : null}
        </div>
      </section>

      {err && (
        <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2">
          <IWarn cls="w-4 h-4 shrink-0" /> {err}
        </div>
      )}

      <button onClick={guardar} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 text-base">
        <IPlus cls="w-5 h-5" /> {medEditar ? "Guardar cambios del medicamento" : "Guardar medicamento en mi historial"}
      </button>
    </div>
  );
}

const normTxt = (s) => String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

function Inventario({ data, persist, avisar }) {
  const inv = data.inv || [];
  const [codigo, setCodigo] = useState("");
  const [busca, setBusca] = useState("");
  const [formOpen, setFormOpen] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [editKey, setEditKey] = useState(null);
  const [sugOpen, setSugOpen] = useState(false);
  const [scanErr, setScanErr] = useState(null);
  const [scanning, setScanning] = useState(false);
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);

  const vacio = { code: "", name: "", presentation: "Tabletas", envase: "Caja", contenido: 20, unidad: "tabletas", cantidad: 1, caducidad: "", notas: "", stockMin: 1, imagen: "", precio: "" };
  const catalogo = data.catalogo || {};
  const [catOpen, setCatOpen] = useState(false);
  const [f, setF] = useState(vacio);
  const [err, setErr] = useState(null);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const guardarInv = (next) => persist({ ...data, inv: next });

  /* captura rápida: si el código existe suma +1; si no, abre el formulario prellenado */
  const procesarCodigo = (code) => {
    const c = String(code).trim();
    if (!c) return;
    const item = inv.find((i) => i.code === c);
    if (item) {
      guardarInv(inv.map((i) => (i.code === c ? { ...i, cantidad: i.cantidad + 1 } : i)));
      avisar("+1 " + item.envase.toLowerCase() + " de " + item.name + " · total: " + (item.cantidad + 1));
    } else if (catalogo[c]) {
      const cat = catalogo[c];
      setF({ ...vacio, code: c, name: cat.name || "", presentation: cat.presentation || "Tabletas", envase: cat.envase || "Caja", contenido: cat.contenido || 1, unidad: cat.unidad || "tabletas", precio: cat.precio || "", imagen: cat.imagen || "", stockMin: cat.stockMin || 1 });
      setEditKey(null);
      setFormOpen(true);
      avisar("Reconocido del catálogo: " + cat.name + " — solo confirma cantidad y caducidad");
    } else {
      setF({ ...vacio, code: c });
      setEditKey(null);
      setFormOpen(true);
      avisar("Código nuevo — completa los datos y quedará guardado en tu catálogo");
    }
    setCodigo("");
  };

  /* escaneo con cámara (detector nativo de Chrome/Edge) */
  const detener = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; }
    setScanning(false);
  };

  const escanear = async () => {
    setScanErr(null);
    if (!("BarcodeDetector" in window)) {
      setScanErr("Tu navegador no soporta escaneo con cámara. Escribe el código o usa un lector USB (teclea el código solo en el campo).");
      return;
    }
    try {
      const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39", "qr_code"] });
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      streamRef.current = stream;
      setScanning(true);
      setTimeout(async () => {
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        const loop = async () => {
          if (!streamRef.current || !videoRef.current) return;
          try {
            const codes = await detector.detect(videoRef.current);
            if (codes.length) { procesarCodigo(codes[0].rawValue); detener(); return; }
          } catch (e) { /* siguiente cuadro */ }
          requestAnimationFrame(loop);
        };
        loop();
      }, 100);
    } catch (e) {
      setScanErr("No se pudo acceder a la cámara. Verifica los permisos o escribe el código manualmente.");
      detener();
    }
  };

  useEffect(() => () => detener(), []);

  /* sumar o restar envases */
  const ajustar = (key, delta) => {
    const item = inv.find((i) => i.key === key);
    if (!item) return;
    const nueva = Math.max(0, item.cantidad + delta);
    guardarInv(inv.map((i) => (i.key === key ? { ...i, cantidad: nueva } : i)));
    if (delta < 0) avisar(nueva === 0 ? item.name + " agotado — considera reabastecer" : "Se descontó 1 " + item.envase.toLowerCase() + " de " + item.name);
  };

  const eliminar = (key) => {
    guardarInv(inv.filter((i) => i.key !== key));
    setConfirmDel(null);
    avisar("Producto eliminado del inventario");
  };

  const editarItem = (item) => {
    setF({ code: item.code, name: item.name, presentation: item.presentation, envase: item.envase, contenido: item.contenido, unidad: item.unidad, cantidad: item.cantidad, caducidad: item.caducidad || "", notas: item.notas || "", stockMin: item.stockMin || 1, imagen: item.imagen || "", precio: item.precio || "" });
    setEditKey(item.key);
    setFormOpen(true);
    setErr(null);
  };

  /* autocompletado: primero tu catálogo personal, luego la base de medicamentos comunes de México */
  const sugerencias = useMemo(() => {
    const q = normTxt(f.name.trim());
    if (q.length < 2) return [];
    const out = [];
    Object.keys(catalogo).forEach((c) => {
      const it = catalogo[c];
      if (normTxt(it.name).includes(q)) out.push({ origen: "catálogo", name: it.name, presentation: it.presentation, envase: it.envase, contenido: it.contenido, unidad: it.unidad, precio: it.precio, imagen: it.imagen });
    });
    SEED_MEDS.forEach(([n, p, e, c, u]) => {
      if (normTxt(n).includes(q) && !out.some((o) => normTxt(o.name) === normTxt(n))) out.push({ origen: "base MX", name: n, presentation: p, envase: e, contenido: c, unidad: u });
    });
    return out.slice(0, 8);
  }, [f.name, catalogo]);

  const aplicarSug = (s) => {
    setF((p) => ({
      ...p, name: s.name, presentation: s.presentation, envase: s.envase,
      contenido: s.contenido, unidad: s.unidad,
      precio: s.precio !== undefined && s.precio !== "" ? s.precio : p.precio,
      imagen: s.imagen || p.imagen,
    }));
    setSugOpen(false);
    avisar("Datos llenados desde " + (s.origen === "catálogo" ? "tu catálogo" : "la base de medicamentos") + " — confirma cantidad, precio y caducidad");
  };

  const guardarForm = () => {
    if (!f.name.trim()) return setErr("Escribe el nombre del medicamento.");
    if (!f.contenido || Number(f.contenido) <= 0) return setErr("Indica el contenido por envase (ej. 20 tabletas, 120 ml).");
    const code = f.code.trim() || ("MED-" + Math.random().toString(36).slice(2, 7).toUpperCase());
    if (inv.some((i) => i.code === code && i.key !== editKey)) return setErr("Ese código/ID ya existe en otro producto. Usa la captura rápida de arriba para sumar unidades.");
    const base = {
      code, name: f.name.trim(), presentation: f.presentation, envase: f.envase,
      contenido: Number(f.contenido), unidad: f.unidad, cantidad: Math.max(0, Number(f.cantidad) || 0),
      caducidad: f.caducidad, notas: f.notas.trim(), stockMin: Math.max(1, Number(f.stockMin) || 1),
      imagen: f.imagen || "", precio: Math.max(0, Number(f.precio) || 0),
    };
    const nextInv = editKey
      ? inv.map((i) => (i.key === editKey ? { ...i, ...base } : i))
      : [...inv, { key: uid(), ...base, createdAt: new Date().toISOString() }];
    /* el catálogo maestro acumula todos los códigos con su información y precio, para reconocerlos en el futuro */
    const nextCat = { ...catalogo, [code]: {
      name: base.name, presentation: base.presentation, envase: base.envase, contenido: base.contenido,
      unidad: base.unidad, precio: base.precio, imagen: base.imagen, stockMin: base.stockMin, updatedAt: todayStr(),
    }};
    persist({ ...data, inv: nextInv, catalogo: nextCat });
    avisar(editKey ? "Producto actualizado (catálogo sincronizado)" : "Agregado al inventario y guardado en tu catálogo");
    setF(vacio); setErr(null); setFormOpen(false); setEditKey(null);
  };

  const estadoCad = (cad) => {
    if (!cad) return { txt: "sin fecha de caducidad", cls: "bg-slate-100 text-slate-500 border-slate-200", nivel: 0 };
    const dias = Math.round((parseDate(cad) - parseDate(todayStr())) / 86400000);
    if (dias < 0) return { txt: "CADUCADO hace " + Math.abs(dias) + " días", cls: "bg-rose-100 text-rose-700 border-rose-200", nivel: 2 };
    if (dias <= 60) return { txt: "caduca en " + dias + " días (" + fmtDate(cad) + ")", cls: "bg-amber-100 text-amber-700 border-amber-200", nivel: 1 };
    return { txt: "vigente · caduca " + fmtDate(cad), cls: "bg-emerald-100 text-emerald-700 border-emerald-200", nivel: 0 };
  };

  /* subir imagen del producto: se comprime a miniatura de 96px para no saturar el almacenamiento */
  const subirImagen = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const S = 96;
        const esc = Math.min(S / img.width, S / img.height, 1);
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.width * esc));
        canvas.height = Math.max(1, Math.round(img.height * esc));
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        set("imagen", canvas.toDataURL("image/jpeg", 0.72));
        avisar("Imagen cargada y optimizada");
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  /* estado combinado de un producto para el PDF */
  const estadoProducto = (i) => {
    const partes = [];
    const c = estadoCad(i.caducidad);
    if (c.nivel === 2) partes.push("CADUCADO");
    else if (c.nivel === 1) partes.push("Por caducar");
    if (i.cantidad === 0) partes.push("Agotado");
    else if (i.cantidad <= (i.stockMin || 1)) partes.push("Stock bajo");
    return partes.length ? partes.join(" · ") : "OK";
  };

  /* exportar inventario a PDF ordenado por ID ascendente */
  const exportarPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const nombre = (data.perfil && data.perfil.nombre) || "";
    doc.setFontSize(16);
    doc.setTextColor(6, 78, 59);
    doc.text("Inventario de medicamentos", 14, 15);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text((nombre ? "Paciente: " + nombre + "   ·   " : "") + "Generado: " + fmtDateLong(todayStr()) + "   ·   MediControl", 14, 21);
    const orden = inv.slice().sort((a, b) => String(a.code).localeCompare(String(b.code), undefined, { numeric: true }));
    const filas = orden.map((i) => [
      i.code, i.name, i.presentation, i.envase + " · " + i.contenido + " " + i.unidad,
      String(i.cantidad), (i.cantidad * i.contenido) + " " + i.unidad,
      i.precio ? fmtMoney(i.precio) : "—", fmtMoney((i.precio || 0) * i.cantidad),
      diasCadTexto(i.caducidad), estadoProducto(i),
    ]);
    doc.autoTable({
      head: [["ID / Código", "Medicamento", "Presentación", "Envase", "Envases", "Total disponible", "Precio c/u", "Valor", "Caducidad", "Estado"]],
      body: filas, startY: 26,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 9 && d.cell.raw !== "OK") { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
        if (d.section === "body" && d.column.index === 8 && String(d.cell.raw).indexOf("VENCIDO") === 0) { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
      },
    });
    const yFin = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    doc.setFontSize(11);
    doc.setTextColor(4, 120, 87);
    doc.text("VALOR TOTAL DEL INVENTARIO: " + fmtMoney(valorTotal) + " MXN", 14, yFin);
    doc.setFontSize(9);
    doc.setTextColor(60);
    doc.text("Resumen: " + inv.length + " productos  ·  " + agotados + " agotados  ·  " + stockBajo.length + " con stock bajo  ·  " + porCaducar + " por caducar  ·  " + caducados + " caducados", 14, yFin + 6);
    doc.setFontSize(7);
    doc.setTextColor(150);
    doc.text("Documento informativo generado por MediControl. Ordenado por ID/código ascendente.", 14, yFin + 11);
    doc.save("inventario-medicamentos-" + todayStr() + ".pdf");
    avisar("PDF del inventario descargado");
  };

  /* exportar catálogo maestro a PDF */
  const exportarCatalogoPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Catálogo maestro de medicamentos", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text("Base de datos de códigos registrados  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    const codigos = Object.keys(catalogo).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    doc.autoTable({
      head: [["ID / Código", "Medicamento", "Presentación", "Envase", "Precio", "Últ. actualización"]],
      body: codigos.map((c) => {
        const it = catalogo[c];
        return [c, it.name, it.presentation, it.envase + " · " + it.contenido + " " + it.unidad, it.precio ? fmtMoney(it.precio) : "—", it.updatedAt ? fmtDate(it.updatedAt) : "—"];
      }),
      startY: 26, styles: { fontSize: 8, cellPadding: 2 }, headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
    });
    doc.save("catalogo-medicamentos-" + todayStr() + ".pdf");
    avisar("PDF del catálogo descargado");
  };

  const quitarDelCatalogo = (code) => {
    const next = { ...catalogo };
    delete next[code];
    persist({ ...data, catalogo: next });
    avisar("Código eliminado del catálogo");
  };

  const filtrados = inv
    .filter((i) => (i.name + " " + i.code).toLowerCase().includes(busca.toLowerCase()))
    .slice()
    .sort((a, b) => ((a.caducidad || "9999-12-31") < (b.caducidad || "9999-12-31") ? -1 : 1));

  const hoy0 = parseDate(todayStr());
  const caducados = inv.filter((i) => i.caducidad && parseDate(i.caducidad) < hoy0).length;
  const porCaducar = inv.filter((i) => {
    if (!i.caducidad) return false;
    const d = Math.round((parseDate(i.caducidad) - hoy0) / 86400000);
    return d >= 0 && d <= 60;
  }).length;
  const agotados = inv.filter((i) => i.cantidad === 0).length;
  const stockBajo = inv.filter((i) => i.cantidad > 0 && i.cantidad <= (i.stockMin || 1));
  const agotadosList = inv.filter((i) => i.cantidad === 0);
  const topStock = inv.slice().sort((a, b) => b.cantidad - a.cantidad).filter((i) => i.cantidad > 0).slice(0, 3);
  const valorTotal = inv.reduce((s, i) => s + (Number(i.precio) || 0) * i.cantidad, 0);

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  return (
    <div className="space-y-4">
      {/* captura rápida */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-2">
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <h2 className="font-bold text-slate-700 flex items-center gap-2"><IBarcode cls="w-5 h-5 text-emerald-700" /> Captura rápida por código</h2>
          {inv.length > 0 && (
            <button onClick={exportarPDF} className="inline-flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-xl border border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100">
              <IDownload cls="w-4 h-4" /> Exportar PDF
            </button>
          )}
        </div>
        <div className="flex gap-2">
          <input className={inputCls} placeholder="Escanea o escribe el código de barras / ID y presiona Enter"
            value={codigo} onChange={(e) => setCodigo(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") procesarCodigo(codigo); }} />
          <button onClick={() => procesarCodigo(codigo)}
            className="shrink-0 bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 rounded-xl flex items-center gap-1.5">
            <IPlus cls="w-4 h-4" /> +1
          </button>
          <button onClick={scanning ? detener : escanear}
            className={"shrink-0 text-sm font-semibold px-4 rounded-xl flex items-center gap-1.5 border " +
              (scanning ? "bg-rose-50 border-rose-300 text-rose-700" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
            <ICamera cls="w-4 h-4" /> {scanning ? "Detener" : "Cámara"}
          </button>
        </div>
        <p className="text-xs text-slate-400">Si el código ya existe se suma <b>+1 envase</b> automáticamente. Si es nuevo, se abre el formulario con el código prellenado. Compatible con lectores USB de código de barras (escanean directo al campo).</p>
        {scanning && (
          <div className="rounded-xl overflow-hidden border border-emerald-300 bg-black">
            <video ref={videoRef} className="w-full max-h-64 object-cover" muted playsInline />
            <div className="text-center text-xs text-emerald-200 bg-slate-900 py-1.5">Apunta la cámara al código de barras…</div>
          </div>
        )}
        {scanErr && (
          <div className="bg-amber-50 border border-amber-200 text-amber-800 text-xs rounded-xl px-3 py-2 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" /> {scanErr}
          </div>
        )}
      </section>

      {/* resumen del botiquín */}
      {inv.length > 0 && (
        <div className="bg-emerald-800 text-white rounded-2xl p-4 flex items-center justify-between">
          <div>
            <div className="text-emerald-200 text-xs font-bold uppercase tracking-wide">Valor total del inventario</div>
            <div className="text-2xl font-extrabold">{fmtMoney(valorTotal)} <span className="text-sm font-medium text-emerald-200">MXN</span></div>
          </div>
          <div className="text-right text-emerald-200 text-xs">
            Dinero invertido en tus<br />medicamentos en existencia
          </div>
        </div>
      )}
      {inv.length > 0 && (
        <div className="grid grid-cols-5 gap-1.5">
          <Kpi label="Productos" valor={inv.length} />
          <Kpi label="Stock bajo" valor={stockBajo.length} verde={stockBajo.length === 0} />
          <Kpi label="Agotados" valor={agotados} verde={agotados === 0} />
          <Kpi label="Por caducar" valor={porCaducar} verde={porCaducar === 0} />
          <Kpi label="Caducados" valor={caducados} verde={caducados === 0} />
        </div>
      )}

      {/* ficha del botiquín */}
      {inv.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-emerald-700 mb-1.5 flex items-center gap-1"><IBox cls="w-3.5 h-3.5" /> Con más existencias</div>
              {topStock.length === 0 ? <div className="text-xs text-slate-400">Sin existencias.</div> : topStock.map((i) => (
                <div key={i.key} className="text-sm text-slate-700 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">{i.cantidad} {i.envase.toLowerCase()}{i.cantidad === 1 ? "" : "s"}</b>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-amber-600 mb-1.5 flex items-center gap-1"><IWarn cls="w-3.5 h-3.5" /> Por acabarse</div>
              {stockBajo.length === 0 ? <div className="text-xs text-slate-400">Ninguno en el límite. Todo en orden.</div> : stockBajo.slice(0, 4).map((i) => (
                <div key={i.key} className="text-sm text-amber-800 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">{i.cantidad} / mín {i.stockMin || 1}</b>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-rose-600 mb-1.5 flex items-center gap-1"><IX cls="w-3.5 h-3.5" /> Fuera de límite (agotados)</div>
              {agotadosList.length === 0 ? <div className="text-xs text-slate-400">Ningún producto agotado.</div> : agotadosList.slice(0, 4).map((i) => (
                <div key={i.key} className="text-sm text-rose-700 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">reabastecer</b>
                </div>
              ))}
            </div>
          </div>
        </section>
      )}

      {/* registrar producto nuevo */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <button onClick={() => setFormOpen(!formOpen)} className="w-full flex items-center justify-between">
          <span className="font-bold text-slate-700 flex items-center gap-2">{editKey ? <IEdit cls="w-5 h-5 text-amber-600" /> : <IPlus cls="w-5 h-5 text-emerald-700" />} {editKey ? "Editando: " + f.name : "Registrar producto nuevo"}</span>
          {formOpen ? <IChevD cls="w-5 h-5 text-slate-400" /> : <IChevR cls="w-5 h-5 text-slate-400" />}
        </button>
        {formOpen && (
          <div className="mt-3 space-y-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className={labelCls}>Código / ID (código de barras)</label>
                <input className={inputCls} placeholder="Escanea, escribe o deja vacío para generar uno" value={f.code} onChange={(e) => set("code", e.target.value)} />
              </div>
              <div className="relative">
                <label className={labelCls}>Nombre del medicamento *</label>
                <input className={inputCls} placeholder="Escribe 2+ letras, ej. para…" value={f.name}
                  onChange={(e) => { set("name", e.target.value); setSugOpen(true); }}
                  onFocus={() => setSugOpen(true)}
                  onBlur={() => setTimeout(() => setSugOpen(false), 150)} />
                {sugOpen && sugerencias.length > 0 && (
                  <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-y-auto">
                    {sugerencias.map((s, i) => (
                      <button key={i} onMouseDown={(e) => { e.preventDefault(); aplicarSug(s); }}
                        className="w-full text-left px-3 py-2 hover:bg-emerald-50 flex items-center justify-between gap-2 border-b border-slate-50 last:border-0">
                        <span className="min-w-0">
                          <span className="text-sm font-medium text-slate-700 block truncate">{s.name}</span>
                          <span className="text-xs text-slate-400">{s.envase} · {s.contenido} {s.unidad}{s.precio ? " · " + fmtMoney(s.precio) : ""}</span>
                        </span>
                        <span className={"text-[10px] px-1.5 py-0.5 rounded-full shrink-0 " + (s.origen === "catálogo" ? "bg-emerald-100 text-emerald-700" : "bg-sky-100 text-sky-700")}>{s.origen}</span>
                      </button>
                    ))}
                  </div>
                )}
                <div className="text-xs text-slate-400 mt-0.5">Elige de la base de medicamentos comunes de México y se llena todo el formulario</div>
              </div>
              <div>
                <label className={labelCls}>Presentación</label>
                <select className={inputCls} value={f.presentation} onChange={(e) => set("presentation", e.target.value)}>
                  {PRESENTACIONES.map((p) => <option key={p}>{p}</option>)}
                </select>
              </div>
              <div>
                <label className={labelCls}>Tipo de envase</label>
                <select className={inputCls} value={f.envase} onChange={(e) => set("envase", e.target.value)}>
                  {ENVASES.map((p) => <option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className={labelCls}>Contenido *</label>
                  <input type="number" min="1" className={inputCls} value={f.contenido} onChange={(e) => set("contenido", e.target.value)} />
                </div>
                <div>
                  <label className={labelCls}>Unidad</label>
                  <select className={inputCls} value={f.unidad} onChange={(e) => set("unidad", e.target.value)}>
                    {UNIDADES.map((u) => <option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className={labelCls}>Envases que tienes</label>
                  <input type="number" min="0" className={inputCls} value={f.cantidad} onChange={(e) => set("cantidad", e.target.value)} />
                </div>
                <div>
                  <label className={labelCls}>Fecha de caducidad</label>
                  <input type="date" className={inputCls} value={f.caducidad} onChange={(e) => set("caducidad", e.target.value)} />
                </div>
              </div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className={labelCls}>Precio por envase (MXN)</label>
                <input type="number" min="0" step="0.01" className={inputCls} placeholder="Ej. 85.50" value={f.precio} onChange={(e) => set("precio", e.target.value)} />
                <div className="text-xs text-slate-400 mt-0.5">Se guarda en tu catálogo para futuras compras y el valor del inventario</div>
              </div>
              <div>
                <label className={labelCls}>Límite de stock (mínimo deseado)</label>
                <input type="number" min="1" className={inputCls} value={f.stockMin} onChange={(e) => set("stockMin", e.target.value)} />
                <div className="text-xs text-slate-400 mt-0.5">Cuando queden esta cantidad de envases o menos, se marcará "por acabarse"</div>
              </div>
              <div>
                <label className={labelCls}>Imagen del producto (opcional)</label>
                <div className="flex items-center gap-2">
                  {f.imagen ? (
                    <img src={f.imagen} alt="producto" className="w-12 h-12 rounded-lg object-cover border border-slate-200" />
                  ) : (
                    <div className="w-12 h-12 rounded-lg bg-slate-100 border border-dashed border-slate-300 flex items-center justify-center"><ICamera cls="w-5 h-5 text-slate-400" /></div>
                  )}
                  <label className="cursor-pointer text-sm font-medium px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">
                    {f.imagen ? "Cambiar" : "Subir foto"}
                    <input type="file" accept="image/*" className="hidden" onChange={subirImagen} />
                  </label>
                  {f.imagen && <button onClick={() => set("imagen", "")} className="text-xs text-slate-400 hover:text-rose-600">quitar</button>}
                </div>
                <div className="text-xs text-slate-400 mt-0.5">Se comprime automáticamente a miniatura para identificarlo fácil</div>
              </div>
            </div>
            <div>
              <label className={labelCls}>Notas (opcional)</label>
              <input className={inputCls} placeholder="Ej. Guardado en el botiquín del baño · lote 4521" value={f.notas} onChange={(e) => set("notas", e.target.value)} />
            </div>
            <div className="text-xs text-slate-500 bg-slate-50 rounded-xl px-3 py-2">
              Ejemplos: <b>Caja</b> con 20 <b>tabletas</b> · <b>Frasco</b> con 120 <b>ml</b> · <b>Blíster</b> con 10 <b>cápsulas</b>
            </div>
            {err && (
              <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2">
                <IWarn cls="w-4 h-4 shrink-0" /> {err}
              </div>
            )}
            <button onClick={guardarForm} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
              <IPlus cls="w-5 h-5" /> {editKey ? "Guardar cambios" : "Agregar al inventario"}
            </button>
            {editKey && (
              <button onClick={() => { setF(vacio); setEditKey(null); setErr(null); setFormOpen(false); }}
                className="w-full text-sm text-slate-500 hover:text-slate-700 py-1">Cancelar edición</button>
            )}
          </div>
        )}
      </section>

      {/* buscador y lista */}
      {inv.length > 0 && (
        <div className="relative">
          <ISearch cls="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
          <input className={inputCls + " pl-9"} placeholder="Buscar por nombre o código…" value={busca} onChange={(e) => setBusca(e.target.value)} />
        </div>
      )}

      {inv.length === 0 ? (
        <VacioCard titulo="Tu botiquín está vacío"
          texto="Registra los medicamentos que tienes en casa: nombre, envase, contenido y caducidad. Después bastará escanear o escribir el código para sumar más."
          accion={() => setFormOpen(true)} accionLabel="Registrar el primero" />
      ) : (
        <div className="space-y-2">
          {filtrados.map((i) => {
            const cad = estadoCad(i.caducidad);
            const total = i.cantidad * i.contenido;
            return (
              <div key={i.key} className={"bg-white rounded-2xl border p-4 " + (cad.nivel === 2 ? "border-rose-300" : cad.nivel === 1 ? "border-amber-300" : "border-slate-200")}>
                <div className="flex items-start gap-3">
                  {i.imagen ? (
                    <img src={i.imagen} alt={i.name} className={"w-11 h-11 rounded-xl object-cover border shrink-0 " + (i.cantidad === 0 ? "border-slate-200 opacity-60" : "border-emerald-200")} />
                  ) : (
                    <div className={"rounded-xl p-2 border shrink-0 " + (i.cantidad === 0 ? "bg-slate-100 text-slate-400 border-slate-200" : "bg-emerald-50 text-emerald-700 border-emerald-200")}>
                      <IBox cls="w-5 h-5" />
                    </div>
                  )}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-bold text-slate-800">{i.name}</span>
                      <span className="text-xs font-mono bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded-full flex items-center gap-1"><IBarcode cls="w-3 h-3" /> {i.code}</span>
                      {i.cantidad === 0 && <span className="text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-600">agotado</span>}
                      {i.cantidad > 0 && i.cantidad <= (i.stockMin || 1) && <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">por acabarse · mín {i.stockMin || 1}</span>}
                    </div>
                    <div className="text-sm text-slate-500 mt-0.5">
                      {i.presentation} · {i.envase} con {i.contenido} {i.unidad} · disponible: <b className="text-slate-700">{total} {i.unidad}</b>
                      {i.precio > 0 && <span> · {fmtMoney(i.precio)} c/u · <b className="text-emerald-700">{fmtMoney(i.precio * i.cantidad)}</b> en stock</span>}
                    </div>
                    <div className="mt-1.5 flex items-center gap-2 flex-wrap">
                      <span className={"text-xs px-2 py-0.5 rounded-full border " + cad.cls}>{cad.txt}</span>
                      {i.notas && <span className="text-xs text-slate-400">{i.notas}</span>}
                    </div>
                  </div>
                  {/* contador de envases */}
                  <div className="flex flex-col items-center gap-1 shrink-0">
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => ajustar(i.key, -1)} disabled={i.cantidad === 0}
                        className={"w-8 h-8 rounded-lg border flex items-center justify-center " + (i.cantidad === 0 ? "border-slate-200 text-slate-300" : "border-slate-300 text-slate-600 hover:bg-rose-50 hover:border-rose-300 hover:text-rose-600")}>
                        <IMinus cls="w-4 h-4" />
