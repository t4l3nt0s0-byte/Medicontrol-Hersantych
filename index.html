/* ============================================================
   Respaldo y restauración de datos (exportar / importar todo)
   ============================================================ */
function Respaldo({ data, persist, avisar }) {
  const [preview, setPreview] = useState(null);
  const [errImp, setErrImp] = useState(null);
  const fileRef = React.useRef(null);

  /* mismos valores por defecto que la carga inicial: garantiza restauración íntegra
     y conserva cualquier clave extra del archivo para compatibilidad futura */
  const normalizar = (d) => ({
    ...d,
    meds: Array.isArray(d.meds) ? d.meds : [],
    taken: d.taken && typeof d.taken === "object" ? d.taken : {},
    inv: Array.isArray(d.inv) ? d.inv : [],
    vitals: d.vitals && typeof d.vitals === "object" ? { ...d.vitals, readings: Array.isArray(d.vitals.readings) ? d.vitals.readings : [], horarios: d.vitals.horarios || null } : { readings: [], horarios: null },
    perfil: d.perfil && typeof d.perfil === "object" ? d.perfil : {},
    catalogo: d.catalogo && typeof d.catalogo === "object" ? d.catalogo : {},
    comidas: Array.isArray(d.comidas) ? d.comidas : [],
    agua: d.agua && typeof d.agua === "object" ? d.agua : {},
  });

  const contar = (d) => ({
    meds: (d.meds || []).length,
    tomas: Object.keys(d.taken || {}).length,
    inv: (d.inv || []).length,
    mediciones: ((d.vitals || {}).readings || []).length,
    horarios: Object.values((d.vitals || {}).horarios || {}).reduce((s, l) => s + (Array.isArray(l) ? l.length : 0), 0),
    comidas: (d.comidas || []).length,
    agua: Object.keys(d.agua || {}).length,
    catalogo: Object.keys(d.catalogo || {}).length,
    perfil: !!(d.perfil && Object.keys(d.perfil).length > 0),
  });

  const exportar = () => {
    const payload = { app: "MediControl", formato: KEY, exportadoEl: new Date().toISOString(), data };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "medicontrol-respaldo-" + todayStr() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    persist({ ...data, ultimoRespaldo: new Date().toISOString() });
    avisar("Respaldo completo descargado — guárdalo en un lugar seguro");
  };

  const leerArchivo = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setErrImp(null);
    setPreview(null);
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        const d = json && json.data && typeof json.data === "object" ? json.data : json;
        const parece = d && typeof d === "object" && (Array.isArray(d.meds) || Array.isArray(d.comidas) || (d.vitals && typeof d.vitals === "object") || (d.taken && typeof d.taken === "object"));
        if (!parece) { setErrImp("Este archivo no parece ser un respaldo de MediControl. Verifica que sea el archivo .json exportado desde esta app."); return; }
        setPreview({ d: normalizar(d), fecha: json.exportadoEl || null, nombre: file.name });
      } catch (err) {
        setErrImp("No se pudo leer el archivo: no es un JSON válido o está dañado.");
      }
    };
    reader.onerror = () => setErrImp("No se pudo leer el archivo. Intenta de nuevo.");
    reader.readAsText(file);
  };

  const restaurar = () => {
    persist(preview.d);
    setPreview(null);
    avisar("Restauración completa: todos tus datos fueron recuperados");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const actual = contar(data);
  const hayDatos = actual.meds + actual.tomas + actual.mediciones + actual.comidas + actual.inv + actual.agua > 0;
  const diasSinRespaldo = data.ultimoRespaldo ? Math.floor((Date.now() - new Date(data.ultimoRespaldo).getTime()) / 86400000) : null;
  const pedirRespaldo = hayDatos && (diasSinRespaldo === null || diasSinRespaldo >= 7);

  const Chips = ({ c }) => (
    <div className="flex flex-wrap gap-1.5 text-[11px] font-semibold">
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">💊 {c.meds} medicamentos</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">✅ {c.tomas} tomas registradas</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">📦 {c.inv} artículos de inventario</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">🩺 {c.mediciones} mediciones de salud</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">⏰ {c.horarios} horarios de medición</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">🍽️ {c.comidas} comidas</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">💧 {c.agua} días de hidratación</span>
      <span className="bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-2.5 py-1">👤 Perfil {c.perfil ? "incluido" : "vacío"}</span>
    </div>
  );

  return (
    <div className="mt-4 space-y-4">
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2">💾 Respaldo y restauración de datos</h2>
        <p className="text-xs text-slate-500">Tus datos se guardan únicamente en este navegador y en este dispositivo. Si borras el historial de navegación, cambias de teléfono o el navegador limpia el almacenamiento, se pierden. Exporta un respaldo con regularidad y guárdalo en un lugar seguro (correo, nube o memoria USB): con ese archivo puedes recuperar el 100% de tu información aquí o en cualquier otro dispositivo.</p>

        {pedirRespaldo && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-800 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" />
            {diasSinRespaldo === null ? "Aún no has creado ningún respaldo y ya tienes información registrada. Descarga uno ahora: toma 5 segundos." : "Tu último respaldo fue hace " + diasSinRespaldo + " días. Te recomendamos exportar uno nuevo."}
          </div>
        )}
        {diasSinRespaldo !== null && diasSinRespaldo < 7 && (
          <div className="text-[11px] text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-xl px-3 py-2">✅ Último respaldo: {fmtDateLong(data.ultimoRespaldo.slice(0, 10))}{diasSinRespaldo === 0 ? " (hoy)" : " (hace " + diasSinRespaldo + " día" + (diasSinRespaldo === 1 ? "" : "s") + ")"}</div>
        )}

        <div>
          <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Lo que incluye tu respaldo hoy</div>
          <Chips c={actual} />
        </div>

        <div className="grid sm:grid-cols-2 gap-2">
          <button onClick={exportar} className="bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
            <IDownload cls="w-5 h-5" /> Exportar respaldo completo (.json)
          </button>
          <button onClick={() => fileRef.current && fileRef.current.click()} className="bg-white border-2 border-emerald-700 text-emerald-800 hover:bg-emerald-50 font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
            <IUpload cls="w-5 h-5" /> Importar / restaurar respaldo
          </button>
          <input ref={fileRef} type="file" accept=".json,application/json" className="hidden" onChange={leerArchivo} />
        </div>

        {errImp && (
          <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" /> {errImp}
          </div>
        )}

        {preview && (() => {
          const cf = contar(preview.d);
          return (
            <div className="rounded-2xl border-2 border-amber-300 bg-amber-50 p-4 space-y-3">
              <div className="font-bold text-slate-800 text-sm flex items-center gap-2"><IUpload cls="w-4 h-4 text-amber-700" /> Respaldo listo para restaurar</div>
              <div className="text-xs text-slate-600">
                Archivo: <b>{preview.nombre}</b>{preview.fecha ? <span> · Exportado el <b>{fmtDateLong(preview.fecha.slice(0, 10))}</b></span> : <span> · Sin fecha de exportación registrada</span>}
              </div>
              <div>
                <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Contenido del archivo</div>
                <Chips c={cf} />
              </div>
              <div className="bg-white border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-900">
                <b>⚠️ Importante:</b> restaurar reemplazará <b>todos</b> los datos actuales de la app por los del archivo. {hayDatos ? "Si quieres conservar lo que tienes ahora, primero descarga un respaldo de lo actual con el botón de abajo." : "Actualmente no tienes datos registrados, así que no perderás nada."}
              </div>
              {hayDatos && (
                <button onClick={exportar} className="w-full bg-white border border-slate-300 text-slate-700 hover:border-emerald-400 text-sm font-semibold py-2 rounded-xl flex items-center justify-center gap-1.5">
                  <IDownload cls="w-4 h-4" /> Descargar primero un respaldo de mis datos actuales
                </button>
              )}
              <div className="grid grid-cols-2 gap-2">
                <button onClick={restaurar} className="bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 rounded-xl">Restaurar todo</button>
                <button onClick={() => setPreview(null)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-2.5 rounded-xl">Cancelar</button>
              </div>
            </div>
          );
        })()}

        <p className="text-[11px] text-slate-400">El archivo de respaldo contiene información de salud personal: guárdalo en un lugar privado y no lo compartas. Para máxima seguridad, exporta un respaldo al menos una vez por semana y siempre antes de actualizar tu teléfono o limpiar el navegador.</p>
      </section>
    </div>
  );
}

function Reporte({ data, now, avisar }) {
  const [mes, setMes] = useState(now.getFullYear() + "-" + pad(now.getMonth() + 1));
  const [y, m] = mes.split("-").map(Number);
  const diasEnMes = new Date(y, m, 0).getDate();
  const nowISO = todayStr() + "T" + pad(now.getHours()) + ":" + pad(now.getMinutes());

  const mover = (d) => {
    const dt = new Date(y, m - 1 + d, 1);
    setMes(dt.getFullYear() + "-" + pad(dt.getMonth() + 1));
  };

  const filas = useMemo(() => {
    return data.meds.map((med) => {
      const fin = fechaFin(med);
      let prog = 0, tom = 0, futuras = 0;
      for (let d = 1; d <= diasEnMes; d++) {
        const fecha = y + "-" + pad(m) + "-" + pad(d);
        if (fecha < med.startDate || fecha > fin) continue;
        for (const t of med.times) {
          prog++;
          if (data.taken[doseKey(med.id, fecha, t)]) tom++;
          else if (fecha + "T" + t > nowISO) futuras++;
        }
      }
      const vencidas = prog - futuras;
      const adh = vencidas > 0 ? Math.round((tom / vencidas) * 100) : null;
      return { med, prog, tom, futuras, omitidas: Math.max(0, vencidas - tom), adh };
    }).filter((r) => r.prog > 0);
  }, [data, y, m, diasEnMes, nowISO]);

  const totProg = filas.reduce((a, r) => a + r.prog, 0);
  const totTom = filas.reduce((a, r) => a + r.tom, 0);
  const totVenc = filas.reduce((a, r) => a + (r.prog - r.futuras), 0);
  const adhGlobal = totVenc > 0 ? Math.round((totTom / totVenc) * 100) : null;

  /* patrones de olvido: qué día de la semana y qué hora acumulan más omisiones */
  const olvidos = useMemo(() => {
    const porDia = [0, 0, 0, 0, 0, 0, 0];
    const porHora = {};
    for (const med of data.meds) {
      const fin = fechaFin(med);
      for (let d = 1; d <= diasEnMes; d++) {
        const fecha = y + "-" + pad(m) + "-" + pad(d);
        if (fecha < med.startDate || fecha > fin) continue;
        for (const t of med.times) {
          if (data.taken[doseKey(med.id, fecha, t)]) continue;
          if (fecha + "T" + t > nowISO) continue;
          porDia[parseDate(fecha).getDay()]++;
          porHora[t] = (porHora[t] || 0) + 1;
        }
      }
    }
    let diaMax = 0, diaVal = 0;
    porDia.forEach((v, i) => { if (v > diaVal) { diaVal = v; diaMax = i; } });
    let horaMax = null, horaVal = 0;
    Object.keys(porHora).forEach((h) => { if (porHora[h] > horaVal) { horaVal = porHora[h]; horaMax = h; } });
    return { diaMax, diaVal, horaMax, horaVal, porDia, total: porDia.reduce((a, b) => a + b, 0) };
  }, [data, y, m, diasEnMes, nowISO]);

  const exportarReportePDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nombre = (data.perfil && data.perfil.nombre) || "";
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Reporte mensual de adherencia", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text((nombre ? "Paciente: " + nombre + "  ·  " : "") + "Mes: " + MESES[m - 1] + " " + y + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    doc.autoTable({
      head: [["Medicamento", "Dosis", "Frecuencia", "Motivo", "Programadas", "Tomadas", "Omitidas", "Por venir", "Adherencia"]],
      body: filas.map((r) => [
        r.med.name, r.med.dose, "cada " + r.med.freqHours + " h", r.med.purpose || "—",
        String(r.prog), String(r.tom), String(r.omitidas), String(r.futuras),
        r.adh === null ? "—" : r.adh + "%",
      ]),
      startY: 27, styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 6 && Number(d.cell.raw) > 0) { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
        if (d.section === "body" && d.column.index === 8 && d.cell.raw !== "—") {
          const v = parseInt(d.cell.raw);
          d.cell.styles.fontStyle = "bold";
          d.cell.styles.textColor = v >= 80 ? [4, 120, 87] : [190, 18, 60];
        }
      },
    });
    let yF = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    doc.setFontSize(11); doc.setTextColor(4, 120, 87);
    doc.text("ADHERENCIA GLOBAL DEL MES: " + (adhGlobal === null ? "—" : adhGlobal + "%") + "   (" + totTom + " de " + totVenc + " tomas vencidas)", 14, yF);
    yF += 7;
    if (olvidos.total > 0) {
      doc.setFontSize(9); doc.setTextColor(180, 83, 9);
      doc.text("Patrones de olvido: el día con más omisiones fue " + DIAS_FULL[olvidos.diaMax] + " (" + olvidos.diaVal + ")" + (olvidos.horaMax ? " y la hora con más olvidos fue " + fmt12(olvidos.horaMax) + " (" + olvidos.horaVal + ")." : "."), 14, yF);
      yF += 5;
      doc.text("Omitidas por día: " + olvidos.porDia.map((v, i) => DIAS_SEM[i] + " " + v).join("  ·  "), 14, yF);
      yF += 7;
    }
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("La adherencia se calcula solo sobre tomas cuya hora ya pasó. Documento informativo; no sustituye la valoración médica.", 14, yF);
    doc.save("reporte-adherencia-" + y + "-" + pad(m) + ".pdf");
    avisar("PDF del reporte mensual descargado");
  };

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-slate-200 p-3 flex items-center justify-between">
        <button onClick={() => mover(-1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-50">← anterior</button>
        <div className="font-bold text-slate-700 capitalize">{MESES[m - 1]} {y}</div>
        <button onClick={() => mover(1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-50">siguiente →</button>
      </div>

      {filas.length === 0 ? (
        <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-8 text-center text-slate-500 text-sm">
          <IChart cls="w-10 h-10 text-slate-300 mx-auto mb-2" />
          No hay tratamientos programados en este mes.
        </div>
      ) : (
        <React.Fragment>
          <div className="grid grid-cols-3 gap-3">
            <Kpi label="Tomas programadas" valor={totProg} />
            <Kpi label="Tomas confirmadas" valor={totTom} verde />
            <Kpi label="Adherencia" valor={adhGlobal === null ? "—" : adhGlobal + "%"} verde={adhGlobal !== null && adhGlobal >= 80} />
          </div>

          {olvidos.total > 0 && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
              <div className="font-bold text-amber-900 text-sm mb-1.5 flex items-center gap-1.5"><IWarn cls="w-4 h-4" /> Patrones de olvido de {MESES[m - 1]}</div>
              <p className="text-sm text-amber-900">
                El día que más se te olvida es <b>{DIAS_FULL[olvidos.diaMax]}</b> ({olvidos.diaVal} {olvidos.diaVal === 1 ? "toma omitida" : "tomas omitidas"})
                {olvidos.horaMax && <span> y la hora con más olvidos es <b>{fmt12(olvidos.horaMax)}</b> ({olvidos.horaVal})</span>}.
                Sugerencia: ancla esa toma a una rutina fija (al desayunar, al lavarte los dientes, al llegar del trabajo) o ponle una alarma específica.
              </p>
              <div className="flex flex-wrap gap-1.5 mt-2">
                {olvidos.porDia.map((v, i) => (
                  <span key={i} className={"text-xs px-2 py-1 rounded-lg border " + (v === 0 ? "bg-white border-slate-200 text-slate-400" : i === olvidos.diaMax ? "bg-rose-100 border-rose-200 text-rose-700 font-bold" : "bg-amber-100 border-amber-200 text-amber-800")}>
                    {DIAS_SEM[i]}: {v}
                  </span>
                ))}
              </div>
            </div>
          )}

          <div className="flex justify-end">
            <button onClick={exportarReportePDF} className="inline-flex items-center gap-1.5 text-sm font-semibold px-4 py-2 rounded-xl border border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100">
              <IDownload cls="w-4 h-4" /> Exportar reporte a PDF
            </button>
          </div>

          <div className="space-y-2">
            {filas.map((r) => {
              const cat = catInfo(r.med.category);
              return (
                <div key={r.med.id} className="bg-white rounded-2xl border border-slate-200 p-4">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-bold text-slate-800">{r.med.name}</span>
                    <span className={"text-xs px-2 py-0.5 rounded-full border " + cat.cls}>{cat.label}</span>
                    <span className="text-xs text-slate-400">cada {r.med.freqHours} h · {r.med.dose}</span>
                  </div>
                  {r.med.purpose && <div className="text-xs text-slate-500 mt-0.5">Motivo: {r.med.purpose}</div>}
                  <div className="flex items-center gap-2 mt-2">
                    <div className="h-2.5 flex-1 bg-slate-100 rounded-full overflow-hidden flex">
                      <div className="h-full bg-emerald-500" style={{ width: (r.prog ? (r.tom / r.prog) * 100 : 0) + "%" }} />
                      <div className="h-full bg-rose-300" style={{ width: (r.prog ? (r.omitidas / r.prog) * 100 : 0) + "%" }} />
                    </div>
                    <span className="text-xs font-semibold text-slate-600 shrink-0">{r.adh === null ? "sin tomas vencidas" : r.adh + "%"}</span>
                  </div>
                  <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-slate-500">
                    <span>Programadas: <b className="text-slate-700">{r.prog}</b></span>
                    <span>Tomadas: <b className="text-emerald-700">{r.tom}</b></span>
                    <span>Omitidas: <b className="text-rose-600">{r.omitidas}</b></span>
                    {r.futuras > 0 && <span>Por venir: <b className="text-slate-600">{r.futuras}</b></span>}
                  </div>
                </div>
              );
            })}
          </div>
          <p className="text-xs text-slate-400 text-center">La adherencia se calcula solo sobre tomas cuya hora ya pasó. Este reporte es informativo y no sustituye la indicación de tu médico.</p>
        </React.Fragment>
      )}
    </div>
  );
}

function Kpi({ label, valor, verde }) {
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-3 text-center">
      <div className={"text-2xl font-extrabold " + (verde ? "text-emerald-700" : "text-slate-800")}>{valor}</div>
      <div className="text-xs text-slate-500 mt-0.5">{label}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MediControl />);
</script>
</body>
