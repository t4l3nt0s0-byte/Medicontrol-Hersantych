/* ============================================================
   Monitoreo de salud: glucosa, presión, peso, oxigenación
   ============================================================ */
const CTX_GLUCOSA = ["En ayunas", "Antes de alimento", "2 h después de alimento", "Antes de dormir"];

const METRICAS = {
  glucosa: {
    label: "Glucosa", unidad: "mg/dL", Icon: IDrop, color: "text-rose-600",
    guia: "Mide en ayunas al despertar (mínimo 8 h sin alimento) y/o exactamente 2 h después del primer bocado de la comida. Lava y seca tus manos antes de la punción. Registrar el contexto (con o sin alimento) es clave: los rangos de referencia son distintos.",
    horariosDefault: [{ hora: "07:00", ctx: "En ayunas" }, { hora: "16:00", ctx: "2 h después de alimento" }],
  },
  presion: {
    label: "Presión arterial", unidad: "mmHg", Icon: IActivity, color: "text-red-600",
    guia: "Mide 2 veces al día a la misma hora: en la mañana antes de desayunar y de tomar medicamentos, y en la noche antes de cenar. Siéntate con la espalda apoyada y reposa 5 minutos antes; brazo a la altura del corazón, sin cafeína, ejercicio ni cigarro 30 min antes. Medir siempre a las mismas horas permite detectar patrones reales.",
    horariosDefault: [{ hora: "07:30", ctx: "Mañana (antes de medicamentos)" }, { hora: "19:30", ctx: "Noche (antes de cenar)" }],
  },
  peso: {
    label: "Peso", unidad: "kg", Icon: IScale, color: "text-indigo-600",
    guia: "Pésate siempre a la misma hora: en la mañana, en ayunas, después de ir al baño, con ropa ligera y en la misma báscula sobre piso firme. El peso varía hasta 1-2 kg durante el día, por eso la constancia en el horario es lo que revela la tendencia real.",
    horariosDefault: [{ hora: "07:00", ctx: "En ayunas, después del baño" }],
  },
  spo2: {
    label: "Oxigenación (SpO2)", unidad: "%", Icon: ILung, color: "text-cyan-600",
    guia: "Mide en reposo, sentado y tras 5 minutos de calma, con la mano tibia y sin esmalte de uñas (dedo índice o medio). Mide mañana y noche a la misma hora para detectar patrones, y adicionalmente si tienes síntomas como fatiga o falta de aire. Espera a que la lectura se estabilice (20-30 segundos).",
    horariosDefault: [{ hora: "08:00", ctx: "Mañana en reposo" }, { hora: "20:00", ctx: "Noche en reposo" }],
  },
};

const clasificar = (tipo, a, b, ctx) => {
  if (tipo === "glucosa") {
    const v = Number(a);
    const post = ctx === "2 h después de alimento";
    if (v < 70) return { txt: "Baja (hipoglucemia)", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
    if (post) {
      if (v < 140) return { txt: "Normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200" };
      if (v < 200) return { txt: "Elevada", cls: "bg-amber-100 text-amber-700 border-amber-200" };
      return { txt: "Alta", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
    }
    if (v < 100) return { txt: "Normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200" };
    if (v < 126) return { txt: "Elevada", cls: "bg-amber-100 text-amber-700 border-amber-200" };
    return { txt: "Alta", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
  }
  if (tipo === "presion") {
    const s = Number(a), d = Number(b);
    if (s >= 180 || d >= 120) return { txt: "Crisis — busca atención médica", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
    if (s >= 140 || d >= 90) return { txt: "Hipertensión etapa 2", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
    if (s >= 130 || d >= 80) return { txt: "Hipertensión etapa 1", cls: "bg-amber-100 text-amber-700 border-amber-200" };
    if (s >= 120) return { txt: "Elevada", cls: "bg-amber-100 text-amber-700 border-amber-200" };
    if (s < 90 || d < 60) return { txt: "Baja", cls: "bg-sky-100 text-sky-700 border-sky-200" };
    return { txt: "Normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200" };
  }
  if (tipo === "spo2") {
    const v = Number(a);
    if (v < 90) return { txt: "Muy baja — busca atención médica", cls: "bg-rose-100 text-rose-700 border-rose-200", alerta: true };
    if (v < 95) return { txt: "Baja", cls: "bg-amber-100 text-amber-700 border-amber-200" };
    return { txt: "Normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200" };
  }
  return null;
};

function Sparkline({ puntos, puntos2, banda, unidad, fechas }) {
  if (!puntos || puntos.length < 2) return null;
  const todos = (puntos2 ? puntos.concat(puntos2) : puntos).concat(banda ? banda : []);
  const min = Math.min(...todos), max = Math.max(...todos);
  const rango = max - min || 1;
  const W = 300, H = 90, P = 8, L = 34;
  const Y = (v) => H - P - ((v - min) / rango) * (H - 2 * P);
  const linea = (arr) => arr.map((v, i) => {
    const x = L + (i * (W - L - P)) / (arr.length - 1);
    return x.toFixed(1) + "," + Y(v).toFixed(1);
  }).join(" ");
  return (
    <div>
      <svg viewBox={"0 0 " + W + " " + H} className="w-full h-24">
        {banda && (
          <rect x={L} y={Y(Math.min(banda[1], max))} width={W - L - P}
            height={Math.max(2, Y(Math.max(banda[0], min)) - Y(Math.min(banda[1], max)))}
            fill="#d1fae5" opacity="0.6" rx="3" />
        )}
        <text x={L - 4} y={Y(max) + 4} textAnchor="end" fontSize="9" fill="#94a3b8">{max}</text>
        <text x={L - 4} y={Y(min) + 4} textAnchor="end" fontSize="9" fill="#94a3b8">{min}</text>
        {banda && banda[0] > min && <text x={L - 4} y={Y(banda[0]) + 3} textAnchor="end" fontSize="8" fill="#059669">{banda[0]}</text>}
        {banda && banda[1] < max && <text x={L - 4} y={Y(banda[1]) + 3} textAnchor="end" fontSize="8" fill="#059669">{banda[1]}</text>}
        {puntos2 && <polyline points={linea(puntos2)} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 3" strokeLinecap="round" />}
        <polyline points={linea(puntos)} fill="none" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {puntos.map((v, i) => {
          const x = L + (i * (W - L - P)) / (puntos.length - 1);
          const fuera = banda && (v < banda[0] || v > banda[1]);
          return <circle key={i} cx={x} cy={Y(v)} r={i === puntos.length - 1 ? 4 : 2.5} fill={fuera ? "#e11d48" : "#059669"} />;
        })}
      </svg>
      {fechas && fechas.length >= 2 && (
        <div className="flex justify-between text-[10px] text-slate-400 px-1" style={{ paddingLeft: "34px" }}>
          <span>{fmtDate(fechas[0])}</span><span>{fmtDate(fechas[fechas.length - 1])}</span>
        </div>
      )}
      {banda && <div className="text-[10px] text-emerald-700 text-center mt-0.5">Zona sombreada = rango de referencia ({banda[0]}–{banda[1]} {unidad}) · puntos rojos = fuera de rango</div>}
    </div>
  );
}

/* IMC (índice de masa corporal) */
const calcIMC = (pesoKg, estCm) => {
  if (!pesoKg || !estCm) return null;
  const m = estCm / 100;
  return Math.round((pesoKg / (m * m)) * 10) / 10;
};
const clasIMC = (pesoKg, estCm) => {
  const imc = calcIMC(pesoKg, estCm);
  if (imc === null) return null;
  if (imc < 18.5) return { imc, txt: "Bajo peso", cls: "bg-sky-100 text-sky-700 border-sky-200", dir: "subir" };
  if (imc < 25) return { imc, txt: "Peso normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200", dir: null };
  if (imc < 30) return { imc, txt: "Sobrepeso", cls: "bg-amber-100 text-amber-700 border-amber-200", dir: "bajar" };
  if (imc < 35) return { imc, txt: "Obesidad grado I", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
  if (imc < 40) return { imc, txt: "Obesidad grado II", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
  return { imc, txt: "Obesidad grado III", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
};
const rangoPesoSaludable = (estCm) => {
  if (!estCm) return null;
  const m = estCm / 100;
  return [Math.round(18.5 * m * m * 10) / 10, Math.round(24.9 * m * m * 10) / 10];
};
const calcEdad = (fechaNac) => {
  if (!fechaNac) return null;
  const n = parseDate(fechaNac), h = new Date();
  let e = h.getFullYear() - n.getFullYear();
  if (h.getMonth() < n.getMonth() || (h.getMonth() === n.getMonth() && h.getDate() < n.getDate())) e--;
  return e;
};

/* ============================================================
   Perfil del paciente + respaldo de datos
   ============================================================ */
function Perfil({ data, persist, avisar }) {
  const perfil = data.perfil || {};
  const [open, setOpen] = useState(!perfil.estatura);
  const [p, setP] = useState({ nombre: perfil.nombre || "", fechaNac: perfil.fechaNac || "", sexo: perfil.sexo || "", estatura: perfil.estatura || "", condiciones: perfil.condiciones || "", alergias: perfil.alergias || "", contacto: perfil.contacto || "" });
  const set = (k, v) => setP((prev) => ({ ...prev, [k]: v }));
  const fileRef = React.useRef(null);

  const guardar = () => {
    persist({ ...data, perfil: { ...p, estatura: p.estatura ? Number(p.estatura) : "" } });
    avisar("Perfil guardado");
    setOpen(false);
  };

  const exportar = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "medicontrol-respaldo-" + todayStr() + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
    avisar("Respaldo descargado");
  };

  const importar = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || typeof d !== "object" || !Array.isArray(d.meds)) throw new Error("formato");
        persist({ meds: d.meds || [], taken: d.taken || {}, inv: d.inv || [], vitals: d.vitals || { readings: [], horarios: null }, perfil: d.perfil || {}, catalogo: d.catalogo || {}, comidas: d.comidas || [], agua: d.agua || {} });
        avisar("Respaldo restaurado correctamente");
      } catch (err) { avisar("El archivo no es un respaldo válido de MediControl"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const edad = calcEdad(perfil.fechaNac);

  return (
    <section className="bg-white rounded-2xl border border-slate-200 p-4">
      <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between">
        <span className="font-bold text-slate-700 text-sm flex items-center gap-2">
          <IUser cls="w-4 h-4 text-emerald-700" />
          {perfil.nombre ? perfil.nombre : "Perfil del paciente"}
          {perfil.estatura && <span className="text-xs font-normal text-slate-400">· {perfil.estatura} cm{edad !== null ? " · " + edad + " años" : ""}{perfil.sexo ? " · " + perfil.sexo : ""}</span>}
          {!perfil.estatura && <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">completa tu estatura para calcular tu IMC</span>}
        </span>
        {open ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
      </button>
      {open && (
        <div className="mt-3 space-y-3">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Nombre</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Tu nombre" value={p.nombre} onChange={(e) => set("nombre", e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Fecha de nacimiento</label>
              <input type="date" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={p.fechaNac} onChange={(e) => set("fechaNac", e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Sexo</label>
              <select className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={p.sexo} onChange={(e) => set("sexo", e.target.value)}>
                <option value="">—</option><option>Hombre</option><option>Mujer</option>
              </select>
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Estatura (cm) *</label>
              <input type="number" min="50" max="250" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="170" value={p.estatura} onChange={(e) => set("estatura", e.target.value)} />
            </div>
            <div className="col-span-2 sm:col-span-3">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Condiciones / diagnósticos (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Ej. Hipertensión, diabetes tipo 2…" value={p.condiciones} onChange={(e) => set("condiciones", e.target.value)} />
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Alergias (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Ej. Penicilina" value={p.alergias} onChange={(e) => set("alergias", e.target.value)} />
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Contacto de emergencia (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Nombre y teléfono" value={p.contacto} onChange={(e) => set("contacto", e.target.value)} />
            </div>
          </div>
          <button onClick={guardar} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 rounded-2xl">Guardar perfil</button>
          <div className="flex gap-2 pt-1 border-t border-slate-100">
            <button onClick={exportar} className="flex-1 inline-flex items-center justify-center gap-1.5 text-sm font-medium px-3 py-2 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 mt-2">
              <IDownload cls="w-4 h-4" /> Descargar respaldo
            </button>
            <button onClick={() => fileRef.current && fileRef.current.click()} className="flex-1 inline-flex items-center justify-center gap-1.5 text-sm font-medium px-3 py-2 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 mt-2">
              <IUpload cls="w-4 h-4" /> Restaurar respaldo
            </button>
            <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={importar} />
          </div>
          <p className="text-xs text-slate-400">El respaldo descarga todos tus datos (medicamentos, inventario, mediciones y perfil) en un archivo. Guárdalo para no perder nada si cambias de navegador o computadora.</p>
        </div>
      )}
    </section>
  );
}

  const [editRead, setEditRead] = useState(null);
  const [err, setErr] = useState(null);

  const ahora = new Date();

  const [f, setF] = useState({ a: "", b: "", pulso: "", ctx: CTX_GLUCOSA[0], fecha: hoy, hora: horaActual, notas: "" });
  const [nuevaHora, setNuevaHora] = useState("08:00");

  };

  const exportarSaludPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const enRango = readings.filter((r) => r.fecha >= pdfDesde && r.fecha <= pdfHasta);
    if (enRango.length === 0) { avisar("No hay mediciones en el rango de fechas seleccionado"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const perfil = data.perfil || {};
    const edad = calcEdad(perfil.fechaNac);
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Reporte de salud", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    const linea1 = (perfil.nombre ? "Paciente: " + perfil.nombre : "Paciente") + (edad !== null ? "  ·  " + edad + " años" : "") + (perfil.sexo ? "  ·  " + perfil.sexo : "") + (estatura ? "  ·  Estatura: " + estatura + " cm" : "");
    doc.text(linea1, 14, 21);
    doc.text("Periodo: " + fmtDateLong(pdfDesde) + " — " + fmtDateLong(pdfHasta) + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 26);
    if (perfil.condiciones) doc.text("Condiciones: " + perfil.condiciones, 14, 31);
    let y = perfil.condiciones ? 37 : 33;

    Object.keys(METRICAS).forEach((t) => {
      const m = METRICAS[t];
      const rows = enRango.filter((r) => r.tipo === t).slice().sort((a, b) => ((a.fecha + a.hora) < (b.fecha + b.hora) ? -1 : 1));
      if (rows.length === 0) return;
      if (y > 250) { doc.addPage(); y = 15; }
      doc.setFontSize(12); doc.setTextColor(4, 120, 87);
      doc.text(m.label + " (" + m.unidad + ")", 14, y);
      const body = rows.map((r) => {
        const c = t === "peso" ? clasIMC(r.a, estatura) : clasificar(t, r.a, r.b, r.ctx);
        const val = t === "presion" ? r.a + "/" + r.b + (r.pulso ? "  ·  " + r.pulso + " lpm" : "") : String(r.a);
        const clas = c ? (c.txt + (t === "peso" && c.imc ? " (IMC " + c.imc + ")" : "")) : "—";
        return [fmtDate(r.fecha), fmt12(r.hora), val, r.ctx || "—", clas, r.notas || ""];
      });
      doc.autoTable({
        head: [["Fecha", "Hora", "Valor", "Contexto", "Clasificación", "Notas"]],
        body, startY: y + 2,
        styles: { fontSize: 8, cellPadding: 1.6 },
        headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
        alternateRowStyles: { fillColor: [245, 250, 248] },
        didParseCell: (d) => {
          if (d.section === "body" && d.column.index === 4) {
            const raw = String(d.cell.raw);
            if (raw.indexOf("Normal") !== 0 && raw !== "—") { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
            else { d.cell.styles.textColor = [4, 120, 87]; }
          }
        },
      });
      y = doc.lastAutoTable.finalY + 4;
      const vals = rows.map((r) => r.a);
      const fuera = rows.filter((r) => esFuera(r)).length;
      const promA = Math.round((vals.reduce((s, v) => s + v, 0) / vals.length) * 10) / 10;
      let resumen = "Resumen: " + rows.length + " mediciones  ·  Promedio: " + promA;
      if (t === "presion") {
        const promB = Math.round((rows.reduce((s, r) => s + r.b, 0) / rows.length) * 10) / 10;
        resumen = "Resumen: " + rows.length + " mediciones  ·  Promedio: " + promA + "/" + promB;
      }
      resumen += "  ·  Mín: " + Math.min(...vals) + "  ·  Máx: " + Math.max(...vals) + "  ·  Fuera de rango: " + fuera + (fuera > 0 ? "  (marcadas en rojo)" : "");
      doc.setFontSize(8); doc.setTextColor(fuera > 0 ? 190 : 60, fuera > 0 ? 18 : 60, fuera > 0 ? 60 : 60);
      doc.text(resumen, 14, y);
      y += 9;
    });

    if (y > 270) { doc.addPage(); y = 15; }
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Rangos de referencia generales para adultos (ADA/AHA). Este reporte es informativo y no sustituye la valoración médica.", 14, y);
    doc.save("reporte-salud-" + pdfDesde + "-a-" + pdfHasta + ".pdf");
    avisar("Reporte de salud en PDF descargado");
  };

  const M = METRICAS[tipo];

  const guardarVitals = (next) => persist({ ...data, vitals: next });

  const cambiarTipo = (t) => {
    setTipo(t);
    setErr(null);
    setEditRead(null);
    setF({ a: "", b: "", pulso: "", ctx: t === "glucosa" ? CTX_GLUCOSA[0] : (horarios[t][0] ? horarios[t][0].ctx : ""), fecha: hoy, hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()), notas: "" });
  };

  const editarLectura = (r) => {
    setTipo(r.tipo);
    setEditRead(r.id);
    setErr(null);
    setF({ a: r.a, b: r.b || "", pulso: r.pulso || "", ctx: r.ctx || (r.tipo === "glucosa" ? CTX_GLUCOSA[0] : ""), fecha: r.fecha, hora: r.hora, notas: r.notas || "" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const registrar = () => {
    if (!f.a || Number(f.a) <= 0) return setErr(tipo === "presion" ? "Escribe la presión sistólica (número de arriba)." : "Escribe el valor de la medición.");
    if (tipo === "presion" && (!f.b || Number(f.b) <= 0)) return setErr("Escribe la presión diastólica (número de abajo).");
    setErr(null);
    const r = {
      id: editRead || uid(), tipo, fecha: f.fecha, hora: f.hora,
      a: Number(f.a), b: tipo === "presion" ? Number(f.b) : null,
      pulso: tipo === "presion" && f.pulso ? Number(f.pulso) : null,
      ctx: f.ctx || "", notas: f.notas.trim(), ts: new Date().toISOString(),
    };
    const nuevas = editRead ? readings.map((x) => (x.id === editRead ? r : x)) : [...readings, r];
    guardarVitals({ ...vitals, readings: nuevas, horarios });
    const c = tipo === "peso" ? clasIMC(r.a, estatura) : clasificar(tipo, r.a, r.b, r.ctx);
    avisar((editRead ? "Medición corregida" : "Medición registrada") + (c ? " · " + c.txt : ""));
    setEditRead(null);
    setF({ ...f, a: "", b: "", pulso: "", notas: "", hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()) });
  };

  const eliminarLectura = (id) => {
    guardarVitals({ ...vitals, readings: readings.filter((r) => r.id !== id), horarios });
    setConfirmDel(null);
    avisar("Medición eliminada");
  };

  /* horarios de medición */
  const agregarHora = () => {
    const lista = horarios[tipo] || [];
    if (lista.some((h) => h.hora === nuevaHora)) { avisar("Esa hora ya está en el horario"); return; }
    const item = { hora: nuevaHora, ctx: tipo === "glucosa" ? nuevoCtx : (f.ctx || "") };
    const next = { ...horarios, [tipo]: [...lista, item].sort((x, y) => timeToMin(x.hora) - timeToMin(y.hora)) };
    guardarVitals({ ...vitals, readings, horarios: next });
    avisar("Hora agregada al horario de medición");
  };

  const quitarHora = (hora) => {
    const next = { ...horarios, [tipo]: horarios[tipo].filter((h) => h.hora !== hora) };
    guardarVitals({ ...vitals, readings, horarios: next });
  };

  /* mediciones de hoy según horario (hecha si hay lectura hoy a ±2 h de la hora programada) */
  const lecturasHoy = readings.filter((r) => r.tipo === tipo && r.fecha === hoy);
  const checklistHoy = (horarios[tipo] || []).map((h) => {
    const done = lecturasHoy.some((r) => circDist(timeToMin(r.hora), timeToMin(h.hora)) <= 120);
    return { ...h, done };
  });

  /* historial y estadísticas */
  const delTipo = readings.filter((r) => r.tipo === tipo)
    .slice().sort((x, y) => ((x.fecha + x.hora) < (y.fecha + y.hora) ? -1 : 1));
  const ultimas = delTipo.slice(-14);
  const ultima = delTipo[delTipo.length - 1];
  const hace7 = addDays(hoy, -6);
  const semana = delTipo.filter((r) => r.fecha >= hace7);
  const prom = (arr, k) => arr.length ? Math.round((arr.reduce((s, r) => s + r[k], 0) / arr.length) * 10) / 10 : null;
  const prevPeso = tipo === "peso" && delTipo.length > 1 ? delTipo[delTipo.length - 2] : null;
  const deltaPeso = prevPeso && ultima ? Math.round((ultima.a - prevPeso.a) * 10) / 10 : null;

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  return (
    <div className="space-y-4">
      {/* perfil del paciente */}
      <Perfil data={data} persist={persist} avisar={avisar} />

      {/* exportar reporte PDF por fechas */}
      {readings.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="flex flex-wrap items-end gap-3">
            <div className="flex items-center gap-2 font-bold text-slate-700 text-sm w-full sm:w-auto"><IDownload cls="w-4 h-4 text-emerald-700" /> Reporte PDF para tu médico</div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Desde</label>
              <input type="date" className="rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={pdfDesde} onChange={(e) => setPdfDesde(e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Hasta</label>
              <input type="date" className="rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={pdfHasta} onChange={(e) => setPdfHasta(e.target.value)} />
            </div>
            <button onClick={exportarSaludPDF} className="bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-1.5">
              <IDownload cls="w-4 h-4" /> Exportar PDF
            </button>
          </div>
          <p className="text-xs text-slate-400 mt-2">Incluye glucosa, presión arterial, peso y oxigenación del periodo, con las mediciones fuera de rango resaltadas en rojo y resumen estadístico por métrica.</p>
        </section>
      )}

      {/* selector de métrica */}
      <div className="grid grid-cols-4 gap-2">
        {Object.keys(METRICAS).map((t) => {
          const m = METRICAS[t];
          const activo = tipo === t;
          return (
            <button key={t} onClick={() => cambiarTipo(t)}
              className={"rounded-2xl border p-3 flex flex-col items-center gap-1 transition-colors " +
                (activo ? "bg-emerald-700 border-emerald-700 text-white" : "bg-white border-slate-200 text-slate-600 hover:border-emerald-300")}>
              <m.Icon cls={"w-6 h-6 " + (activo ? "text-white" : m.color)} />
              <span className="text-xs font-semibold text-center leading-tight">{m.label}</span>
            </button>
          );
        })}
      </div>

      {/* mediciones de hoy según horario */}
      {checklistHoy.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-2">Mediciones de {M.label.toLowerCase()} para hoy</div>
          <div className="flex flex-wrap gap-2">
            {checklistHoy.map((h) => (
              <button key={h.hora} onClick={() => { if (!h.done) setF({ ...f, hora: h.hora, ctx: h.ctx || f.ctx }); }}
                className={"inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-full border " +
                  (h.done ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                {h.done ? <ICheckCircle cls="w-4 h-4" /> : <IClock cls="w-4 h-4" />}
                {fmt12(h.hora)}{h.ctx ? " · " + h.ctx : ""}
              </button>
            ))}
          </div>
          <p className="text-xs text-slate-400 mt-1.5">Toca una medición pendiente para prellenar el registro con esa hora y contexto.</p>
        </section>
      )}

      {/* registro rápido */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><M.Icon cls={"w-5 h-5 " + M.color} /> {editRead ? "Corregir medición de " : "Registrar "}{M.label.toLowerCase()}</h2>
        {editRead && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 flex items-center justify-between text-sm">
            <span className="text-amber-800 font-medium flex items-center gap-1.5"><IEdit cls="w-4 h-4" /> Editando una medición existente</span>
            <button onClick={() => cambiarTipo(tipo)} className="text-xs px-2.5 py-1 rounded-lg bg-white border border-amber-300 text-amber-800">Cancelar</button>
          </div>
        )}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {tipo === "presion" ? (
            <React.Fragment>
              <div>
                <label className={labelCls}>Sistólica (arriba)</label>
                <input type="number" min="1" className={inputCls} placeholder="120" value={f.a} onChange={(e) => set("a", e.target.value)} />
              </div>
              <div>
                <label className={labelCls}>Diastólica (abajo)</label>
                <input type="number" min="1" className={inputCls} placeholder="80" value={f.b} onChange={(e) => set("b", e.target.value)} />
              </div>
              <div>
                <label className={labelCls}>Pulso (opcional)</label>
                <input type="number" min="1" className={inputCls} placeholder="72" value={f.pulso} onChange={(e) => set("pulso", e.target.value)} />
              </div>
            </React.Fragment>
          ) : (
            <div className={tipo === "glucosa" ? "" : "col-span-2"}>
              <label className={labelCls}>Valor ({M.unidad})</label>
              <input type="number" min="1" step={tipo === "peso" ? "0.1" : "1"} className={inputCls}
                placeholder={tipo === "glucosa" ? "95" : tipo === "peso" ? "78.5" : "97"}
                value={f.a} onChange={(e) => set("a", e.target.value)} />
            </div>
          )}
          {tipo === "glucosa" && (
            <div className="col-span-2 sm:col-span-1">
              <label className={labelCls}>Contexto de alimento</label>
              <select className={inputCls} value={f.ctx} onChange={(e) => set("ctx", e.target.value)}>
                {CTX_GLUCOSA.map((c) => <option key={c}>{c}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className={labelCls}>Fecha</label>
            <input type="date" className={inputCls} value={f.fecha} onChange={(e) => set("fecha", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Hora</label>
            <input type="time" className={inputCls} value={f.hora} onChange={(e) => set("hora", e.target.value)} />
          </div>
        </div>
        <div>
          <label className={labelCls}>Notas (opcional)</label>
          <input className={inputCls} placeholder={tipo === "glucosa" ? "Ej. Comí tacos al pastor, me sentí mareado…" : "Ej. Después de caminar, con dolor de cabeza…"} value={f.notas} onChange={(e) => set("notas", e.target.value)} />
        </div>
        {err && (
          <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" /> {err}
          </div>
        )}
        <button onClick={registrar} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
          <IPlus cls="w-5 h-5" /> {editRead ? "Guardar corrección" : "Guardar medición"}
        </button>
      </section>

      {/* cómo medir correctamente */}
      <section className="bg-sky-50 rounded-2xl border border-sky-100 p-4">
        <button onClick={() => setGuiaOpen(!guiaOpen)} className="w-full flex items-center justify-between text-sky-900">
          <span className="font-semibold text-sm flex items-center gap-2"><ISteth cls="w-4 h-4" /> Cómo medir correctamente</span>
          {guiaOpen ? <IChevD cls="w-4 h-4" /> : <IChevR cls="w-4 h-4" />}
        </button>
        {guiaOpen && <p className="text-sm text-sky-900 mt-2">{M.guia}</p>}
      </section>

      {/* horario de medición */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <button onClick={() => setHorarioOpen(!horarioOpen)} className="w-full flex items-center justify-between">
          <span className="font-bold text-slate-700 text-sm flex items-center gap-2"><IClock cls="w-4 h-4 text-emerald-700" /> Horario de medición ({(horarios[tipo] || []).length} al día)</span>
          {horarioOpen ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
        </button>
        {horarioOpen && (
          <div className="mt-3 space-y-3">
            <div className="flex flex-wrap gap-2">
              {(horarios[tipo] || []).map((h) => (
                <span key={h.hora} className="inline-flex items-center gap-1.5 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-3 py-1 rounded-full">
                  {fmt12(h.hora)}{h.ctx ? " · " + h.ctx : ""}
                  <button onClick={() => quitarHora(h.hora)} className="hover:text-rose-600"><IX cls="w-3.5 h-3.5" /></button>
                </span>
              ))}
              {(horarios[tipo] || []).length === 0 && <span className="text-sm text-slate-400">Sin horas programadas.</span>}
            </div>
            <div className="flex flex-wrap gap-2 items-end">
              <div>
                <label className={labelCls}>Nueva hora</label>
                <input type="time" className={inputCls} value={nuevaHora} onChange={(e) => setNuevaHora(e.target.value)} />
              </div>
              {tipo === "glucosa" && (
                <div>
                  <label className={labelCls}>Contexto</label>
                  <select className={inputCls} value={nuevoCtx} onChange={(e) => setNuevoCtx(e.target.value)}>
                    {CTX_GLUCOSA.map((c) => <option key={c}>{c}</option>)}
                  </select>
                </div>
              )}
              <button onClick={agregarHora} className="bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-1.5">
                <IPlus cls="w-4 h-4" /> Agregar
              </button>
            </div>
            <p className="text-xs text-slate-400">Medir siempre a las mismas horas es lo que permite comparar días y detectar patrones reales.</p>
          </div>
        )}
      </section>

      {/* análisis de peso con IMC y recomendación */}
      {tipo === "peso" && ultima && (
        estatura ? (() => {
          const c = clasIMC(ultima.a, estatura);
          const rango = rangoPesoSaludable(estatura);
          const exceso = Math.round((ultima.a - rango[1]) * 10) / 10;
          const falta = Math.round((rango[0] - ultima.a) * 10) / 10;
          const kg = c.dir === "bajar" ? exceso : c.dir === "subir" ? falta : 0;
          const semanas = kg > 0 ? Math.ceil(kg / 0.5) : 0;
          return (
            <section className={"rounded-2xl border p-4 " + (c.dir ? "bg-amber-50 border-amber-200" : "bg-emerald-50 border-emerald-200")}>
              <div className="flex items-center gap-2 flex-wrap">
                <span className="font-bold text-slate-800">IMC: {c.imc}</span>
                <span className={"text-xs px-2 py-0.5 rounded-full border " + c.cls}>{c.txt}</span>
                <span className="text-xs text-slate-500">Rango saludable para tu estatura ({estatura} cm): <b>{rango[0]} – {rango[1]} kg</b></span>
              </div>
              {c.dir ? (
                <div className="text-sm text-slate-700 mt-2 space-y-1">
                  <p><b>Objetivo sugerido:</b> {c.dir === "bajar" ? "bajar" : "subir"} aproximadamente <b>{kg} kg</b> para entrar al rango saludable. A un ritmo seguro de 0.5 kg por semana, eso tomaría alrededor de <b>{semanas} semanas ({semanas * 7} días)</b>.</p>
                  <p className="text-xs text-slate-600">{c.dir === "bajar"
                    ? "Sugerencias generales: prioriza verduras, frutas y proteína magra; reduce bebidas azucaradas, frituras y ultraprocesados; procura 150 minutos de actividad moderada a la semana (caminar cuenta) y duerme 7-8 horas. Pésate a la misma hora para ver la tendencia real."
                    : "Sugerencias generales: aumenta la frecuencia de comidas con alimentos densos en nutrientes (avena, frutos secos, aguacate, lácteos, proteína); acompaña con ejercicio de fuerza para ganar masa muscular y no solo grasa."}</p>
                  <p className="text-xs text-slate-400">Estas metas son orientativas y basadas en el IMC; tu médico puede ajustar el objetivo según tu composición corporal y condiciones.</p>
                </div>
              ) : (
                <p className="text-sm text-emerald-800 mt-1.5">Estás dentro del rango saludable. Mantén tus hábitos y continúa monitoreando a la misma hora para detectar cambios de tendencia a tiempo.</p>
              )}
            </section>
          );
        })() : (
          <section className="bg-amber-50 rounded-2xl border border-amber-200 p-4 text-sm text-amber-800 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" /> Para calcular tu IMC e indicarte si estás en peso normal, sobrepeso o bajo peso, completa tu <b>estatura</b> en el Perfil del paciente (arriba).
          </section>
        )
      )}

      {/* estadísticas y tendencia */}
      {delTipo.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="grid grid-cols-3 gap-3 mb-2">
            <div className="text-center">
              <div className="text-xl font-extrabold text-slate-800">
                {ultima ? (tipo === "presion" ? ultima.a + "/" + ultima.b : ultima.a) : "—"}
                <span className="text-xs font-medium text-slate-400"> {M.unidad}</span>
              </div>
              <div className="text-xs text-slate-500">Última ({ultima ? fmtDate(ultima.fecha) : ""})</div>
            </div>
            <div className="text-center">
              <div className="text-xl font-extrabold text-slate-800">
                {tipo === "presion" ? (prom(semana, "a") || "—") + "/" + (prom(semana, "b") || "—") : (prom(semana, "a") ?? "—")}
                <span className="text-xs font-medium text-slate-400"> {M.unidad}</span>
              </div>
              <div className="text-xs text-slate-500">Promedio 7 días ({semana.length} med.)</div>
            </div>
            <div className="text-center">
              {tipo === "peso" && deltaPeso !== null ? (
                <React.Fragment>
                  <div className={"text-xl font-extrabold " + (deltaPeso > 0 ? "text-amber-600" : deltaPeso < 0 ? "text-emerald-700" : "text-slate-800")}>
                    {deltaPeso > 0 ? "+" : ""}{deltaPeso} kg
                  </div>
                  <div className="text-xs text-slate-500">vs. medición anterior</div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="text-xl font-extrabold text-slate-800">{delTipo.length}</div>
                  <div className="text-xs text-slate-500">Mediciones totales</div>
                </React.Fragment>
              )}
            </div>
          </div>
          {ultimas.length >= 2 && (
            <React.Fragment>
              <Sparkline puntos={ultimas.map((r) => r.a)} puntos2={tipo === "presion" ? ultimas.map((r) => r.b) : null}
                unidad={M.unidad} fechas={ultimas.map((r) => r.fecha)}
                banda={tipo === "glucosa" ? [70, 140] : tipo === "presion" ? [90, 120] : tipo === "spo2" ? [95, 100] : (estatura ? rangoPesoSaludable(estatura) : null)} />
              <div className="text-xs text-slate-400 text-center">Tendencia de las últimas {ultimas.length} mediciones{tipo === "presion" ? " (verde: sistólica · gris punteada: diastólica)" : ""}</div>
            </React.Fragment>
          )}
        </section>
      )}

      {/* historial */}
      <section>
        <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">Historial de {M.label.toLowerCase()}</h2>
        {delTipo.length === 0 ? (
          <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-6 text-center text-sm text-slate-400">
            Aún no hay mediciones de {M.label.toLowerCase()}. Registra la primera arriba.
          </div>
        ) : (
          <div className="space-y-2">
            {delTipo.slice().reverse().slice(0, 30).map((r) => {
              const c = r.tipo === "peso" ? clasIMC(r.a, estatura) : clasificar(r.tipo, r.a, r.b, r.ctx);
              return (
                <div key={r.id} className="bg-white rounded-2xl border border-slate-200 p-3.5 flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-bold text-slate-800 text-lg">
                        {tipo === "presion" ? r.a + "/" + r.b : r.a} <span className="text-xs font-medium text-slate-400">{M.unidad}</span>
                      </span>
                      {r.pulso && <span className="text-xs text-slate-500">♥ {r.pulso} lpm</span>}
                      {c && <span className={"text-xs px-2 py-0.5 rounded-full border " + c.cls}>{c.txt}{r.tipo === "peso" && c.imc ? " · IMC " + c.imc : ""}</span>}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      {fmtDate(r.fecha)} · {fmt12(r.hora)}{r.ctx ? " · " + r.ctx : ""}{r.notas ? " · " + r.notas : ""}
                    </div>
                  </div>
                  {confirmDel === r.id ? (
                    <div className="flex items-center gap-1 shrink-0">
                      <button onClick={() => eliminarLectura(r.id)} className="text-xs px-2 py-1 rounded-lg bg-rose-600 text-white">Eliminar</button>
                      <button onClick={() => setConfirmDel(null)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">No</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 shrink-0">
                      <button onClick={() => editarLectura(r)} className="text-slate-300 hover:text-emerald-700" title="Corregir esta medición"><IEdit cls="w-4 h-4" /></button>
                      <button onClick={() => setConfirmDel(r.id)} className="text-slate-300 hover:text-rose-600" title="Eliminar"><ITrash cls="w-4 h-4" /></button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </section>

      <p className="text-xs text-slate-400 text-center">Los rangos mostrados son referencias generales para adultos. No sustituyen la valoración de tu médico; si obtienes valores en zona de alerta o síntomas, busca atención médica.</p>
    </div>
  );
}

/* ============================================================
   Registro de comidas (enfoque de nutrición conductual)
   ============================================================ */
const TIPOS_COMIDA = ["Desayuno", "Colación matutina", "Comida", "Colación vespertina", "Cena"];
const GRUPOS_ALIM = [
  { id: "verduras", label: "Verduras", buena: true },
  { id: "frutas", label: "Frutas", buena: true },
  { id: "proteina", label: "Proteína (carne, huevo, leguminosas)", buena: true },
  { id: "cereales", label: "Cereales integrales", buena: true },
  { id: "lacteos", label: "Lácteos", buena: true },
  { id: "grasas", label: "Grasas saludables (aguacate, nueces, aceite de oliva)", buena: true },
  { id: "procesados", label: "Ultraprocesados / azúcar", buena: false },
  { id: "bebidas", label: "Bebida azucarada", buena: false },
  { id: "alcohol", label: "Alcohol", buena: false },
];
const CONTEXTOS_COMIDA = ["Sin distracciones", "Viendo pantalla", "Con prisa", "Por ansiedad/estrés", "Reunión social"];
const META_AGUA = 8;

function Comidas({ data, persist, avisar, hoy }) {
  const comidas = data.comidas || [];
  const agua = data.agua || {};
  const ahora = new Date();
  const vacioC = { fecha: hoy, hora: pad(ahora.getHours()) + ":" + pad(ahora.getMinutes()), tipo: "Desayuno", alimentos: "", grupos: [], hambre: 3, saciedad: 3, contexto: "", notas: "" };
  const [f, setF] = useState(vacioC);
  const [editCom, setEditCom] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [err, setErr] = useState(null);
  const [diaAbierto, setDiaAbierto] = useState(null);
  const [pdfDesde, setPdfDesde] = useState(addDays(hoy, -6));
  const [pdfHasta, setPdfHasta] = useState(hoy);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const aguaHoy = agua[hoy] || 0;
  const ajustarAgua = (d) => {
    const n = Math.max(0, aguaHoy + d);
    persist({ ...data, agua: { ...agua, [hoy]: n } });
    if (d > 0 && n === META_AGUA) avisar("¡Meta de agua del día cumplida! 💧");
  };

  const toggleGrupo = (id) => set("grupos", f.grupos.includes(id) ? f.grupos.filter((g) => g !== id) : [...f.grupos, id]);

  const guardar = () => {
    if (!f.alimentos.trim()) return setErr("Describe qué comiste (ej. 2 tacos de pollo, ensalada, agua de jamaica).");
    setErr(null);
    const c = { id: editCom || uid(), fecha: f.fecha, hora: f.hora, tipo: f.tipo, alimentos: f.alimentos.trim(), grupos: f.grupos, hambre: Number(f.hambre), saciedad: Number(f.saciedad), contexto: f.contexto, notas: f.notas.trim(), ts: new Date().toISOString() };
    persist({ ...data, comidas: editCom ? comidas.map((x) => (x.id === editCom ? c : x)) : [...comidas, c] });
    avisar(editCom ? "Comida corregida" : "Comida registrada");
    setEditCom(null);
    setF({ ...vacioC, fecha: f.fecha, hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()) });
  };

  const editar = (c) => {
    setEditCom(c.id);
    setF({ fecha: c.fecha, hora: c.hora, tipo: c.tipo, alimentos: c.alimentos, grupos: c.grupos || [], hambre: c.hambre, saciedad: c.saciedad, contexto: c.contexto || "", notas: c.notas || "" });
    setErr(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const eliminar = (id) => {
    persist({ ...data, comidas: comidas.filter((c) => c.id !== id) });
    setConfirmDel(null);
    avisar("Registro eliminado");
  };

  const porFecha = (fecha) => comidas.filter((c) => c.fecha === fecha).slice().sort((a, b) => (a.hora < b.hora ? -1 : 1));
  const deHoy = porFecha(hoy);
  const fechasPasadas = [...new Set(comidas.filter((c) => c.fecha < hoy).map((c) => c.fecha))].sort().reverse().slice(0, 14);

  const resumenDia = (lista) => {
    const g = {};
    lista.forEach((c) => (c.grupos || []).forEach((x) => { g[x] = (g[x] || 0) + 1; }));
    return g;
  };

  const exportarComidasPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const enRango = comidas.filter((c) => c.fecha >= pdfDesde && c.fecha <= pdfHasta).slice().sort((a, b) => ((a.fecha + a.hora) < (b.fecha + b.hora) ? -1 : 1));
    if (enRango.length === 0) { avisar("No hay comidas registradas en ese rango de fechas"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const perfil = data.perfil || {};
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Diario de alimentación", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text((perfil.nombre ? "Paciente: " + perfil.nombre + "  ·  " : "") + "Periodo: " + fmtDateLong(pdfDesde) + " — " + fmtDateLong(pdfHasta) + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    const nombreGrupo = (id) => { const g = GRUPOS_ALIM.find((x) => x.id === id); return g ? g.label.split(" (")[0] : id; };
    doc.autoTable({
      head: [["Fecha", "Hora", "Comida", "Alimentos", "Grupos presentes", "Hambre→Saciedad", "Contexto", "Notas"]],
      body: enRango.map((c) => [
        fmtDate(c.fecha), fmt12(c.hora), c.tipo, c.alimentos,
        (c.grupos || []).map(nombreGrupo).join(", ") || "—",
        c.hambre + " → " + c.saciedad,
        c.contexto || "—", c.notas || "",
      ]),
      startY: 26, styles: { fontSize: 7.5, cellPadding: 1.6 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      columnStyles: { 3: { cellWidth: 70 }, 4: { cellWidth: 55 } },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 4) {
          const raw = String(d.cell.raw);
          if (raw.indexOf("Ultraprocesados") >= 0 || raw.indexOf("Bebida azucarada") >= 0 || raw.indexOf("Alcohol") >= 0) { d.cell.styles.textColor = [190, 18, 60]; }
        }
      },
    });
    let yF = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    /* análisis nutricional del periodo */
    const dias = [...new Set(enRango.map((c) => c.fecha))];
    const conVerduras = enRango.filter((c) => (c.grupos || []).includes("verduras")).length;
    const conProcesados = enRango.filter((c) => (c.grupos || []).some((g) => ["procesados", "bebidas", "alcohol"].includes(g))).length;
    const sinDesayuno = dias.filter((d) => !enRango.some((c) => c.fecha === d && c.tipo === "Desayuno")).length;
    const conAnsiedad = enRango.filter((c) => c.contexto === "Por ansiedad/estrés").length;
    const conPantalla = enRango.filter((c) => c.contexto === "Viendo pantalla").length;
    const aguaProm = dias.length ? Math.round((dias.reduce((s, d) => s + (agua[d] || 0), 0) / dias.length) * 10) / 10 : 0;
    const satAlta = enRango.filter((c) => c.saciedad >= 5).length;
    doc.setFontSize(11); doc.setTextColor(4, 120, 87);
    doc.text("ANÁLISIS DEL PERIODO", 14, yF); yF += 6;
    doc.setFontSize(9); doc.setTextColor(60);
    const lineas = [
      enRango.length + " comidas registradas en " + dias.length + " días (promedio " + Math.round((enRango.length / dias.length) * 10) / 10 + " al día).",
      "Comidas con verduras: " + conVerduras + " de " + enRango.length + " (" + Math.round((conVerduras / enRango.length) * 100) + "%). Meta experta: incluir verduras en al menos 2 comidas principales al día.",
      "Comidas con ultraprocesados, bebidas azucaradas o alcohol: " + conProcesados + " (" + Math.round((conProcesados / enRango.length) * 100) + "%).",
      "Días sin desayuno registrado: " + sinDesayuno + " de " + dias.length + ".",
      "Comidas por ansiedad/estrés: " + conAnsiedad + "  ·  Comidas viendo pantalla: " + conPantalla + "  ·  Comidas hasta sentirte muy lleno (saciedad 5): " + satAlta + ".",
      "Agua: promedio de " + aguaProm + " vasos al día (meta: " + META_AGUA + ").",
    ];
    lineas.forEach((l) => { doc.text("•  " + l, 14, yF); yF += 5; });
    yF += 3;
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Registro basado en grupos de alimentos, escala de hambre-saciedad (1=nada, 5=mucho) y contexto de alimentación. No sustituye la valoración de un nutriólogo.", 14, yF);
    doc.save("diario-alimentacion-" + pdfDesde + "-a-" + pdfHasta + ".pdf");
    avisar("Diario de alimentación en PDF descargado");
  };

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  const TarjetaComida = ({ c }) => (
    <div className="bg-white rounded-2xl border border-slate-200 p-3.5 flex items-start gap-3">
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="font-bold text-slate-800">{c.tipo}</span>
          <span className="text-xs text-slate-400">{fmt12(c.hora)}</span>
          <span className="text-xs text-slate-500">hambre {c.hambre} → saciedad {c.saciedad}</span>
          {c.contexto && <span className={"text-xs px-2 py-0.5 rounded-full border " + (c.contexto === "Por ansiedad/estrés" || c.contexto === "Viendo pantalla" || c.contexto === "Con prisa" ? "bg-amber-100 text-amber-700 border-amber-200" : "bg-emerald-100 text-emerald-700 border-emerald-200")}>{c.contexto}</span>}
        </div>
        <div className="text-sm text-slate-600 mt-0.5">{c.alimentos}</div>
        <div className="flex flex-wrap gap-1 mt-1.5">
          {(c.grupos || []).map((g) => {
            const gr = GRUPOS_ALIM.find((x) => x.id === g);
            if (!gr) return null;
            return <span key={g} className={"text-[10px] px-1.5 py-0.5 rounded-full border " + (gr.buena ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-rose-50 text-rose-600 border-rose-200")}>{gr.label.split(" (")[0]}</span>;
          })}
        </div>
        {c.notas && <div className="text-xs text-slate-400 mt-1">{c.notas}</div>}
      </div>
      {confirmDel === c.id ? (
        <div className="flex items-center gap-1 shrink-0">
          <button onClick={() => eliminar(c.id)} className="text-xs px-2 py-1 rounded-lg bg-rose-600 text-white">Eliminar</button>
          <button onClick={() => setConfirmDel(null)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">No</button>
        </div>
      ) : (
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => editar(c)} className="text-slate-300 hover:text-emerald-700" title="Corregir"><IEdit cls="w-4 h-4" /></button>
          <button onClick={() => setConfirmDel(c.id)} className="text-slate-300 hover:text-rose-600" title="Eliminar"><ITrash cls="w-4 h-4" /></button>
        </div>
      )}
    </div>
  );

  return (
    <div className="space-y-4">
      {/* agua de hoy */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="font-bold text-slate-700 flex items-center gap-2"><IDrop cls="w-5 h-5 text-cyan-600" /> Agua de hoy</div>
            <div className="text-sm text-slate-500">{aguaHoy} de {META_AGUA} vasos (~{aguaHoy * 250} ml)</div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => ajustarAgua(-1)} disabled={aguaHoy === 0} className={"w-9 h-9 rounded-xl border flex items-center justify-center " + (aguaHoy === 0 ? "border-slate-200 text-slate-300" : "border-slate-300 text-slate-600 hover:bg-slate-50")}><IMinus cls="w-4 h-4" /></button>
            <div className="flex gap-1">
              {Array.from({ length: META_AGUA }).map((_, i) => (
                <div key={i} className={"w-3.5 h-6 rounded-sm " + (i < aguaHoy ? "bg-cyan-500" : "bg-slate-100 border border-slate-200")} />
              ))}
            </div>
            <button onClick={() => ajustarAgua(1)} className="w-9 h-9 rounded-xl border border-cyan-300 text-cyan-700 hover:bg-cyan-50 flex items-center justify-center"><IPlus cls="w-4 h-4" /></button>
          </div>
        </div>
      </section>

      {/* registrar comida */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><IFood cls="w-5 h-5 text-emerald-700" /> {editCom ? "Corregir comida" : "Registrar comida"}</h2>
        {editCom && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 flex items-center justify-between text-sm">
            <span className="text-amber-800 font-medium flex items-center gap-1.5"><IEdit cls="w-4 h-4" /> Editando un registro existente</span>
            <button onClick={() => { setEditCom(null); setF(vacioC); }} className="text-xs px-2.5 py-1 rounded-lg bg-white border border-amber-300 text-amber-800">Cancelar</button>
          </div>
        )}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div>
            <label className={labelCls}>Fecha</label>
            <input type="date" className={inputCls} value={f.fecha} onChange={(e) => set("fecha", e.target.value)} />
          </div>
          <div>
            <label className={labelCls}>Hora</label>
            <input type="time" className={inputCls} value={f.hora} onChange={(e) => set("hora", e.target.value)} />
          </div>
          <div className="col-span-2">
            <label className={labelCls}>Tipo de comida</label>
            <select className={inputCls} value={f.tipo} onChange={(e) => set("tipo", e.target.value)}>
              {TIPOS_COMIDA.map((t) => <option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label className={labelCls}>¿Qué comiste? (con porciones aproximadas) *</label>
          <textarea className={inputCls} rows={2} placeholder="Ej. 2 tacos de pollo con verdura, 1 vaso de agua de jamaica sin azúcar, 1 plátano" value={f.alimentos} onChange={(e) => set("alimentos", e.target.value)} />
        </div>
        <div>
          <label className={labelCls}>Grupos de alimentos presentes (toca los que aplican)</label>
          <div className="flex flex-wrap gap-1.5">
            {GRUPOS_ALIM.map((g) => (
              <button key={g.id} onClick={() => toggleGrupo(g.id)}
                className={"text-xs px-2.5 py-1.5 rounded-full border transition-colors " +
                  (f.grupos.includes(g.id)
                    ? (g.buena ? "bg-emerald-600 border-emerald-600 text-white" : "bg-rose-500 border-rose-500 text-white")
                    : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                {g.label.split(" (")[0]}
              </button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <div>
            <label className={labelCls}>Hambre antes (1-5)</label>
            <select className={inputCls} value={f.hambre} onChange={(e) => set("hambre", e.target.value)}>
              <option value="1">1 · Nada de hambre</option><option value="2">2 · Poca</option><option value="3">3 · Moderada</option><option value="4">4 · Mucha</option><option value="5">5 · Voraz</option>
            </select>
          </div>
          <div>
            <label className={labelCls}>Saciedad después (1-5)</label>
            <select className={inputCls} value={f.saciedad} onChange={(e) => set("saciedad", e.target.value)}>
              <option value="1">1 · Quedé con hambre</option><option value="2">2 · Algo satisfecho</option><option value="3">3 · Satisfecho</option><option value="4">4 · Lleno</option><option value="5">5 · Demasiado lleno</option>
            </select>
          </div>
          <div className="col-span-2 sm:col-span-1">
            <label className={labelCls}>¿Cómo comiste?</label>
            <select className={inputCls} value={f.contexto} onChange={(e) => set("contexto", e.target.value)}>
              <option value="">—</option>
              {CONTEXTOS_COMIDA.map((c) => <option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label className={labelCls}>Notas (opcional)</label>
          <input className={inputCls} placeholder="Ej. Se me antojó dulce después, comí fuera de casa…" value={f.notas} onChange={(e) => set("notas", e.target.value)} />
        </div>
        {err && (
          <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2"><IWarn cls="w-4 h-4 shrink-0" /> {err}</div>
        )}
        <button onClick={guardar} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
          <IPlus cls="w-5 h-5" /> {editCom ? "Guardar corrección" : "Guardar comida"}
        </button>
        <p className="text-xs text-slate-400">Ideal de los expertos: comer con hambre 3-4 y detenerte en saciedad 3 (satisfecho, no lleno). La escala hambre-saciedad y el contexto revelan más hábitos que contar calorías.</p>
      </section>

      {/* exportar PDF */}
      {comidas.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="flex flex-wrap items-end gap-3">
            <div className="flex items-center gap-2 font-bold text-slate-700 text-sm w-full sm:w-auto"><IDownload cls="w-4 h-4 text-emerald-700" /> Diario en PDF para tu nutriólogo</div>
            <div>
              <label className={labelCls}>Desde</label>
              <input type="date" className={inputCls} value={pdfDesde} onChange={(e) => setPdfDesde(e.target.value)} />
            </div>
            <div>
              <label className={labelCls}>Hasta</label>
              <input type="date" className={inputCls} value={pdfHasta} onChange={(e) => setPdfHasta(e.target.value)} />
            </div>
            <button onClick={exportarComidasPDF} className="bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-1.5">
              <IDownload cls="w-4 h-4" /> Exportar PDF
            </button>
          </div>
          <p className="text-xs text-slate-400 mt-2">Incluye cada comida con grupos de alimentos, hambre-saciedad y contexto, más un análisis del periodo: % de comidas con verduras, ultraprocesados, días sin desayuno, comidas por ansiedad y agua promedio.</p>
        </section>
      )}

      {/* comidas de hoy */}
      <section>
        <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">Hoy · {deHoy.length} {deHoy.length === 1 ? "comida registrada" : "comidas registradas"}</h2>
        {deHoy.length === 0 ? (
          <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-6 text-center text-sm text-slate-400">Aún no registras comidas hoy. El registro en el momento (no de memoria en la noche) es el hábito #1 de un buen diario.</div>
        ) : (
          <div className="space-y-2">
            {deHoy.map((c) => <TarjetaComida key={c.id} c={c} />)}
            <div className="flex flex-wrap gap-1.5 bg-slate-100 rounded-xl px-3 py-2">
              <span className="text-xs font-bold text-slate-500">Balance del día:</span>
              {Object.entries(resumenDia(deHoy)).map(([g, n]) => {
                const gr = GRUPOS_ALIM.find((x) => x.id === g);
                if (!gr) return null;
                return <span key={g} className={"text-xs " + (gr.buena ? "text-emerald-700" : "text-rose-600")}>{gr.label.split(" (")[0]} ×{n}</span>;
              })}
            </div>
          </div>
        )}
      </section>

      {/* historial de días anteriores */}
      {fechasPasadas.length > 0 && (
        <section>
          <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">Días anteriores</h2>
          <div className="space-y-2">
            {fechasPasadas.map((fecha) => {
              const lista = porFecha(fecha);
              const abierto = diaAbierto === fecha;
              return (
                <div key={fecha} className="bg-white rounded-2xl border border-slate-200">
                  <button onClick={() => setDiaAbierto(abierto ? null : fecha)} className="w-full flex items-center justify-between px-4 py-3 text-sm">
                    <span className="flex items-center gap-2 font-semibold text-slate-700">
                      {abierto ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
                      {fmtDate(fecha)}
                    </span>
                    <span className="text-xs text-slate-400">{lista.length} comidas · {agua[fecha] || 0} vasos de agua</span>
                  </button>
                  {abierto && <div className="px-4 pb-3 space-y-2">{lista.map((c) => <TarjetaComida key={c.id} c={c} />)}</div>}
                </div>
              );
            })}
          </div>
        </section>
      )}
    </div>
  );
}

/* ============================================================ */
function Reporte({ data, now, avisar }) {
  const [mes, setMes] = useState(now.getFullYear() + "-" + pad(now.getMonth() + 1));
  const [y, m] = mes.split("-").map(Number);
  const diasEnMes = new Date(y, m, 0).getDate();
  const nowISO = todayStr() + "T" + pad(now.getHours()) + ":" + pad(now.getMinutes());

  const mover = (d) => {
    const dt = new Date(y, m - 1 + d, 1);
    setMes(dt.getFullYear() + "-" + pad(dt.getMonth() + 1));
  };

  const filas = useMemo(() => {
    return data.meds.map((med) => {
      const fin = fechaFin(med);
      let prog = 0, tom = 0, futuras = 0;
      for (let d = 1; d <= diasEnMes; d++) {
        const fecha = y + "-" + pad(m) + "-" + pad(d);
        if (fecha < med.startDate || fecha > fin) continue;
        for (const t of med.times) {
          prog++;
          if (data.taken[doseKey(med.id, fecha, t)]) tom++;
          else if (fecha + "T" + t > nowISO) futuras++;
        }
      }
      const vencidas = prog - futuras;
      const adh = vencidas > 0 ? Math.round((tom / vencidas) * 100) : null;
      return { med, prog, tom, futuras, omitidas: Math.max(0, vencidas - tom), adh };
    }).filter((r) => r.prog > 0);
  }, [data, y, m, diasEnMes, nowISO]);

  const totProg = filas.reduce((a, r) => a + r.prog, 0);
  const totTom = filas.reduce((a, r) => a + r.tom, 0);
  const totVenc = filas.reduce((a, r) => a + (r.prog - r.futuras), 0);
  const adhGlobal = totVenc > 0 ? Math.round((totTom / totVenc) * 100) : null;

  /* patrones de olvido: qué día de la semana y qué hora acumulan más omisiones */
  const olvidos = useMemo(() => {
    const porDia = [0, 0, 0, 0, 0, 0, 0];
    const porHora = {};
    for (const med of data.meds) {
      const fin = fechaFin(med);
      for (let d = 1; d <= diasEnMes; d++) {
        const fecha = y + "-" + pad(m) + "-" + pad(d);
        if (fecha < med.startDate || fecha > fin) continue;
        for (const t of med.times) {
          if (data.taken[doseKey(med.id, fecha, t)]) continue;
          if (fecha + "T" + t > nowISO) continue;
          porDia[parseDate(fecha).getDay()]++;
          porHora[t] = (porHora[t] || 0) + 1;
        }
      }
    }
    let diaMax = 0, diaVal = 0;
    porDia.forEach((v, i) => { if (v > diaVal) { diaVal = v; diaMax = i; } });
    let horaMax = null, horaVal = 0;
    Object.keys(porHora).forEach((h) => { if (porHora[h] > horaVal) { horaVal = porHora[h]; horaMax = h; } });
    return { diaMax, diaVal, horaMax, horaVal, porDia, total: porDia.reduce((a, b) => a + b, 0) };
  }, [data, y, m, diasEnMes, nowISO]);

  const exportarReportePDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nombre = (data.perfil && data.perfil.nombre) || "";
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Reporte mensual de adherencia", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text((nombre ? "Paciente: " + nombre + "  ·  " : "") + "Mes: " + MESES[m - 1] + " " + y + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    doc.autoTable({
      head: [["Medicamento", "Dosis", "Frecuencia", "Motivo", "Programadas", "Tomadas", "Omitidas", "Por venir", "Adherencia"]],
      body: filas.map((r) => [
        r.med.name, r.med.dose, "cada " + r.med.freqHours + " h", r.med.purpose || "—",
        String(r.prog), String(r.tom), String(r.omitidas), String(r.futuras),
        r.adh === null ? "—" : r.adh + "%",
      ]),
      startY: 27, styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 6 && Number(d.cell.raw) > 0) { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
        if (d.section === "body" && d.column.index === 8 && d.cell.raw !== "—") {
          const v = parseInt(d.cell.raw);
          d.cell.styles.fontStyle = "bold";
          d.cell.styles.textColor = v >= 80 ? [4, 120, 87] : [190, 18, 60];
        }
      },
    });
    let yF = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    doc.setFontSize(11); doc.setTextColor(4, 120, 87);
    doc.text("ADHERENCIA GLOBAL DEL MES: " + (adhGlobal === null ? "—" : adhGlobal + "%") + "   (" + totTom + " de " + totVenc + " tomas vencidas)", 14, yF);
    yF += 7;
    if (olvidos.total > 0) {
      doc.setFontSize(9); doc.setTextColor(180, 83, 9);
      doc.text("Patrones de olvido: el día con más omisiones fue " + DIAS_FULL[olvidos.diaMax] + " (" + olvidos.diaVal + ")" + (olvidos.horaMax ? " y la hora con más olvidos fue " + fmt12(olvidos.horaMax) + " (" + olvidos.horaVal + ")." : "."), 14, yF);
      yF += 5;
      doc.text("Omitidas por día: " + olvidos.porDia.map((v, i) => DIAS_SEM[i] + " " + v).join("  ·  "), 14, yF);
      yF += 7;
    }
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("La adherencia se calcula solo sobre tomas cuya hora ya pasó. Documento informativo; no sustituye la valoración médica.", 14, yF);
    doc.save("reporte-adherencia-" + y + "-" + pad(m) + ".pdf");
    avisar("PDF del reporte mensual descargado");
  };

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-slate-200 p-3 flex items-center justify-between">
        <button onClick={() => mover(-1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-50">← anterior</button>
        <div className="font-bold text-slate-700 capitalize">{MESES[m - 1]} {y}</div>
        <button onClick={() => mover(1)} className="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-50">siguiente →</button>
      </div>

      {filas.length === 0 ? (
        <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-8 text-center text-slate-500 text-sm">
          <IChart cls="w-10 h-10 text-slate-300 mx-auto mb-2" />
          No hay tratamientos programados en este mes.
        </div>
      ) : (
        <React.Fragment>
          <div className="grid grid-cols-3 gap-3">
            <Kpi label="Tomas programadas" valor={totProg} />
            <Kpi label="Tomas confirmadas" valor={totTom} verde />
            <Kpi label="Adherencia" valor={adhGlobal === null ? "—" : adhGlobal + "%"} verde={adhGlobal !== null && adhGlobal >= 80} />
          </div>

          {olvidos.total > 0 && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
              <div className="font-bold text-amber-900 text-sm mb-1.5 flex items-center gap-1.5"><IWarn cls="w-4 h-4" /> Patrones de olvido de {MESES[m - 1]}</div>
              <p className="text-sm text-amber-900">
                El día que más se te olvida es <b>{DIAS_FULL[olvidos.diaMax]}</b> ({olvidos.diaVal} {olvidos.diaVal === 1 ? "toma omitida" : "tomas omitidas"})
                {olvidos.horaMax && <span> y la hora con más olvidos es <b>{fmt12(olvidos.horaMax)}</b> ({olvidos.horaVal})</span>}.
                Sugerencia: ancla esa toma a una rutina fija (al desayunar, al lavarte los dientes, al llegar del trabajo) o ponle una alarma específica.
              </p>
              <div className="flex flex-wrap gap-1.5 mt-2">
                {olvidos.porDia.map((v, i) => (
                  <span key={i} className={"text-xs px-2 py-1 rounded-lg border " + (v === 0 ? "bg-white border-slate-200 text-slate-400" : i === olvidos.diaMax ? "bg-rose-100 border-rose-200 text-rose-700 font-bold" : "bg-amber-100 border-amber-200 text-amber-800")}>
                    {DIAS_SEM[i]}: {v}
                  </span>
                ))}
              </div>
            </div>
          )}

          <div className="flex justify-end">
            <button onClick={exportarReportePDF} className="inline-flex items-center gap-1.5 text-sm font-semibold px-4 py-2 rounded-xl border border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100">
              <IDownload cls="w-4 h-4" /> Exportar reporte a PDF
            </button>
          </div>

          <div className="space-y-2">
            {filas.map((r) => {
              const cat = catInfo(r.med.category);
              return (
                <div key={r.med.id} className="bg-white rounded-2xl border border-slate-200 p-4">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-bold text-slate-800">{r.med.name}</span>
                    <span className={"text-xs px-2 py-0.5 rounded-full border " + cat.cls}>{cat.label}</span>
                    <span className="text-xs text-slate-400">cada {r.med.freqHours} h · {r.med.dose}</span>
                  </div>
                  {r.med.purpose && <div className="text-xs text-slate-500 mt-0.5">Motivo: {r.med.purpose}</div>}
                  <div className="flex items-center gap-2 mt-2">
                    <div className="h-2.5 flex-1 bg-slate-100 rounded-full overflow-hidden flex">
                      <div className="h-full bg-emerald-500" style={{ width: (r.prog ? (r.tom / r.prog) * 100 : 0) + "%" }} />
                      <div className="h-full bg-rose-300" style={{ width: (r.prog ? (r.omitidas / r.prog) * 100 : 0) + "%" }} />
                    </div>
                    <span className="text-xs font-semibold text-slate-600 shrink-0">{r.adh === null ? "sin tomas vencidas" : r.adh + "%"}</span>
                  </div>
                  <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-slate-500">
                    <span>Programadas: <b className="text-slate-700">{r.prog}</b></span>
                    <span>Tomadas: <b className="text-emerald-700">{r.tom}</b></span>
                    <span>Omitidas: <b className="text-rose-600">{r.omitidas}</b></span>
                    {r.futuras > 0 && <span>Por venir: <b className="text-slate-600">{r.futuras}</b></span>}
                  </div>
                </div>
              );
            })}
          </div>
          <p className="text-xs text-slate-400 text-center">La adherencia se calcula solo sobre tomas cuya hora ya pasó. Este reporte es informativo y no sustituye la indicación de tu médico.</p>
        </React.Fragment>
      )}
    </div>
  );
}

function Kpi({ label, valor, verde }) {
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-3 text-center">
      <div className={"text-2xl font-extrabold " + (verde ? "text-emerald-700" : "text-slate-800")}>{valor}</div>
      <div className="text-xs text-slate-500 mt-0.5">{label}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MediControl />);
</script>
