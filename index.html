const normTxt = (s) => String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

/* ---- lotes por caducidad: un mismo código puede tener varias fechas ---- */
const conLotes = (i) => {
  if (i.lotes && i.lotes.length) return i.lotes;
  return [{ id: "L0", caducidad: i.caducidad || "", cantidad: i.cantidad || 0 }];
};
const sincLotes = (i, lotes) => {
  const act = lotes.filter((l) => Number(l.cantidad) > 0)
    .slice().sort((a, b) => ((a.caducidad || "9999-12-31") < (b.caducidad || "9999-12-31") ? -1 : 1));
  return { ...i, lotes: act, cantidad: act.reduce((s, l) => s + Number(l.cantidad), 0), caducidad: act[0] ? act[0].caducidad : "" };
};
const lotesTexto = (i, hoy0) => {
  const ls = conLotes(i).filter((l) => l.cantidad > 0);
  if (!ls.length) return "—";
  return ls.map((l) => {
    if (!l.caducidad) return l.cantidad + "x sin fecha";
    const venc = parseDate(l.caducidad) < hoy0;
    return l.cantidad + "x " + fmtDate(l.caducidad) + (venc ? " CADUCADO" : "");
  }).join("  ·  ");
};

function Inventario({ data, persist, avisar }) {
  const inv = data.inv || [];
  const [codigo, setCodigo] = useState("");
  const [busca, setBusca] = useState("");
  const [formOpen, setFormOpen] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [editKey, setEditKey] = useState(null);
  const [sugOpen, setSugOpen] = useState(false);
  const [scanErr, setScanErr] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [loteScan, setLoteScan] = useState(null);
  const [loteFecha, setLoteFecha] = useState("");
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);

  const vacio = { code: "", name: "", presentation: "Tabletas", envase: "Caja", contenido: 20, unidad: "tabletas", cantidad: 1, caducidad: "", notas: "", stockMin: 1, imagen: "", precio: "" };
  const catalogo = data.catalogo || {};
  const [catOpen, setCatOpen] = useState(false);
  const [f, setF] = useState(vacio);
  const [err, setErr] = useState(null);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const guardarInv = (next) => persist({ ...data, inv: next });

  /* captura rápida: si el código existe suma +1; si no, abre el formulario prellenado */
  const procesarCodigo = (code) => {
    const c = String(code).trim();
    if (!c) return;
    const item = inv.find((i) => i.code === c);
    if (item) {
      /* mismo código, pero cada unidad física puede tener caducidad distinta: preguntar antes de sumar */
      setBusca("");
      setLoteScan(item.key);
      setLoteFecha("");
      avisar("Reconocido: " + item.name + " — confirma la caducidad de esta unidad");
      setTimeout(() => { const el = document.getElementById("inv-" + item.key); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 150);
    } else if (catalogo[c]) {
      const cat = catalogo[c];
      setF({ ...vacio, code: c, name: cat.name || "", presentation: cat.presentation || "Tabletas", envase: cat.envase || "Caja", contenido: cat.contenido || 1, unidad: cat.unidad || "tabletas", precio: cat.precio || "", imagen: cat.imagen || "", stockMin: cat.stockMin || 1 });
      setEditKey(null);
      setFormOpen(true);
      avisar("Reconocido del catálogo: " + cat.name + " — solo confirma cantidad y caducidad");
    } else {
      setF({ ...vacio, code: c });
      setEditKey(null);
      setFormOpen(true);
      avisar("Código nuevo — completa los datos y quedará guardado en tu catálogo");
    }
    setCodigo("");
  };

  /* escaneo con cámara (detector nativo de Chrome/Edge) */
  const detener = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; }
    setScanning(false);
  };

  const escanear = async () => {
    setScanErr(null);
    if (!("BarcodeDetector" in window)) {
      setScanErr("Tu navegador no soporta escaneo con cámara. Escribe el código o usa un lector USB (teclea el código solo en el campo).");
      return;
    }
    try {
      const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39", "qr_code"] });
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      streamRef.current = stream;
      setScanning(true);
      setTimeout(async () => {
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        const loop = async () => {
          if (!streamRef.current || !videoRef.current) return;
          try {
            const codes = await detector.detect(videoRef.current);
            if (codes.length) { procesarCodigo(codes[0].rawValue); detener(); return; }
          } catch (e) { /* siguiente cuadro */ }
          requestAnimationFrame(loop);
        };
        loop();
      }, 100);
    } catch (e) {
      setScanErr("No se pudo acceder a la cámara. Verifica los permisos o escribe el código manualmente.");
      detener();
    }
  };

  useEffect(() => () => detener(), []);

  /* recibir una unidad indicando su caducidad: misma fecha suma al lote, fecha nueva crea lote */
  const recibirUnidad = (key, fecha) => {
    const item = inv.find((i) => i.key === key);
    if (!item) return;
    const lotes = conLotes(item).map((l) => ({ ...l }));
    const ex = lotes.find((l) => (l.caducidad || "") === (fecha || ""));
    if (ex) ex.cantidad += 1; else lotes.push({ id: uid(), caducidad: fecha || "", cantidad: 1 });
    const nuevo = sincLotes(item, lotes);
    guardarInv(inv.map((i) => (i.key === key ? nuevo : i)));
    avisar("+1 " + item.envase.toLowerCase() + " de " + item.name + (fecha ? " · caducidad " + fmtDate(fecha) : " · sin fecha") + " · total: " + nuevo.cantidad);
    setLoteScan(null);
    setLoteFecha("");
  };

  /* descontar 1 de un lote específico */
  const quitarDeLote = (key, loteId) => {
    const item = inv.find((i) => i.key === key);
    if (!item) return;
    const lotes = conLotes(item).map((l) => (l.id === loteId ? { ...l, cantidad: Math.max(0, l.cantidad - 1) } : l));
    const nuevo = sincLotes(item, lotes);
    guardarInv(inv.map((i) => (i.key === key ? nuevo : i)));
    avisar(nuevo.cantidad === 0 ? item.name + " agotado — considera reabastecer" : "Se descontó 1 " + item.envase.toLowerCase() + " de " + item.name);
  };

  /* sumar (pide caducidad) o restar (FEFO: sale primero el lote que caduca primero) */
  const ajustar = (key, delta) => {
    const item = inv.find((i) => i.key === key);
    if (!item) return;
    if (delta > 0) { setLoteScan(key); setLoteFecha(""); return; }
    const lotes = conLotes(item).map((l) => ({ ...l }));
    const hoyS = todayStr();
    let obj = lotes.find((l) => l.cantidad > 0 && (!l.caducidad || l.caducidad >= hoyS));
    const soloCaducados = !obj;
    if (!obj) obj = lotes.find((l) => l.cantidad > 0);
    if (!obj) return;
    obj.cantidad -= 1;
    const nuevo = sincLotes(item, lotes);
    guardarInv(inv.map((i) => (i.key === key ? nuevo : i)));
    avisar(nuevo.cantidad === 0
      ? item.name + " agotado — considera reabastecer"
      : "Se descontó 1 " + item.envase.toLowerCase() + " de " + item.name + (obj.caducidad ? " (lote que caduca " + fmtDate(obj.caducidad) + ")" : "") + (soloCaducados ? " · ⚠️ esa unidad ya estaba CADUCADA, no la consumas" : ""));
  };

  const eliminar = (key) => {
    guardarInv(inv.filter((i) => i.key !== key));
    setConfirmDel(null);
    avisar("Producto eliminado del inventario");
  };

  const editarItem = (item) => {
    setF({ code: item.code, name: item.name, presentation: item.presentation, envase: item.envase, contenido: item.contenido, unidad: item.unidad, cantidad: item.cantidad, caducidad: item.caducidad || "", notas: item.notas || "", stockMin: item.stockMin || 1, imagen: item.imagen || "", precio: item.precio || "" });
    setEditKey(item.key);
    setFormOpen(true);
    setErr(null);
  };

  /* autocompletado: primero tu catálogo personal, luego la base de medicamentos comunes de México */
  const sugerencias = useMemo(() => {
    const q = normTxt(f.name.trim());
    if (q.length < 2) return [];
    const out = [];
    Object.keys(catalogo).forEach((c) => {
      const it = catalogo[c];
      if (normTxt(it.name).includes(q)) out.push({ origen: "catálogo", name: it.name, presentation: it.presentation, envase: it.envase, contenido: it.contenido, unidad: it.unidad, precio: it.precio, imagen: it.imagen });
    });
    SEED_MEDS.forEach(([n, p, e, c, u]) => {
      if (normTxt(n).includes(q) && !out.some((o) => normTxt(o.name) === normTxt(n))) out.push({ origen: "base MX", name: n, presentation: p, envase: e, contenido: c, unidad: u });
    });
    return out.slice(0, 8);
  }, [f.name, catalogo]);

  const aplicarSug = (s) => {
    setF((p) => ({
      ...p, name: s.name, presentation: s.presentation, envase: s.envase,
      contenido: s.contenido, unidad: s.unidad,
      precio: s.precio !== undefined && s.precio !== "" ? s.precio : p.precio,
      imagen: s.imagen || p.imagen,
    }));
    setSugOpen(false);
    avisar("Datos llenados desde " + (s.origen === "catálogo" ? "tu catálogo" : "la base de medicamentos") + " — confirma cantidad, precio y caducidad");
  };

  const guardarForm = () => {
    if (!f.name.trim()) return setErr("Escribe el nombre del medicamento.");
    if (!f.contenido || Number(f.contenido) <= 0) return setErr("Indica el contenido por envase (ej. 20 tabletas, 120 ml).");
    const code = f.code.trim() || ("MED-" + Math.random().toString(36).slice(2, 7).toUpperCase());
    if (inv.some((i) => i.code === code && i.key !== editKey)) return setErr("Ese código/ID ya existe en otro producto. Usa la captura rápida de arriba para sumar unidades.");
    const base = {
      code, name: f.name.trim(), presentation: f.presentation, envase: f.envase,
      contenido: Number(f.contenido), unidad: f.unidad, cantidad: Math.max(0, Number(f.cantidad) || 0),
      caducidad: f.caducidad, notas: f.notas.trim(), stockMin: Math.max(1, Number(f.stockMin) || 1),
      imagen: f.imagen || "", precio: Math.max(0, Number(f.precio) || 0),
    };
    const prevItem = editKey ? inv.find((i) => i.key === editKey) : null;
    const prevMulti = prevItem ? conLotes(prevItem).filter((l) => l.cantidad > 0).length > 1 : false;
    const nextInv = editKey
      ? inv.map((i) => {
          if (i.key !== editKey) return i;
          /* con varios lotes activos, cantidad y caducidad se administran por lote en la tarjeta */
          return prevMulti
            ? sincLotes({ ...i, ...base }, conLotes(i))
            : sincLotes({ ...i, ...base }, [{ id: uid(), caducidad: f.caducidad || "", cantidad: base.cantidad }]);
        })
      : [...inv, sincLotes({ key: uid(), ...base, createdAt: new Date().toISOString() }, [{ id: uid(), caducidad: f.caducidad || "", cantidad: base.cantidad }])];
    /* el catálogo maestro acumula todos los códigos con su información y precio, para reconocerlos en el futuro */
    const nextCat = { ...catalogo, [code]: {
      name: base.name, presentation: base.presentation, envase: base.envase, contenido: base.contenido,
      unidad: base.unidad, precio: base.precio, imagen: base.imagen, stockMin: base.stockMin, updatedAt: todayStr(),
    }};
    persist({ ...data, inv: nextInv, catalogo: nextCat });
    avisar(editKey ? "Producto actualizado (catálogo sincronizado)" : "Agregado al inventario y guardado en tu catálogo");
    setF(vacio); setErr(null); setFormOpen(false); setEditKey(null);
  };

  const estadoCad = (cad) => {
    if (!cad) return { txt: "sin fecha de caducidad", cls: "bg-slate-100 text-slate-500 border-slate-200", nivel: 0 };
    const dias = Math.round((parseDate(cad) - parseDate(todayStr())) / 86400000);
    if (dias < 0) return { txt: "CADUCADO hace " + Math.abs(dias) + " días", cls: "bg-rose-100 text-rose-700 border-rose-200", nivel: 2 };
    if (dias <= 60) return { txt: "caduca en " + dias + " días (" + fmtDate(cad) + ")", cls: "bg-amber-100 text-amber-700 border-amber-200", nivel: 1 };
    return { txt: "vigente · caduca " + fmtDate(cad), cls: "bg-emerald-100 text-emerald-700 border-emerald-200", nivel: 0 };
  };

  /* subir imagen del producto: se comprime a miniatura de 96px para no saturar el almacenamiento */
  const subirImagen = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const S = 96;
        const esc = Math.min(S / img.width, S / img.height, 1);
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.width * esc));
        canvas.height = Math.max(1, Math.round(img.height * esc));
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        set("imagen", canvas.toDataURL("image/jpeg", 0.72));
        avisar("Imagen cargada y optimizada");
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  /* estado combinado de un producto para el PDF, contando envases por lote */
  const estadoProducto = (i) => {
    const partes = [];
    const h0 = parseDate(todayStr());
    const ls = conLotes(i).filter((l) => l.cantidad > 0);
    const nCad = ls.filter((l) => l.caducidad && parseDate(l.caducidad) < h0).reduce((s, l) => s + l.cantidad, 0);
    const nPor = ls.filter((l) => {
      if (!l.caducidad) return false;
      const d = Math.round((parseDate(l.caducidad) - h0) / 86400000);
      return d >= 0 && d <= 60;
    }).reduce((s, l) => s + l.cantidad, 0);
    if (nCad) partes.push(nCad + " CADUCADO" + (nCad > 1 ? "S" : ""));
    if (nPor) partes.push(nPor + " por caducar");
    if (i.cantidad === 0) partes.push("Agotado");
    else if (i.cantidad <= (i.stockMin || 1)) partes.push("Stock bajo");
    return partes.length ? partes.join(" · ") : "OK";
  };

  /* exportar inventario a PDF ordenado por ID ascendente */
  const exportarPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const nombre = (data.perfil && data.perfil.nombre) || "";
    doc.setFontSize(16);
    doc.setTextColor(6, 78, 59);
    doc.text("Inventario de medicamentos", 14, 15);
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text((nombre ? "Paciente: " + nombre + "   ·   " : "") + "Generado: " + fmtDateLong(todayStr()) + "   ·   MediControl", 14, 21);
    const orden = inv.slice().sort((a, b) => String(a.code).localeCompare(String(b.code), undefined, { numeric: true }));
    const filas = orden.map((i) => [
      i.code, i.name, i.presentation, i.envase + " · " + i.contenido + " " + i.unidad,
      String(i.cantidad), (i.cantidad * i.contenido) + " " + i.unidad,
      i.precio ? fmtMoney(i.precio) : "—", fmtMoney((i.precio || 0) * i.cantidad),
      lotesTexto(i, parseDate(todayStr())), estadoProducto(i),
    ]);
    doc.autoTable({
      head: [["ID / Código", "Medicamento", "Presentación", "Envase", "Envases", "Total disponible", "Precio c/u", "Valor", "Caducidad", "Estado"]],
      body: filas, startY: 26,
      styles: { fontSize: 8, cellPadding: 2 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 9 && d.cell.raw !== "OK") { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
        if (d.section === "body" && d.column.index === 8 && String(d.cell.raw).indexOf("CADUCADO") >= 0) { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
      },
    });
    const yFin = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    doc.setFontSize(11);
    doc.setTextColor(4, 120, 87);
    doc.text("VALOR TOTAL DEL INVENTARIO: " + fmtMoney(valorTotal) + " MXN", 14, yFin);
    doc.setFontSize(9);
    doc.setTextColor(60);
    doc.text("Resumen: " + inv.length + " productos  ·  " + agotados + " agotados  ·  " + stockBajo.length + " con stock bajo  ·  " + porCaducar + " envases por caducar  ·  " + caducados + " envases caducados", 14, yFin + 6);
    doc.setFontSize(7);
    doc.setTextColor(150);
    doc.text("Documento informativo generado por MediControl. Ordenado por ID/código ascendente.", 14, yFin + 11);
    doc.save("inventario-medicamentos-" + todayStr() + ".pdf");
    avisar("PDF del inventario descargado");
  };

  /* exportar catálogo maestro a PDF */
  const exportarCatalogoPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Catálogo maestro de medicamentos", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text("Base de datos de códigos registrados  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    const codigos = Object.keys(catalogo).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
    doc.autoTable({
      head: [["ID / Código", "Medicamento", "Presentación", "Envase", "Precio", "Últ. actualización"]],
      body: codigos.map((c) => {
        const it = catalogo[c];
        return [c, it.name, it.presentation, it.envase + " · " + it.contenido + " " + it.unidad, it.precio ? fmtMoney(it.precio) : "—", it.updatedAt ? fmtDate(it.updatedAt) : "—"];
      }),
      startY: 26, styles: { fontSize: 8, cellPadding: 2 }, headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
    });
    doc.save("catalogo-medicamentos-" + todayStr() + ".pdf");
    avisar("PDF del catálogo descargado");
  };

  const quitarDelCatalogo = (code) => {
    const next = { ...catalogo };
    delete next[code];
    persist({ ...data, catalogo: next });
    avisar("Código eliminado del catálogo");
  };

  const filtrados = inv
    .filter((i) => (i.name + " " + i.code).toLowerCase().includes(busca.toLowerCase()))
    .slice()
    .sort((a, b) => ((a.caducidad || "9999-12-31") < (b.caducidad || "9999-12-31") ? -1 : 1));

  const hoy0 = parseDate(todayStr());
  const lotesActivos = inv.flatMap((i) => conLotes(i).filter((l) => l.cantidad > 0));
  const caducados = lotesActivos.filter((l) => l.caducidad && parseDate(l.caducidad) < hoy0).reduce((s, l) => s + l.cantidad, 0);
  const porCaducar = lotesActivos.filter((l) => {
    if (!l.caducidad) return false;
    const d = Math.round((parseDate(l.caducidad) - hoy0) / 86400000);
    return d >= 0 && d <= 60;
  }).reduce((s, l) => s + l.cantidad, 0);
  const agotados = inv.filter((i) => i.cantidad === 0).length;
  const stockBajo = inv.filter((i) => i.cantidad > 0 && i.cantidad <= (i.stockMin || 1));
  const agotadosList = inv.filter((i) => i.cantidad === 0);
  const topStock = inv.slice().sort((a, b) => b.cantidad - a.cantidad).filter((i) => i.cantidad > 0).slice(0, 3);
  const valorTotal = inv.reduce((s, i) => s + (Number(i.precio) || 0) * i.cantidad, 0);

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  const editItem = editKey ? inv.find((i) => i.key === editKey) : null;
  const multiLoteEdit = editItem ? conLotes(editItem).filter((l) => l.cantidad > 0).length > 1 : false;

  return (
    <div className="space-y-4">
      {/* captura rápida */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-2">
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <h2 className="font-bold text-slate-700 flex items-center gap-2"><IBarcode cls="w-5 h-5 text-emerald-700" /> Captura rápida por código</h2>
          {inv.length > 0 && (
            <button onClick={exportarPDF} className="inline-flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-xl border border-emerald-300 text-emerald-800 bg-emerald-50 hover:bg-emerald-100">
              <IDownload cls="w-4 h-4" /> Exportar PDF
            </button>
          )}
        </div>
        <div className="flex gap-2">
          <input className={inputCls} placeholder="Escanea o escribe el código de barras / ID y presiona Enter"
            value={codigo} onChange={(e) => setCodigo(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") procesarCodigo(codigo); }} />
          <button onClick={() => procesarCodigo(codigo)}
            className="shrink-0 bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 rounded-xl flex items-center gap-1.5">
            <IPlus cls="w-4 h-4" /> +1
          </button>
          <button onClick={scanning ? detener : escanear}
            className={"shrink-0 text-sm font-semibold px-4 rounded-xl flex items-center gap-1.5 border " +
              (scanning ? "bg-rose-50 border-rose-300 text-rose-700" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
            <ICamera cls="w-4 h-4" /> {scanning ? "Detener" : "Cámara"}
          </button>
        </div>
        <p className="text-xs text-slate-400">Si el código ya existe, te preguntará la <b>caducidad de esa unidad</b>: misma fecha suma al lote existente, fecha distinta crea un lote nuevo. Si el código es nuevo, se abre el formulario prellenado. Compatible con lectores USB (escanean directo al campo).</p>
        {scanning && (
          <div className="rounded-xl overflow-hidden border border-emerald-300 bg-black">
            <video ref={videoRef} className="w-full max-h-64 object-cover" muted playsInline />
            <div className="text-center text-xs text-emerald-200 bg-slate-900 py-1.5">Apunta la cámara al código de barras…</div>
          </div>
        )}
        {scanErr && (
          <div className="bg-amber-50 border border-amber-200 text-amber-800 text-xs rounded-xl px-3 py-2 flex items-center gap-2">
            <IWarn cls="w-4 h-4 shrink-0" /> {scanErr}
          </div>
        )}
      </section>

      {/* resumen del botiquín */}
      {inv.length > 0 && (
        <div className="bg-emerald-800 text-white rounded-2xl p-4 flex items-center justify-between">
          <div>
            <div className="text-emerald-200 text-xs font-bold uppercase tracking-wide">Valor total del inventario</div>
            <div className="text-2xl font-extrabold">{fmtMoney(valorTotal)} <span className="text-sm font-medium text-emerald-200">MXN</span></div>
          </div>
          <div className="text-right text-emerald-200 text-xs">
            Dinero invertido en tus<br />medicamentos en existencia
          </div>
        </div>
      )}
      {inv.length > 0 && (
        <div className="grid grid-cols-5 gap-1.5">
          <Kpi label="Productos" valor={inv.length} />
          <Kpi label="Stock bajo" valor={stockBajo.length} verde={stockBajo.length === 0} />
          <Kpi label="Agotados" valor={agotados} verde={agotados === 0} />
          <Kpi label="Env. por caducar" valor={porCaducar} verde={porCaducar === 0} />
          <Kpi label="Env. caducados" valor={caducados} verde={caducados === 0} />
        </div>
      )}

      {/* ficha del botiquín */}
      {inv.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-emerald-700 mb-1.5 flex items-center gap-1"><IBox cls="w-3.5 h-3.5" /> Con más existencias</div>
              {topStock.length === 0 ? <div className="text-xs text-slate-400">Sin existencias.</div> : topStock.map((i) => (
                <div key={i.key} className="text-sm text-slate-700 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">{i.cantidad} {i.envase.toLowerCase()}{i.cantidad === 1 ? "" : "s"}</b>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-amber-600 mb-1.5 flex items-center gap-1"><IWarn cls="w-3.5 h-3.5" /> Por acabarse</div>
              {stockBajo.length === 0 ? <div className="text-xs text-slate-400">Ninguno en el límite. Todo en orden.</div> : stockBajo.slice(0, 4).map((i) => (
                <div key={i.key} className="text-sm text-amber-800 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">{i.cantidad} / mín {i.stockMin || 1}</b>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold uppercase tracking-wide text-rose-600 mb-1.5 flex items-center gap-1"><IX cls="w-3.5 h-3.5" /> Fuera de límite (agotados)</div>
              {agotadosList.length === 0 ? <div className="text-xs text-slate-400">Ningún producto agotado.</div> : agotadosList.slice(0, 4).map((i) => (
                <div key={i.key} className="text-sm text-rose-700 flex justify-between gap-2 py-0.5">
                  <span className="truncate">{i.name}</span>
                  <b className="shrink-0">reabastecer</b>
                </div>
              ))}
            </div>
          </div>
        </section>
      )}

      {/* registrar producto nuevo */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <button onClick={() => setFormOpen(!formOpen)} className="w-full flex items-center justify-between">
          <span className="font-bold text-slate-700 flex items-center gap-2">{editKey ? <IEdit cls="w-5 h-5 text-amber-600" /> : <IPlus cls="w-5 h-5 text-emerald-700" />} {editKey ? "Editando: " + f.name : "Registrar producto nuevo"}</span>
          {formOpen ? <IChevD cls="w-5 h-5 text-slate-400" /> : <IChevR cls="w-5 h-5 text-slate-400" />}
        </button>
        {formOpen && (
          <div className="mt-3 space-y-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className={labelCls}>Código / ID (código de barras)</label>
                <input className={inputCls} placeholder="Escanea, escribe o deja vacío para generar uno" value={f.code} onChange={(e) => set("code", e.target.value)} />
              </div>
              <div className="relative">
                <label className={labelCls}>Nombre del medicamento *</label>
                <input className={inputCls} placeholder="Escribe 2+ letras, ej. para…" value={f.name}
                  onChange={(e) => { set("name", e.target.value); setSugOpen(true); }}
                  onFocus={() => setSugOpen(true)}
                  onBlur={() => setTimeout(() => setSugOpen(false), 150)} />
                {sugOpen && sugerencias.length > 0 && (
                  <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-y-auto">
                    {sugerencias.map((s, i) => (
                      <button key={i} onMouseDown={(e) => { e.preventDefault(); aplicarSug(s); }}
                        className="w-full text-left px-3 py-2 hover:bg-emerald-50 flex items-center justify-between gap-2 border-b border-slate-50 last:border-0">
                        <span className="min-w-0">
                          <span className="text-sm font-medium text-slate-700 block truncate">{s.name}</span>
                          <span className="text-xs text-slate-400">{s.envase} · {s.contenido} {s.unidad}{s.precio ? " · " + fmtMoney(s.precio) : ""}</span>
                        </span>
                        <span className={"text-[10px] px-1.5 py-0.5 rounded-full shrink-0 " + (s.origen === "catálogo" ? "bg-emerald-100 text-emerald-700" : "bg-sky-100 text-sky-700")}>{s.origen}</span>
                      </button>
                    ))}
                  </div>
                )}
                <div className="text-xs text-slate-400 mt-0.5">Elige de la base de medicamentos comunes de México y se llena todo el formulario</div>
              </div>
              <div>
                <label className={labelCls}>Presentación</label>
                <select className={inputCls} value={f.presentation} onChange={(e) => set("presentation", e.target.value)}>
                  {PRESENTACIONES.map((p) => <option key={p}>{p}</option>)}
                </select>
              </div>
              <div>
                <label className={labelCls}>Tipo de envase</label>
                <select className={inputCls} value={f.envase} onChange={(e) => set("envase", e.target.value)}>
                  {ENVASES.map((p) => <option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className={labelCls}>Contenido *</label>
                  <input type="number" min="1" className={inputCls} value={f.contenido} onChange={(e) => set("contenido", e.target.value)} />
                </div>
                <div>
                  <label className={labelCls}>Unidad</label>
                  <select className={inputCls} value={f.unidad} onChange={(e) => set("unidad", e.target.value)}>
                    {UNIDADES.map((u) => <option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>
              {multiLoteEdit ? (
                <div className="bg-sky-50 border border-sky-100 rounded-xl px-3 py-2.5 text-xs text-sky-900">
                  <b>Este producto tiene {conLotes(editItem).filter((l) => l.cantidad > 0).length} lotes con caducidades distintas</b> ({conLotes(editItem).filter((l) => l.cantidad > 0).map((l) => l.cantidad + "× " + (l.caducidad ? fmtDate(l.caducidad) : "sin fecha")).join(" · ")}). Las cantidades y fechas se administran por lote desde la tarjeta del producto; aquí solo se editan nombre, envase, precio y demás datos.
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className={labelCls}>Envases que tienes</label>
                    <input type="number" min="0" className={inputCls} value={f.cantidad} onChange={(e) => set("cantidad", e.target.value)} />
                  </div>
                  <div>
                    <label className={labelCls}>Fecha de caducidad</label>
                    <input type="date" className={inputCls} value={f.caducidad} onChange={(e) => set("caducidad", e.target.value)} />
                  </div>
                </div>
              )}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className={labelCls}>Precio por envase (MXN)</label>
                <input type="number" min="0" step="0.01" className={inputCls} placeholder="Ej. 85.50" value={f.precio} onChange={(e) => set("precio", e.target.value)} />
                <div className="text-xs text-slate-400 mt-0.5">Se guarda en tu catálogo para futuras compras y el valor del inventario</div>
              </div>
              <div>
                <label className={labelCls}>Límite de stock (mínimo deseado)</label>
                <input type="number" min="1" className={inputCls} value={f.stockMin} onChange={(e) => set("stockMin", e.target.value)} />
                <div className="text-xs text-slate-400 mt-0.5">Cuando queden esta cantidad de envases o menos, se marcará "por acabarse"</div>
              </div>
              <div>
                <label className={labelCls}>Imagen del producto (opcional)</label>
                <div className="flex items-center gap-2">
                  {f.imagen ? (
                    <img src={f.imagen} alt="producto" className="w-12 h-12 rounded-lg object-cover border border-slate-200" />
                  ) : (
                    <div className="w-12 h-12 rounded-lg bg-slate-100 border border-dashed border-slate-300 flex items-center justify-center"><ICamera cls="w-5 h-5 text-slate-400" /></div>
                  )}
                  <label className="cursor-pointer text-sm font-medium px-3 py-1.5 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">
                    {f.imagen ? "Cambiar" : "Subir foto"}
                    <input type="file" accept="image/*" className="hidden" onChange={subirImagen} />
                  </label>
                  {f.imagen && <button onClick={() => set("imagen", "")} className="text-xs text-slate-400 hover:text-rose-600">quitar</button>}
                </div>
                <div className="text-xs text-slate-400 mt-0.5">Se comprime automáticamente a miniatura para identificarlo fácil</div>
              </div>
            </div>
            <div>
              <label className={labelCls}>Notas (opcional)</label>
              <input className={inputCls} placeholder="Ej. Guardado en el botiquín del baño · lote 4521" value={f.notas} onChange={(e) => set("notas", e.target.value)} />
            </div>
            <div className="text-xs text-slate-500 bg-slate-50 rounded-xl px-3 py-2">
              Ejemplos: <b>Caja</b> con 20 <b>tabletas</b> · <b>Frasco</b> con 120 <b>ml</b> · <b>Blíster</b> con 10 <b>cápsulas</b>
            </div>
            {err && (
              <div className="bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-3 py-2.5 flex items-center gap-2">
                <IWarn cls="w-4 h-4 shrink-0" /> {err}
              </div>
            )}
            <button onClick={guardarForm} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2">
              <IPlus cls="w-5 h-5" /> {editKey ? "Guardar cambios" : "Agregar al inventario"}
            </button>
            {editKey && (
              <button onClick={() => { setF(vacio); setEditKey(null); setErr(null); setFormOpen(false); }}
                className="w-full text-sm text-slate-500 hover:text-slate-700 py-1">Cancelar edición</button>
            )}
          </div>
        )}
      </section>

      {/* buscador y lista */}
      {inv.length > 0 && (
        <div className="relative">
          <ISearch cls="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
          <input className={inputCls + " pl-9"} placeholder="Buscar por nombre o código…" value={busca} onChange={(e) => setBusca(e.target.value)} />
        </div>
      )}

      {inv.length === 0 ? (
        <VacioCard titulo="Tu botiquín está vacío"
          texto="Registra los medicamentos que tienes en casa: nombre, envase, contenido y caducidad. Después bastará escanear o escribir el código para sumar más."
          accion={() => setFormOpen(true)} accionLabel="Registrar el primero" />
      ) : (
        <div className="space-y-2">
          {filtrados.map((i) => {
            const cad = estadoCad(i.caducidad);
            const total = i.cantidad * i.contenido;
            return (
              <div key={i.key} id={"inv-" + i.key} className={"bg-white rounded-2xl border p-4 " + (loteScan === i.key ? "border-emerald-400 ring-2 ring-emerald-200" : cad.nivel === 2 ? "border-rose-300" : cad.nivel === 1 ? "border-amber-300" : "border-slate-200")}>
                <div className="flex items-start gap-3">
                  {i.imagen ? (
                    <img src={i.imagen} alt={i.name} className={"w-11 h-11 rounded-xl object-cover border shrink-0 " + (i.cantidad === 0 ? "border-slate-200 opacity-60" : "border-emerald-200")} />
                  ) : (
                    <div className={"rounded-xl p-2 border shrink-0 " + (i.cantidad === 0 ? "bg-slate-100 text-slate-400 border-slate-200" : "bg-emerald-50 text-emerald-700 border-emerald-200")}>
                      <IBox cls="w-5 h-5" />
                    </div>
                  )}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-bold text-slate-800">{i.name}</span>
                      <span className="text-xs font-mono bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded-full flex items-center gap-1"><IBarcode cls="w-3 h-3" /> {i.code}</span>
                      {i.cantidad === 0 && <span className="text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-600">agotado</span>}
                      {i.cantidad > 0 && i.cantidad <= (i.stockMin || 1) && <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">por acabarse · mín {i.stockMin || 1}</span>}
                    </div>
                    <div className="text-sm text-slate-500 mt-0.5">
                      {i.presentation} · {i.envase} con {i.contenido} {i.unidad} · disponible: <b className="text-slate-700">{total} {i.unidad}</b>
                      {i.precio > 0 && <span> · {fmtMoney(i.precio)} c/u · <b className="text-emerald-700">{fmtMoney(i.precio * i.cantidad)}</b> en stock</span>}
                    </div>
                    <div className="mt-1.5 flex items-center gap-1.5 flex-wrap">
                      {conLotes(i).filter((l) => l.cantidad > 0).map((l) => {
                        const ec = estadoCad(l.caducidad);
                        const etiqueta = !l.caducidad ? "sin fecha"
                          : ec.nivel === 2 ? "CADUCADO · " + fmtDate(l.caducidad)
                          : ec.nivel === 1 ? "caduca " + fmtDate(l.caducidad)
                          : "cad " + fmtDate(l.caducidad);
                        return (
                          <span key={l.id} className={"text-xs pl-2 pr-1 py-0.5 rounded-full border inline-flex items-center gap-1 " + ec.cls}>
                            <b>{l.cantidad}×</b> {etiqueta}
                            <button onClick={() => quitarDeLote(i.key, l.id)} title="Descontar 1 envase de este lote"
                              className="w-4 h-4 rounded-full hover:bg-white/70 flex items-center justify-center">
                              <IMinus cls="w-3 h-3" />
                            </button>
                          </span>
                        );
                      })}
                      {i.cantidad === 0 && <span className="text-xs px-2 py-0.5 rounded-full border bg-slate-100 text-slate-500 border-slate-200">sin existencias</span>}
                      {i.notas && <span className="text-xs text-slate-400">{i.notas}</span>}
                    </div>
                  </div>
                  {/* contador de envases */}
                  <div className="flex flex-col items-center gap-1 shrink-0">
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => ajustar(i.key, -1)} disabled={i.cantidad === 0}
                        className={"w-8 h-8 rounded-lg border flex items-center justify-center " + (i.cantidad === 0 ? "border-slate-200 text-slate-300" : "border-slate-300 text-slate-600 hover:bg-rose-50 hover:border-rose-300 hover:text-rose-600")}>
                        <IMinus cls="w-4 h-4" />
                      </button>
                      <div className="w-10 text-center">
                        <div className="text-xl font-extrabold text-slate-800 leading-none">{i.cantidad}</div>
                        <div className="text-[10px] text-slate-400 leading-tight">{i.envase.toLowerCase()}{i.cantidad === 1 ? "" : "s"}</div>
                      </div>
                      <button onClick={() => ajustar(i.key, 1)}
                        className="w-8 h-8 rounded-lg border border-slate-300 text-slate-600 hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-700 flex items-center justify-center">
                        <IPlus cls="w-4 h-4" />
                      </button>
                    </div>
                    {confirmDel === i.key ? (
                      <div className="flex items-center gap-1 mt-1">
                        <button onClick={() => eliminar(i.key)} className="text-xs px-2 py-1 rounded-lg bg-rose-600 text-white">Eliminar</button>
                        <button onClick={() => setConfirmDel(null)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">No</button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-2 mt-1">
                        <button onClick={() => editarItem(i)} className="text-xs text-slate-400 hover:text-emerald-700 flex items-center gap-1">
                          <IEdit cls="w-3 h-3" /> editar
                        </button>
                        <button onClick={() => setConfirmDel(i.key)} className="text-xs text-slate-400 hover:text-rose-600 flex items-center gap-1">
                          <ITrash cls="w-3 h-3" /> quitar
                        </button>
                      </div>
                    )}
                  </div>
                </div>
                {loteScan === i.key && (
                  <div className="mt-3 pt-3 border-t border-emerald-200">
                    <div className="text-sm font-semibold text-emerald-900 mb-2">➕ Recibir 1 {i.envase.toLowerCase()} de {i.name} — ¿cuál es su fecha de caducidad?</div>
                    {conLotes(i).filter((l) => l.cantidad > 0).length > 0 && (
                      <div className="flex flex-wrap gap-1.5 mb-2">
                        {conLotes(i).filter((l) => l.cantidad > 0).map((l) => (
                          <button key={l.id} onClick={() => recibirUnidad(i.key, l.caducidad)}
                            className="text-xs font-semibold px-3 py-1.5 rounded-full border border-emerald-300 bg-emerald-50 text-emerald-800 hover:bg-emerald-100">
                            {l.caducidad ? "Misma: " + fmtDate(l.caducidad) : "Sin fecha"} · tienes {l.cantidad}
                          </button>
                        ))}
                      </div>
                    )}
                    <div className="flex flex-wrap items-end gap-2">
                      <div>
                        <label className={labelCls}>Caducidad distinta (lote nuevo)</label>
                        <input type="date" className={inputCls} value={loteFecha} onChange={(e) => setLoteFecha(e.target.value)} />
                      </div>
                      <button onClick={() => { if (!loteFecha) { avisar("Elige la fecha, o toca un lote existente arriba"); return; } recibirUnidad(i.key, loteFecha); }}
                        className="bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 py-2 rounded-xl">Agregar</button>
                      <button onClick={() => recibirUnidad(i.key, "")} className="text-sm px-3 py-2 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50">Sin fecha</button>
                      <button onClick={() => { setLoteScan(null); setLoteFecha(""); }} className="text-sm px-3 py-2 text-slate-500 hover:text-slate-700">Cancelar</button>
                    </div>
                    <p className="text-[11px] text-slate-400 mt-2">Si la fecha coincide con un lote existente, se suma ahí; si es distinta, se crea un lote nuevo. Así sabrás exactamente cuántos envases caducan y cuándo.</p>
                  </div>
                )}
              </div>
            );
          })}
          {filtrados.length === 0 && (
            <div className="text-center text-sm text-slate-400 py-6">No se encontró ningún producto con "{busca}".</div>
          )}
        </div>
      )}

      {/* catálogo maestro de códigos */}
      {Object.keys(catalogo).length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="flex items-center justify-between gap-2">
            <button onClick={() => setCatOpen(!catOpen)} className="flex items-center gap-2 flex-1 text-left">
              {catOpen ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
              <span className="font-bold text-slate-700 text-sm flex items-center gap-2">
                <IBarcode cls="w-4 h-4 text-emerald-700" /> Catálogo maestro ({Object.keys(catalogo).length} códigos registrados)
              </span>
            </button>
            <button onClick={exportarCatalogoPDF} className="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50">
              <IDownload cls="w-3.5 h-3.5" /> PDF catálogo
            </button>
          </div>
          {catOpen && (
            <div className="mt-3">
              <p className="text-xs text-slate-400 mb-2">Tu base de datos permanente: cada producto que registras queda aquí con su información y precio, aunque se agote o lo quites del inventario. Al escanear o escribir un código conocido, el sistema lo reconoce y llena todo automáticamente.</p>
              <div className="max-h-64 overflow-y-auto divide-y divide-slate-100 rounded-xl border border-slate-100">
                {Object.keys(catalogo).sort((a, b) => a.localeCompare(b, undefined, { numeric: true })).map((c) => {
                  const it = catalogo[c];
                  const enInv = inv.some((i) => i.code === c);
                  return (
                    <div key={c} className="flex items-center gap-2 px-3 py-2 text-sm">
                      {it.imagen ? <img src={it.imagen} alt="" className="w-8 h-8 rounded-lg object-cover border border-slate-200 shrink-0" /> : <div className="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center shrink-0"><IPill cls="w-4 h-4 text-slate-400" /></div>}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-semibold text-slate-700 truncate">{it.name}</span>
                          <span className="text-xs font-mono text-slate-400">{c}</span>
                          {enInv ? <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-emerald-100 text-emerald-700">en inventario</span> : <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">solo en catálogo</span>}
                        </div>
                        <div className="text-xs text-slate-500">{it.envase} · {it.contenido} {it.unidad}{it.precio ? " · " + fmtMoney(it.precio) : ""}{it.updatedAt ? " · act. " + fmtDate(it.updatedAt) : ""}</div>
                      </div>
                      <button onClick={() => procesarCodigo(c)} className="text-xs px-2.5 py-1 rounded-lg border border-emerald-300 text-emerald-700 hover:bg-emerald-50 shrink-0">usar</button>
                      {!enInv && <button onClick={() => quitarDelCatalogo(c)} className="text-slate-300 hover:text-rose-600 shrink-0" title="Eliminar del catálogo"><ITrash cls="w-3.5 h-3.5" /></button>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </section>
      )}
    </div>
  );
}

const clasificar = (tipo, a, b, ctx, extra) => {
  const x = extra || {};
  const okCls = "bg-emerald-100 text-emerald-700 border-emerald-200";
  const bajoCls = "bg-sky-100 text-sky-700 border-sky-200";
  const medioCls = "bg-amber-100 text-amber-700 border-amber-200";
  const altoCls = "bg-rose-100 text-rose-700 border-rose-200";
  if (tipo === "glucosa") {
    const v = Number(a);
    const post = ctx === "2 h después de alimento";
    if (v < 70) return { txt: "Baja (hipoglucemia)", cls: altoCls, alerta: true };
    if (post) {
      if (v < 140) return { txt: "Normal", cls: okCls, ok: true };
      if (v < 200) return { txt: "Elevada", cls: medioCls };
      return { txt: "Alta", cls: altoCls, alerta: true };
    }
    if (v < 100) return { txt: "Normal", cls: okCls, ok: true };
    if (v < 126) return { txt: "Elevada", cls: medioCls };
    return { txt: "Alta", cls: altoCls, alerta: true };
  }
  if (tipo === "presion") {
    const s = Number(a), d = Number(b);
    if (s >= 180 || d >= 120) return { txt: "Crisis — busca atención médica", cls: altoCls, alerta: true };
    if (s >= 140 || d >= 90) return { txt: "Hipertensión etapa 2", cls: altoCls, alerta: true };
    if (s >= 130 || d >= 80) return { txt: "Hipertensión etapa 1", cls: medioCls };
    if (s >= 120) return { txt: "Elevada", cls: medioCls };
    if (s < 90 || d < 60) return { txt: "Baja", cls: bajoCls };
    return { txt: "Normal", cls: okCls, ok: true };
  }
  if (tipo === "spo2") {
    const v = Number(a);
    if (v < 90) return { txt: "Muy baja — busca atención médica", cls: altoCls, alerta: true };
    if (v < 95) return { txt: "Baja", cls: medioCls };
    return { txt: "Normal", cls: okCls, ok: true };
  }
  if (tipo === "temp") {
    const v = Number(a);
    if (v < 35) return { txt: "Hipotermia — busca atención", cls: altoCls, alerta: true };
    if (v < 36) return { txt: "Baja", cls: bajoCls };
    if (v <= 37.2) return { txt: "Normal", cls: okCls, ok: true };
    if (v < 38) return { txt: "Febrícula", cls: medioCls };
    if (v < 39) return { txt: "Fiebre", cls: altoCls };
    if (v < 40) return { txt: "Fiebre alta", cls: altoCls, alerta: true };
    return { txt: "Fiebre muy alta — busca atención", cls: altoCls, alerta: true };
  }
  if (tipo === "fc") {
    if (ctx === "Después de actividad") return null;
    const v = Number(a);
    if (v < 40) return { txt: "Muy baja — consulta a tu médico", cls: altoCls, alerta: true };
    if (v < 60) return { txt: "Baja (puede ser normal en personas entrenadas)", cls: bajoCls };
    if (v <= 100) return { txt: "Normal", cls: okCls, ok: true };
    if (v <= 120) return { txt: "Elevada (taquicardia leve)", cls: medioCls };
    return { txt: "Alta — reposa 10 min y repite; si persiste, consulta", cls: altoCls, alerta: true };
  }
  if (tipo === "fr") {
    const v = Number(a);
    if (v < 10) return { txt: "Muy baja — busca atención", cls: altoCls, alerta: true };
    if (v < 12) return { txt: "Baja", cls: bajoCls };
    if (v <= 20) return { txt: "Normal", cls: okCls, ok: true };
    if (v <= 24) return { txt: "Elevada", cls: medioCls };
    return { txt: "Alta — si hay falta de aire, busca atención", cls: altoCls, alerta: true };
  }
  if (tipo === "cintura") {
    if (!x.sexo) return null;
    const lim = x.sexo === "Hombre" ? 90 : 80;
    if (Number(a) <= lim) return { txt: "Normal", cls: okCls, ok: true };
    return { txt: "Obesidad central (riesgo cardiometabólico)", cls: altoCls };
  }
  if (tipo === "cuello") {
    if (!x.sexo) return null;
    const v = Number(a);
    if (x.sexo === "Hombre") {
      if (v < 40) return { txt: "Normal", cls: okCls, ok: true };
      if (v < 43) return { txt: "Elevada", cls: medioCls };
      return { txt: "Alta (riesgo de apnea del sueño)", cls: altoCls };
    }
    if (v < 36) return { txt: "Normal", cls: okCls, ok: true };
    if (v < 38) return { txt: "Elevada", cls: medioCls };
    return { txt: "Alta (riesgo de apnea del sueño)", cls: altoCls };
  }
  if (tipo === "dolor") {
    const v = Number(a);
    if (v === 0) return { txt: "Sin dolor", cls: okCls, ok: true };
    if (v <= 3) return { txt: "Dolor leve", cls: medioCls };
    if (v <= 6) return { txt: "Dolor moderado", cls: medioCls };
    return { txt: "Dolor severo", cls: altoCls, alerta: true };
  }
  if (tipo === "sueno") {
    const v = Number(a);
    if (v < 5) return { txt: "Muy insuficiente", cls: altoCls };
    if (v < 7) return { txt: "Insuficiente", cls: medioCls };
    if (v <= 9) return { txt: "Óptimo (7–9 h)", cls: okCls, ok: true };
    return { txt: "Prolongado", cls: medioCls };
  }
  if (tipo === "estres") {
    const v = Number(a);
    if (v <= 3) return { txt: "Bajo", cls: okCls, ok: true };
    if (v <= 6) return { txt: "Moderado", cls: medioCls };
    return { txt: "Alto", cls: altoCls };
  }
  if (tipo === "orina") {
    const v = Number(a);
    if (v === 1) return { txt: "Exceso de hidratación", cls: bajoCls };
    if (v === 2) return { txt: "Hidratación adecuada", cls: okCls, ok: true };
    if (v === 3) return { txt: "Riesgo de deshidratación — toma agua", cls: medioCls };
    if (v === 4) return { txt: "Deshidratación — hidrátate ya", cls: altoCls, alerta: true };
    if (v === 5) return { txt: "Deshidratación importante — hidrátate y vigila", cls: altoCls, alerta: true };
    if (v === 6) return { txt: "Coluria (orina café oscura): posible bilirrubina — consulta a tu médico pronto", cls: altoCls, alerta: true };
    if (v === 7) return { txt: "Posible sangre en orina (hematuria) — busca atención médica hoy", cls: altoCls, alerta: true };
    return { txt: "Turbia / espumosa: posible infección o proteínas — consulta a tu médico", cls: medioCls, alerta: true };
  }
  if (tipo === "heces") {
    const forma = Number(a), color = Number(b);
    if (color === 6) return { txt: "🚨 Melena (negra alquitranada): posible sangrado digestivo — acude a URGENCIAS", cls: altoCls, alerta: true };
    if (color === 7) return { txt: "🚨 Sangre visible en heces — busca atención médica hoy mismo", cls: altoCls, alerta: true };
    if (color === 5) return { txt: "Acolia (heces pálidas): posible problema hepático o biliar — consulta pronto", cls: altoCls, alerta: true };
    if (color === 4) return { txt: "Grasosa / amarilla: posible mala absorción de grasas — coméntalo con tu médico", cls: medioCls };
    if (forma === 7) return { txt: "Diarrea líquida — hidrátate con suero oral y vigila", cls: altoCls, alerta: true };
    if (forma === 6) return { txt: "Diarrea leve (heces pastosas)", cls: medioCls };
    if (forma === 1) return { txt: "Estreñimiento importante", cls: medioCls };
    if (forma === 2) return { txt: "Estreñimiento", cls: medioCls };
    if (forma === 5) return { txt: "Blanda: puede faltar fibra", cls: bajoCls };
    if (color === 3) return { txt: "Forma normal · color verde (usualmente alimentos o tránsito rápido)", cls: bajoCls };
    return { txt: "Normal (Bristol " + forma + ")", cls: okCls, ok: true };
  }
  return null;
};

function Sparkline({ puntos, puntos2, banda, unidad, fechas }) {
  if (!puntos || puntos.length < 2) return null;
  const todos = (puntos2 ? puntos.concat(puntos2) : puntos).concat(banda ? banda : []);
  const min = Math.min(...todos), max = Math.max(...todos);
  const rango = max - min || 1;
  const W = 300, H = 90, P = 8, L = 34;
  const Y = (v) => H - P - ((v - min) / rango) * (H - 2 * P);
  const linea = (arr) => arr.map((v, i) => {
    const x = L + (i * (W - L - P)) / (arr.length - 1);
    return x.toFixed(1) + "," + Y(v).toFixed(1);
  }).join(" ");
  return (
    <div>
      <svg viewBox={"0 0 " + W + " " + H} className="w-full h-24">
        {banda && (
          <rect x={L} y={Y(Math.min(banda[1], max))} width={W - L - P}
            height={Math.max(2, Y(Math.max(banda[0], min)) - Y(Math.min(banda[1], max)))}
            fill="#d1fae5" opacity="0.6" rx="3" />
        )}
        <text x={L - 4} y={Y(max) + 4} textAnchor="end" fontSize="9" fill="#94a3b8">{max}</text>
        <text x={L - 4} y={Y(min) + 4} textAnchor="end" fontSize="9" fill="#94a3b8">{min}</text>
        {banda && banda[0] > min && <text x={L - 4} y={Y(banda[0]) + 3} textAnchor="end" fontSize="8" fill="#059669">{banda[0]}</text>}
        {banda && banda[1] < max && <text x={L - 4} y={Y(banda[1]) + 3} textAnchor="end" fontSize="8" fill="#059669">{banda[1]}</text>}
        {puntos2 && <polyline points={linea(puntos2)} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 3" strokeLinecap="round" />}
        <polyline points={linea(puntos)} fill="none" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {puntos.map((v, i) => {
          const x = L + (i * (W - L - P)) / (puntos.length - 1);
          const fuera = banda && (v < banda[0] || v > banda[1]);
          return <circle key={i} cx={x} cy={Y(v)} r={i === puntos.length - 1 ? 4 : 2.5} fill={fuera ? "#e11d48" : "#059669"} />;
        })}
      </svg>
      {fechas && fechas.length >= 2 && (
        <div className="flex justify-between text-[10px] text-slate-400 px-1" style={{ paddingLeft: "34px" }}>
          <span>{fmtDate(fechas[0])}</span><span>{fmtDate(fechas[fechas.length - 1])}</span>
        </div>
      )}
      {banda && <div className="text-[10px] text-emerald-700 text-center mt-0.5">Zona sombreada = rango de referencia ({banda[0]}–{banda[1]} {unidad}) · puntos rojos = fuera de rango</div>}
    </div>
  );
}

/* IMC (índice de masa corporal) */
const calcIMC = (pesoKg, estCm) => {
  if (!pesoKg || !estCm) return null;
  const m = estCm / 100;
  return Math.round((pesoKg / (m * m)) * 10) / 10;
};
const clasIMC = (pesoKg, estCm) => {
  const imc = calcIMC(pesoKg, estCm);
  if (imc === null) return null;
  if (imc < 18.5) return { imc, txt: "Bajo peso", cls: "bg-sky-100 text-sky-700 border-sky-200", dir: "subir" };
  if (imc < 25) return { imc, txt: "Peso normal", cls: "bg-emerald-100 text-emerald-700 border-emerald-200", dir: null };
  if (imc < 30) return { imc, txt: "Sobrepeso", cls: "bg-amber-100 text-amber-700 border-amber-200", dir: "bajar" };
  if (imc < 35) return { imc, txt: "Obesidad grado I", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
  if (imc < 40) return { imc, txt: "Obesidad grado II", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
  return { imc, txt: "Obesidad grado III", cls: "bg-rose-100 text-rose-700 border-rose-200", dir: "bajar" };
};
const rangoPesoSaludable = (estCm) => {
  if (!estCm) return null;
  const m = estCm / 100;
  return [Math.round(18.5 * m * m * 10) / 10, Math.round(24.9 * m * m * 10) / 10];
};
const calcEdad = (fechaNac) => {
  if (!fechaNac) return null;
  const n = parseDate(fechaNac), h = new Date();
  let e = h.getFullYear() - n.getFullYear();
  if (h.getMonth() < n.getMonth() || (h.getMonth() === n.getMonth() && h.getDate() < n.getDate())) e--;
  return e;
};
