function Perfil({ data, persist, avisar }) {
  const perfil = data.perfil || {};
  const [open, setOpen] = useState(!perfil.estatura);
  const [p, setP] = useState({ nombre: perfil.nombre || "", fechaNac: perfil.fechaNac || "", sexo: perfil.sexo || "", estatura: perfil.estatura || "", dx: perfil.dx || [], condiciones: perfil.condiciones || "", alergias: perfil.alergias || "", contacto: perfil.contacto || "" });
  const set = (k, v) => setP((prev) => ({ ...prev, [k]: v }));
  const toggleDx = (d) => setP((prev) => ({ ...prev, dx: (prev.dx || []).indexOf(d) >= 0 ? prev.dx.filter((x) => x !== d) : [...(prev.dx || []), d] }));
  const fileRef = React.useRef(null);

  const guardar = () => {
    persist({ ...data, perfil: { ...p, estatura: p.estatura ? Number(p.estatura) : "" } });
    avisar("Perfil guardado");
    setOpen(false);
  };

  const exportar = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "medicontrol-respaldo-" + todayStr() + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
    avisar("Respaldo descargado");
  };

  const importar = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || typeof d !== "object" || !Array.isArray(d.meds)) throw new Error("formato");
        persist({ meds: d.meds || [], taken: d.taken || {}, inv: d.inv || [], vitals: d.vitals || { readings: [], horarios: null }, perfil: d.perfil || {}, catalogo: d.catalogo || {}, comidas: d.comidas || [], agua: d.agua || {} });
        avisar("Respaldo restaurado correctamente");
      } catch (err) { avisar("El archivo no es un respaldo válido de MediControl"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const edad = calcEdad(perfil.fechaNac);

  return (
    <section className="bg-white rounded-2xl border border-slate-200 p-4">
      <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between">
        <span className="font-bold text-slate-700 text-sm flex items-center gap-2">
          <IUser cls="w-4 h-4 text-emerald-700" />
          {perfil.nombre ? perfil.nombre : "Perfil del paciente"}
          {perfil.estatura && <span className="text-xs font-normal text-slate-400">· {perfil.estatura} cm{edad !== null ? " · " + edad + " años" : ""}{perfil.sexo ? " · " + perfil.sexo : ""}{(perfil.dx || []).length > 0 ? " · " + (perfil.dx || []).slice(0, 2).join(", ") + ((perfil.dx || []).length > 2 ? " +" + ((perfil.dx || []).length - 2) : "") : ""}</span>}
          {!perfil.estatura && <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">completa tu estatura para calcular tu IMC</span>}
        </span>
        {open ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
      </button>
      {open && (
        <div className="mt-3 space-y-3">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Nombre</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Tu nombre" value={p.nombre} onChange={(e) => set("nombre", e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Fecha de nacimiento</label>
              <input type="date" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={p.fechaNac} onChange={(e) => set("fechaNac", e.target.value)} />
              {p.fechaNac && <p className="text-[11px] text-emerald-700 font-semibold mt-1">Edad: {calcEdad(p.fechaNac)} años</p>}
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Sexo</label>
              <select className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={p.sexo} onChange={(e) => set("sexo", e.target.value)}>
                <option value="">—</option><option>Hombre</option><option>Mujer</option>
              </select>
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Estatura (cm) *</label>
              <input type="number" min="50" max="250" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="170" value={p.estatura} onChange={(e) => set("estatura", e.target.value)} />
            </div>
            <div className="col-span-2 sm:col-span-4">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Diagnósticos (toca para marcar)</label>
              <div className="flex flex-wrap gap-1.5">
                {DIAGNOSTICOS.map((d) => {
                  const on = (p.dx || []).indexOf(d) >= 0;
                  return (
                    <button key={d} type="button" onClick={() => toggleDx(d)}
                      className={"text-xs px-2.5 py-1.5 rounded-full border transition-colors " + (on ? "bg-emerald-700 border-emerald-700 text-white" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                      {on ? "✓ " : ""}{d}
                    </button>
                  );
                })}
              </div>
              <p className="text-[11px] text-slate-400 mt-1">Aparecen en el reporte PDF para tu médico y dan contexto a tus mediciones.</p>
            </div>
            <div className="col-span-2 sm:col-span-3">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Otros diagnósticos (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Ej. Migraña, artritis, gota…" value={p.condiciones} onChange={(e) => set("condiciones", e.target.value)} />
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Alergias (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Ej. Penicilina" value={p.alergias} onChange={(e) => set("alergias", e.target.value)} />
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Contacto de emergencia (opcional)</label>
              <input className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" placeholder="Nombre y teléfono" value={p.contacto} onChange={(e) => set("contacto", e.target.value)} />
            </div>
          </div>
          <button onClick={guardar} className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 rounded-2xl">Guardar perfil</button>
          <div className="flex gap-2 pt-1 border-t border-slate-100">
            <button onClick={exportar} className="flex-1 inline-flex items-center justify-center gap-1.5 text-sm font-medium px-3 py-2 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 mt-2">
              <IDownload cls="w-4 h-4" /> Descargar respaldo
            </button>
            <button onClick={() => fileRef.current && fileRef.current.click()} className="flex-1 inline-flex items-center justify-center gap-1.5 text-sm font-medium px-3 py-2 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 mt-2">
              <IUpload cls="w-4 h-4" /> Restaurar respaldo
            </button>
            <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={importar} />
          </div>
          <p className="text-xs text-slate-400">El respaldo descarga todos tus datos (medicamentos, inventario, mediciones y perfil) en un archivo. Guárdalo para no perder nada si cambias de navegador o computadora.</p>
        </div>
      )}
    </section>
  );
}

function Salud({ data, persist, avisar, hoy }) {
  const vitals = data.vitals || { readings: [], horarios: null };
  const readings = vitals.readings || [];
  const horarios = vitals.horarios || Object.fromEntries(Object.keys(METRICAS).map((t) => [t, METRICAS[t].horariosDefault]));

  const [tipo, setTipo] = useState("glucosa");
  const [guiaOpen, setGuiaOpen] = useState(false);
  const [horarioOpen, setHorarioOpen] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [editRead, setEditRead] = useState(null);
  const [err, setErr] = useState(null);
  const estatura = (data.perfil && Number(data.perfil.estatura)) || null;
  const perfilS = data.perfil || {};
  const sexo = perfilS.sexo || "";
  const edadP = calcEdad(perfilS.fechaNac);
  const extraClin = { sexo, estatura, edad: edadP };
  const ahora = new Date();
  const horaActual = pad(ahora.getHours()) + ":" + pad(ahora.getMinutes());
  const [f, setF] = useState({ a: "", b: "", pulso: "", ctx: CTX_GLUCOSA[0], fecha: hoy, hora: horaActual, notas: "" });
  const [nuevaHora, setNuevaHora] = useState("08:00");
  const [nuevoCtx, setNuevoCtx] = useState(CTX_GLUCOSA[0]);
  const [pdfDesde, setPdfDesde] = useState(addDays(hoy, -29));
  const [pdfHasta, setPdfHasta] = useState(hoy);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const esFuera = (r) => {
    if (r.tipo === "peso") { const c = clasIMC(r.a, estatura); return c ? c.dir !== null : false; }
    const c = clasificar(r.tipo, r.a, r.b, r.ctx, extraClin);
    return c ? !c.ok : false;
  };

  const exportarSaludPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const enRango = readings.filter((r) => r.fecha >= pdfDesde && r.fecha <= pdfHasta);
    if (enRango.length === 0) { avisar("No hay mediciones en el rango de fechas seleccionado"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const perfil = data.perfil || {};
    const edad = calcEdad(perfil.fechaNac);
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Reporte de salud", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    const linea1 = (perfil.nombre ? "Paciente: " + perfil.nombre : "Paciente") + (edad !== null ? "  ·  " + edad + " años" : "") + (perfil.sexo ? "  ·  " + perfil.sexo : "") + (estatura ? "  ·  Estatura: " + estatura + " cm" : "");
    doc.text(linea1, 14, 21);
    doc.text("Periodo: " + fmtDateLong(pdfDesde) + " — " + fmtDateLong(pdfHasta) + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 26);
    const dxTxt = [...(perfil.dx || []), perfil.condiciones].filter(Boolean).join(", ");
    if (dxTxt) doc.text("Diagnósticos: " + dxTxt, 14, 31);
    let y = dxTxt ? 37 : 33;

    Object.keys(METRICAS).forEach((t) => {
      const m = METRICAS[t];
      const rows = enRango.filter((r) => r.tipo === t).slice().sort((a, b) => ((a.fecha + a.hora) < (b.fecha + b.hora) ? -1 : 1));
      if (rows.length === 0) return;
      if (y > 250) { doc.addPage(); y = 15; }
      doc.setFontSize(12); doc.setTextColor(4, 120, 87);
      doc.text(m.label + " (" + m.unidad + ")", 14, y);
      const marca = rows.map((r) => esFuera(r));
      const body = rows.map((r) => {
        const c = t === "peso" ? clasIMC(r.a, estatura) : clasificar(t, r.a, r.b, r.ctx, extraClin);
        const val = t === "presion" ? r.a + "/" + r.b + (r.pulso ? "  ·  " + r.pulso + " lpm" : "")
          : t === "cintura" ? r.a + " cm" + (r.b ? "  ·  cadera " + r.b + " cm" : "")
          : t === "orina" ? (NIVELES_ORINA[r.a - 1] ? NIVELES_ORINA[r.a - 1].label : String(r.a))
          : t === "heces" ? ("Bristol " + r.a + (COLORES_HECES[r.b - 1] ? " · " + COLORES_HECES[r.b - 1].label : ""))
          : String(r.a);
        const clas = c ? (c.txt + (t === "peso" && c.imc ? " (IMC " + c.imc + ")" : "")) : "—";
        return [fmtDate(r.fecha), fmt12(r.hora), val, r.ctx || "—", clas, r.notas || ""];
      });
      doc.autoTable({
        head: [["Fecha", "Hora", "Valor", "Contexto", "Clasificación", "Notas"]],
        body, startY: y + 2,
        styles: { fontSize: 8, cellPadding: 1.6 },
        headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
        alternateRowStyles: { fillColor: [245, 250, 248] },
        didParseCell: (d) => {
          if (d.section === "body" && d.column.index === 4) {
            if (marca[d.row.index]) { d.cell.styles.textColor = [190, 18, 60]; d.cell.styles.fontStyle = "bold"; }
            else { d.cell.styles.textColor = [4, 120, 87]; }
          }
        },
      });
      y = doc.lastAutoTable.finalY + 4;
      const vals = rows.map((r) => r.a);
      const fuera = rows.filter((r) => esFuera(r)).length;
      let resumen;
      if (t === "orina" || t === "heces") {
        const porDia = {};
        rows.forEach((r) => { porDia[r.fecha] = (porDia[r.fecha] || 0) + 1; });
        const nDias = Object.keys(porDia).length;
        const promD = nDias ? Math.round((rows.length / nDias) * 10) / 10 : 0;
        const maxD = Math.max(...Object.values(porDia));
        resumen = "Resumen: " + rows.length + " registros en " + nDias + " día(s)  ·  Frecuencia promedio: " + promD + " por día  ·  Máximo en un día: " + maxD + "  ·  Con dato de alerta: " + fuera + (fuera > 0 ? "  (marcados en rojo)" : "");
      } else {
        const promA = Math.round((vals.reduce((s, v) => s + v, 0) / vals.length) * 10) / 10;
        resumen = "Resumen: " + rows.length + " mediciones  ·  Promedio: " + promA;
        if (t === "presion") {
          const promB = Math.round((rows.reduce((s, r) => s + r.b, 0) / rows.length) * 10) / 10;
          resumen = "Resumen: " + rows.length + " mediciones  ·  Promedio: " + promA + "/" + promB;
        }
        resumen += "  ·  Mín: " + Math.min(...vals) + "  ·  Máx: " + Math.max(...vals) + "  ·  Fuera de rango: " + fuera + (fuera > 0 ? "  (marcadas en rojo)" : "");
      }
      doc.setFontSize(8); doc.setTextColor(fuera > 0 ? 190 : 60, fuera > 0 ? 18 : 60, fuera > 0 ? 60 : 60);
      doc.text(resumen, 14, y);
      y += 9;
    });

    if (y > 270) { doc.addPage(); y = 15; }
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Rangos de referencia generales para adultos. Este reporte es informativo y no sustituye la valoración médica.", 14, y);
    doc.save("reporte-salud-" + pdfDesde + "-a-" + pdfHasta + ".pdf");
    avisar("Reporte de salud en PDF descargado");
  };

  const M = METRICAS[tipo];

  const guardarVitals = (next) => persist({ ...data, vitals: next });

  const ctxDefault = (t) => t === "glucosa" ? CTX_GLUCOSA[0] : t === "fc" ? CTX_FC[0] : t === "sueno" ? CTX_SUENO[0] : t === "dolor" ? LOC_DOLOR[0] : t === "orina" ? CTX_ORINA[0] : t === "heces" ? CTX_HECES[0] : (horarios[t] && horarios[t][0] ? horarios[t][0].ctx : "");
  const aDefault = (t) => (t === "dolor" || t === "estres") ? "0" : t === "orina" ? "2" : t === "heces" ? "4" : "";
  const bDefault = (t) => t === "heces" ? "1" : "";

  const cambiarTipo = (t) => {
    setTipo(t);
    setErr(null);
    setEditRead(null);
    setF({ a: aDefault(t), b: bDefault(t), pulso: "", ctx: ctxDefault(t), fecha: hoy, hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()), notas: "" });
  };

  const editarLectura = (r) => {
    setTipo(r.tipo);
    setEditRead(r.id);
    setErr(null);
    setF({ a: r.a, b: r.b || "", pulso: r.pulso || "", ctx: r.ctx || ctxDefault(r.tipo), fecha: r.fecha, hora: r.hora, notas: r.notas || "" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const registrar = () => {
    const num = f.a === "" ? NaN : Number(f.a);
    if (tipo === "presion") {
      if (!f.a || num <= 0) return setErr("Escribe la presión sistólica (número de arriba).");
      if (!f.b || Number(f.b) <= 0) return setErr("Escribe la presión diastólica (número de abajo).");
      if (num < 50 || num > 260 || Number(f.b) < 30 || Number(f.b) > 160) return setErr("Esos valores de presión están fuera de lo esperable (sistólica 50–260, diastólica 30–160). Verifica la medición.");
    } else if (tipo === "dolor" || tipo === "estres") {
      if (isNaN(num) || num < 0 || num > 10) return setErr("Selecciona un nivel de 0 a 10 con el control deslizante.");
    } else if (tipo === "orina") {
      if (!(num >= 1 && num <= 8)) return setErr("Selecciona el color observado.");
    } else if (tipo === "heces") {
      if (!(num >= 1 && num <= 7)) return setErr("Selecciona la forma según la escala de Bristol.");
      if (!(Number(f.b) >= 1 && Number(f.b) <= 7)) return setErr("Selecciona el color observado.");
    } else if (isNaN(num) || num <= 0) {
      return setErr("Escribe el valor de la medición.");
    }
    const rangos = { glucosa: [20, 600], peso: [20, 400], spo2: [50, 100], temp: [30, 45], fc: [20, 250], fr: [4, 60], cintura: [40, 200], cuello: [20, 70], sueno: [0.5, 24] };
    if (rangos[tipo] && !isNaN(num) && (num < rangos[tipo][0] || num > rangos[tipo][1])) return setErr("El valor " + num + " " + M.unidad + " está fuera de lo esperable (" + rangos[tipo][0] + "–" + rangos[tipo][1] + "). Verifica la medición o la unidad.");
    if (tipo === "cintura" && f.b && (Number(f.b) < 40 || Number(f.b) > 220)) return setErr("La cadera debe estar entre 40 y 220 cm, o déjala vacía.");
    setErr(null);
    const r = {
      id: editRead || uid(), tipo, fecha: f.fecha, hora: f.hora,
      a: Number(f.a === "" ? 0 : f.a),
      b: tipo === "presion" || tipo === "heces" ? Number(f.b) : (tipo === "cintura" && f.b ? Number(f.b) : null),
      pulso: tipo === "presion" && f.pulso ? Number(f.pulso) : null,
      ctx: f.ctx || "", notas: f.notas.trim(), ts: new Date().toISOString(),
    };
    const nuevas = editRead ? readings.map((x) => (x.id === editRead ? r : x)) : [...readings, r];
    guardarVitals({ ...vitals, readings: nuevas, horarios });
    const c = tipo === "peso" ? clasIMC(r.a, estatura) : clasificar(tipo, r.a, r.b, r.ctx, extraClin);
    avisar((editRead ? "Medición corregida" : "Medición registrada") + (c ? " · " + c.txt : ""));
    setEditRead(null);
    setF({ ...f, a: aDefault(tipo), b: bDefault(tipo), pulso: "", notas: "", hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()) });
  };

  const eliminarLectura = (id) => {
    guardarVitals({ ...vitals, readings: readings.filter((r) => r.id !== id), horarios });
    setConfirmDel(null);
    avisar("Medición eliminada");
  };

  /* horarios de medición */
  const agregarHora = () => {
    const lista = horarios[tipo] || [];
    if (lista.some((h) => h.hora === nuevaHora)) { avisar("Esa hora ya está en el horario"); return; }
    const item = { hora: nuevaHora, ctx: tipo === "glucosa" ? nuevoCtx : (f.ctx || "") };
    const next = { ...horarios, [tipo]: [...lista, item].sort((x, y) => timeToMin(x.hora) - timeToMin(y.hora)) };
    guardarVitals({ ...vitals, readings, horarios: next });
    avisar("Hora agregada al horario de medición");
  };

  const quitarHora = (hora) => {
    const next = { ...horarios, [tipo]: horarios[tipo].filter((h) => h.hora !== hora) };
    guardarVitals({ ...vitals, readings, horarios: next });
  };

  /* mediciones de hoy según horario (hecha si hay lectura hoy a ±2 h de la hora programada) */
  const lecturasHoy = readings.filter((r) => r.tipo === tipo && r.fecha === hoy);
  const checklistHoy = (horarios[tipo] || []).map((h) => {
    const done = lecturasHoy.some((r) => circDist(timeToMin(r.hora), timeToMin(h.hora)) <= 120);
    return { ...h, done };
  });

  /* historial y estadísticas */
  const delTipo = readings.filter((r) => r.tipo === tipo)
    .slice().sort((x, y) => ((x.fecha + x.hora) < (y.fecha + y.hora) ? -1 : 1));
  const ultimas = delTipo.slice(-14);
  const ultima = delTipo[delTipo.length - 1];
  const hace7 = addDays(hoy, -6);
  const semana = delTipo.filter((r) => r.fecha >= hace7);
  const prom = (arr, k) => arr.length ? Math.round((arr.reduce((s, r) => s + r[k], 0) / arr.length) * 10) / 10 : null;
  const prevPeso = tipo === "peso" && delTipo.length > 1 ? delTipo[delTipo.length - 2] : null;
  const deltaPeso = prevPeso && ultima ? Math.round((ultima.a - prevPeso.a) * 10) / 10 : null;

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  return (
    <div className="space-y-4">
      {/* perfil del paciente */}
      <Perfil data={data} persist={persist} avisar={avisar} />

      {/* exportar reporte PDF por fechas */}
      {readings.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="flex flex-wrap items-end gap-3">
            <div className="flex items-center gap-2 font-bold text-slate-700 text-sm w-full sm:w-auto"><IDownload cls="w-4 h-4 text-emerald-700" /> Reporte PDF para tu médico</div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Desde</label>
              <input type="date" className="rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={pdfDesde} onChange={(e) => setPdfDesde(e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Hasta</label>
              <input type="date" className="rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white" value={pdfHasta} onChange={(e) => setPdfHasta(e.target.value)} />
            </div>
            <button onClick={exportarSaludPDF} className="bg-emerald-700 hover:bg-emerald-800 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-1.5">
              <IDownload cls="w-4 h-4" /> Exportar PDF
            </button>
          </div>
          <p className="text-xs text-slate-400 mt-2">Incluye todas las métricas registradas en el periodo (signos vitales, temperatura, medidas corporales, dolor, sueño, estrés, orina con frecuencia y color, y evacuaciones con escala de Bristol y color), con los datos de alerta resaltados en rojo y resumen por métrica. Es un registro objetivo muy útil para tu médico.</p>
        </section>
      )}

      {/* selector de métrica */}
      <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
        {Object.keys(METRICAS).map((t) => {
          const m = METRICAS[t];
          const activo = tipo === t;
          return (
            <button key={t} onClick={() => cambiarTipo(t)}
              className={"rounded-2xl border p-3 flex flex-col items-center gap-1 transition-colors " +
                (activo ? "bg-emerald-700 border-emerald-700 text-white" : "bg-white border-slate-200 text-slate-600 hover:border-emerald-300")}>
              <m.Icon cls={"w-6 h-6 " + (activo ? "text-white" : m.color)} />
              <span className="text-xs font-semibold text-center leading-tight">{m.label}</span>
            </button>
          );
        })}
      </div>

      {/* mediciones de hoy según horario */}
      {checklistHoy.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-2">Mediciones de {M.label.toLowerCase()} para hoy</div>
          <div className="flex flex-wrap gap-2">
            {checklistHoy.map((h) => (
              <button key={h.hora} onClick={() => { if (!h.done) setF({ ...f, hora: h.hora, ctx: h.ctx || f.ctx }); }}
                className={"inline-flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-full border " +
                  (h.done ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-slate-300 text-slate-600 hover:border-emerald-400")}>
                {h.done ? <ICheckCircle cls="w-4 h-4" /> : <IClock cls="w-4 h-4" />}
                {fmt12(h.hora)}{h.ctx ? " · " + h.ctx : ""}
              </button>
            ))}
          </div>
          <p className="text-xs text-slate-400 mt-1.5">Toca una medición pendiente para prellenar el registro con esa hora y contexto.</p>
        </section>
      )}

      {/* registro rápido */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <h2 className="font-bold text-slate-700 flex items-center gap-2"><M.Icon cls={"w-5 h-5 " + M.color} /> {editRead ? "Corregir medición de " : "Registrar "}{M.label.toLowerCase()}</h2>
        {editRead && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 flex items-center justify-between text-sm">
            <span className="text-amber-800 font-medium flex items-center gap-1.5"><IEdit cls="w-4 h-4" /> Editando una medición existente</span>
            <button onClick={() => cambiarTipo(tipo)} className="text-xs px-2.5 py-1 rounded-lg bg-white border border-amber-300 text-amber-800">Cancelar</button>
          </div>
        )}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {tipo === "presion" && (
            <React.Fragment>
              <div>
                <label className={labelCls}>Sistólica (arriba)</label>
                <input type="number" min="1" className={inputCls} placeholder="120" value={f.a} onChange={(e) => set("a", e.target.value)} />
              </div>
              <div>
                <label className={labelCls}>Diastólica (abajo)</label>
                <input type="number" min="1" className={inputCls} placeholder="80" value={f.b} onChange={(e) => set("b", e.target.value)} />
              </div>
              <div>
                <label className={labelCls}>Pulso (opcional)</label>
                <input type="number" min="1" className={inputCls} placeholder="72" value={f.pulso} onChange={(e) => set("pulso", e.target.value)} />
              </div>
            </React.Fragment>
          )}
          {tipo === "cintura" && (
            <React.Fragment>
              <div>
                <label className={labelCls}>Cintura (cm)</label>

          {tipo === "heces" && (

                <label className={labelCls}>Molestias</label>
                <select className={inputCls} value={f.ctx} onChange={(e) => set("ctx", e.target.value)}>

          {["glucosa", "peso", "spo2", "temp", "fr", "cuello"].indexOf(tipo) >= 0 && (

              <label className={labelCls}>Valor ({M.unidad})</label>
              <input type="number" min="1" step={tipo === "peso" || tipo === "temp" || tipo === "cuello" ? "0.1" : "1"} className={inputCls}
                placeholder={PLACE_VALOR[tipo]}

        {err && (

      {/* cómo medir correctamente */}
      <section className="bg-sky-50 rounded-2xl border border-sky-100 p-4">
        <button onClick={() => setGuiaOpen(!guiaOpen)} className="w-full flex items-center justify-between text-sky-900">

      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <button onClick={() => setHorarioOpen(!horarioOpen)} className="w-full flex items-center justify-between">

          {horarioOpen ? <IChevD cls="w-4 h-4 text-slate-400" /> : <IChevR cls="w-4 h-4 text-slate-400" />}
        </button>
        {horarioOpen && (
          <div className="mt-3 space-y-3">
            <div className="flex flex-wrap gap-2">
              {(horarios[tipo] || []).map((h) => (
                <span key={h.hora} className="inline-flex items-center gap-1.5 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-3 py-1 rounded-full">

                </span>

              {(horarios[tipo] || []).length === 0 && <span className="text-sm text-slate-400">Sin horas programadas.</span>}
            </div>
            <div className="flex flex-wrap gap-2 items-end">
              <div>
                <label className={labelCls}>Nueva hora</label>

      {/* análisis de peso con IMC y recomendación */}
      {tipo === "peso" && ultima && (

          const falta = Math.round((rango[0] - ultima.a) * 10) / 10;
          const kg = c.dir === "bajar" ? exceso : c.dir === "subir" ? falta : 0;

            <section className={"rounded-2xl border p-4 " + (c.dir ? "bg-amber-50 border-amber-200" : "bg-emerald-50 border-emerald-200")}>

                  <p className="text-xs text-slate-600">{c.dir === "bajar"

                    : "Sugerencias generales: aumenta la frecuencia de comidas con alimentos densos en nutrientes (avena, frutos secos, aguacate, lácteos, proteína); acompaña con ejercicio de fuerza para ganar masa muscular y no solo grasa."}</p>

      {tipo === "fc" && (

      {/* análisis de sueño */}
      {tipo === "sueno" && semana.length >= 3 && (() => {

        return (
          <section className={"rounded-2xl border p-4 text-sm " + (promS >= 7 && promS <= 9 ? "bg-emerald-50 border-emerald-200 text-emerald-900" : "bg-amber-50 border-amber-200 text-amber-900")}>

      {/* análisis de estrés */}
      {tipo === "estres" && semana.length >= 3 && prom(semana, "a") >= 7 && (

          <b>Tu estrés promedio de la semana es alto ({prom(semana, "a")}/10).</b> El estrés sostenido eleva la presión y la glucosa, y deteriora el sueño. Prueba respiración 4-7-8 (inhala 4 s, sostén 7 s, exhala 8 s, 4 ciclos), camina 20–30 min al día y cuida tu horario de sueño. Si se mantiene alto o interfiere con tu vida diaria, buscar apoyo profesional es una decisión inteligente.
        </section>
      )}
      {/* frecuencia diaria de orina y evacuaciones */}
      {(tipo === "orina" || tipo === "heces") && (() => {
        const hoyN = delTipo.filter((r) => r.fecha === hoy).length;
        const dias7 = {};
        semana.forEach((r) => { dias7[r.fecha] = (dias7[r.fecha] || 0) + 1; });
        const diasConReg = Object.keys(dias7).length;
        const promDia = diasConReg ? Math.round((semana.length / diasConReg) * 10) / 10 : null;
        const noct = tipo === "orina" ? delTipo.filter((r) => r.fecha === hoy && (r.ctx || "").indexOf("nicturia") >= 0).length : 0;
        const liqHoy = tipo === "heces" ? delTipo.filter((r) => r.fecha === hoy && r.a >= 6).length : 0;
        const sem7 = semana.length;
        let fr = null;
        if (tipo === "orina") {
          if (hoyN === 0) fr = null;
          else if (hoyN > 8) fr = { txt: "Frecuencia aumentada (más de 8 hoy)", cls: "bg-amber-100 text-amber-700 border-amber-200" };

          else fr = { txt: "Pocas micciones hasta ahora", cls: "bg-sky-100 text-sky-700 border-sky-200" };

          if (hoyN === 0) fr = null;
          else if (hoyN > 3) fr = { txt: "Más de 3 al día: frecuencia aumentada", cls: "bg-amber-100 text-amber-700 border-amber-200" };

        }
        return (
          <section className="bg-white rounded-2xl border border-slate-200 p-4">
            <div className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-2">Frecuencia — registra cada {tipo === "orina" ? "micción" : "evacuación"} y este conteo se calcula solo</div>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div>
                <div className="text-2xl font-extrabold text-slate-800">{hoyN}</div>
                <div className="text-xs text-slate-500">Veces hoy</div>
              </div>
              <div>
                <div className="text-2xl font-extrabold text-slate-800">{promDia ?? "—"}</div>
                <div className="text-xs text-slate-500">Promedio por día (últimos 7 días)</div>
              </div>
              <div>
                <div className="text-2xl font-extrabold text-slate-800">{sem7}</div>
                <div className="text-xs text-slate-500">Total en 7 días</div>
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5 mt-3">
              {fr && <span className={"text-xs px-2 py-0.5 rounded-full border " + fr.cls}>{fr.txt}</span>}
              {tipo === "orina" && noct > 0 && <span className="text-xs px-2 py-0.5 rounded-full border bg-amber-100 text-amber-700 border-amber-200">🌙 {noct} vez(es) en la noche (nicturia)</span>}
              {tipo === "heces" && liqHoy >= 3 && <span className="text-xs px-2 py-0.5 rounded-full border bg-rose-100 text-rose-700 border-rose-200">💧 {liqHoy} evacuaciones líquidas hoy — toma suero oral</span>}
              {tipo === "heces" && sem7 > 0 && sem7 < 3 && diasConReg >= 5 && <span className="text-xs px-2 py-0.5 rounded-full border bg-amber-100 text-amber-700 border-amber-200">Menos de 3 por semana: estreñimiento</span>}
            </div>
            <p className="text-[11px] text-slate-400 mt-2">{tipo === "orina"
              ? "Referencia: 4–8 micciones al día es lo normal en adultos. Más de 8, ardor, urgencia o despertar varias veces en la noche son datos importantes para tu médico."
              : "Referencia: de 3 veces por semana a 3 veces por día es normal. Más de 3 al día sugiere diarrea; con fiebre, sangre o más de 6 al día, busca atención médica."}</p>
          </section>
        );
      })()}

      {/* alerta clínica de orina */}
      {tipo === "orina" && ultima && ultima.a >= 6 && (
        <section className="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800">
          {ultima.a === 6 && <p><b>⚠️ Orina café oscura (coluria):</b> puede indicar bilirrubina elevada por un problema del hígado o vías biliares, en especial si se acompaña de ojos o piel amarillos, heces pálidas o comezón. No es un dato para esperar: <b>coméntalo con tu médico pronto</b> y lleva este registro.</p>}
          {ultima.a === 7 && <p><b>🚨 Posible sangre en la orina:</b> amerita valoración médica <b>hoy mismo</b>, sobre todo si tienes plaquetas bajas, fiebre o dolor. Antes de alarmarte verifica si comiste betabel o tomaste algún medicamento que pinte la orina, y anótalo.</p>}
          {ultima.a === 8 && <p><b>⚠️ Orina turbia o con espuma persistente:</b> puede indicar infección urinaria (más probable si hay ardor, urgencia o mal olor) o proteínas en la orina. Si se repite, solicita a tu médico un examen general de orina.</p>}
        </section>
      )}

      {/* alerta clínica de evacuaciones */}
      {tipo === "heces" && ultima && (ultima.b === 6 || ultima.b === 7 || ultima.b === 5 || ultima.a === 7) && (
        <section className="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800 space-y-1.5">
          {ultima.b === 6 && <p><b>🚨 Heces negras alquitranadas (melena):</b> son un dato de <b>posible sangrado del tubo digestivo alto</b> (estómago o duodeno). Con antecedente de gastritis erosiva o plaquetas bajas es una <b>urgencia: acude a un servicio médico de inmediato</b>, no esperes a la siguiente evacuación. Nota: el hierro en pastillas y el bismuto (Pepto-Bismol) también oscurecen las heces, pero sin el olor fétido característico; anótalo si los tomaste.</p>}
          {ultima.b === 7 && <p><b>🚨 Sangre roja visible:</b> puede venir de hemorroides o fisuras, pero también de sangrado intestinal. <b>Busca valoración médica hoy</b>, sobre todo si es abundante, se repite, o hay mareo, palidez o dolor abdominal.</p>}
          {ultima.b === 5 && <p><b>⚠️ Heces pálidas o blanquecinas (acolia):</b> sugieren que la bilis no está llegando al intestino (hígado o vía biliar). Si además la orina está oscura o la piel/ojos se ven amarillos, <b>consulta a tu médico pronto</b>.</p>}
          {ultima.a === 7 && ultima.b !== 6 && ultima.b !== 7 && <p><b>Diarrea líquida:</b> hidrátate con suero oral (Vida Suero Oral) a pequeños tragos frecuentes y dieta blanda. Busca atención si hay fiebre, sangre, más de 6 evacuaciones al día o dura más de 2–3 días.</p>}
        </section>
      )}

{/* estadísticas y tendencia */}
      {delTipo.length > 0 && (
        <section className="bg-white rounded-2xl border border-slate-200 p-4">
          <div className="grid grid-cols-3 gap-3 mb-2">
            <div className="text-center">
              <div className="text-xl font-extrabold text-slate-800">
                {ultima ? (tipo === "presion" ? ultima.a + "/" + ultima.b : ultima.a) : "—"}
                <span className="text-xs font-medium text-slate-400"> {M.unidad}</span>
              </div>
              <div className="text-xs text-slate-500">Última ({ultima ? fmtDate(ultima.fecha) : ""})</div>
            </div>
            <div className="text-center">
              <div className="text-xl font-extrabold text-slate-800">
                {tipo === "presion" ? (prom(semana, "a") || "—") + "/" + (prom(semana, "b") || "—") : (tipo === "orina" || tipo === "heces") ? semana.length : (prom(semana, "a") ?? "—")}
                <span className="text-xs font-medium text-slate-400"> {(tipo === "orina" || tipo === "heces") ? "veces" : M.unidad}</span>
              </div>
              <div className="text-xs text-slate-500">{(tipo === "orina" || tipo === "heces") ? "Registros en 7 días" : "Promedio 7 días (" + semana.length + " med.)"}</div>
            </div>
            <div className="text-center">
              {tipo === "peso" && deltaPeso !== null ? (
                <React.Fragment>
                  <div className={"text-xl font-extrabold " + (deltaPeso > 0 ? "text-amber-600" : deltaPeso < 0 ? "text-emerald-700" : "text-slate-800")}>
                    {deltaPeso > 0 ? "+" : ""}{deltaPeso} kg
                  </div>
                  <div className="text-xs text-slate-500">vs. medición anterior</div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="text-xl font-extrabold text-slate-800">{delTipo.length}</div>
                  <div className="text-xs text-slate-500">Mediciones totales</div>
                </React.Fragment>
              )}
            </div>
          </div>
          {ultimas.length >= 2 && (
            <React.Fragment>
              <Sparkline puntos={ultimas.map((r) => r.a)} puntos2={tipo === "presion" ? ultimas.map((r) => r.b) : null}
                unidad={M.unidad} fechas={ultimas.map((r) => r.fecha)}
                banda={tipo === "peso" ? (estatura ? rangoPesoSaludable(estatura) : null) : (BANDAS_REF[tipo] || null)} />
              <div className="text-xs text-slate-400 text-center">Tendencia de las últimas {ultimas.length} mediciones{tipo === "presion" ? " (verde: sistólica · gris punteada: diastólica)" : ""}</div>
            </React.Fragment>
          )}
        </section>
      )}

      {/* historial */}
      <section>
        <h2 className="text-sm font-bold uppercase tracking-wide text-slate-500 mb-2">Historial de {M.label.toLowerCase()}</h2>
        {delTipo.length === 0 ? (
          <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-6 text-center text-sm text-slate-400">
            Aún no hay mediciones de {M.label.toLowerCase()}. Registra la primera arriba.
          </div>
        ) : (
          <div className="space-y-2">
            {delTipo.slice().reverse().slice(0, 30).map((r) => {
              const c = r.tipo === "peso" ? clasIMC(r.a, estatura) : clasificar(r.tipo, r.a, r.b, r.ctx, extraClin);
              return (
                <div key={r.id} className="bg-white rounded-2xl border border-slate-200 p-3.5 flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-bold text-slate-800 text-lg">
                        {tipo === "presion" ? r.a + "/" + r.b : tipo === "orina" ? "Color " + r.a : tipo === "heces" ? "Bristol " + r.a : r.a} <span className="text-xs font-medium text-slate-400">{tipo === "orina" || tipo === "heces" ? "" : M.unidad}</span>
                      </span>
                      {tipo === "heces" && r.b && COLORES_HECES[r.b - 1] && <span className="text-xs text-slate-500">🎨 {COLORES_HECES[r.b - 1].label}</span>}
                      {tipo === "orina" && NIVELES_ORINA[r.a - 1] && <span className="text-xs text-slate-500">{NIVELES_ORINA[r.a - 1].label.split("· ")[1]}</span>}
                      {r.pulso && <span className="text-xs text-slate-500">♥ {r.pulso} lpm</span>}
                      {c && <span className={"text-xs px-2 py-0.5 rounded-full border " + c.cls}>{c.txt}{r.tipo === "peso" && c.imc ? " · IMC " + c.imc : ""}</span>}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      {fmtDate(r.fecha)} · {fmt12(r.hora)}{r.ctx ? " · " + r.ctx : ""}{r.tipo === "cintura" && r.b ? " · cadera " + r.b + " cm" : ""}{r.notas ? " · " + r.notas : ""}
                    </div>
                  </div>
                  {confirmDel === r.id ? (
                    <div className="flex items-center gap-1 shrink-0">
                      <button onClick={() => eliminarLectura(r.id)} className="text-xs px-2 py-1 rounded-lg bg-rose-600 text-white">Eliminar</button>
                      <button onClick={() => setConfirmDel(null)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">No</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 shrink-0">
                      <button onClick={() => editarLectura(r)} className="text-slate-300 hover:text-emerald-700" title="Corregir esta medición"><IEdit cls="w-4 h-4" /></button>
                      <button onClick={() => setConfirmDel(r.id)} className="text-slate-300 hover:text-rose-600" title="Eliminar"><ITrash cls="w-4 h-4" /></button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </section>

      <p className="text-xs text-slate-400 text-center">Los rangos mostrados son referencias generales para adultos y pueden variar según tu edad, embarazo, medicamentos y diagnósticos; tu médico puede fijarte metas distintas. Si obtienes valores en zona de alerta o tienes síntomas, busca atención médica.</p>
    </div>
  );
}

/* ============================================================
   Registro de comidas (enfoque de nutrición conductual)
   ============================================================ */
const TIPOS_COMIDA = ["Desayuno", "Colación matutina", "Comida", "Colación vespertina", "Cena"];
const GRUPOS_ALIM = [
  { id: "verduras", label: "Verduras", buena: true },
  { id: "frutas", label: "Frutas", buena: true },
  { id: "proteina", label: "Proteína (carne, huevo, leguminosas)", buena: true },
  { id: "cereales", label: "Cereales integrales", buena: true },
  { id: "lacteos", label: "Lácteos", buena: true },
  { id: "grasas", label: "Grasas saludables (aguacate, nueces, aceite de oliva)", buena: true },
  { id: "procesados", label: "Ultraprocesados / azúcar", buena: false },
  { id: "bebidas", label: "Bebida azucarada", buena: false },
  { id: "alcohol", label: "Alcohol", buena: false },
];
const CONTEXTOS_COMIDA = ["Sin distracciones", "Viendo pantalla", "Con prisa", "Por ansiedad/estrés", "Reunión social"];
const META_AGUA = 8;

function Comidas({ data, persist, avisar, hoy }) {
  const comidas = data.comidas || [];
  const agua = data.agua || {};
  const ahora = new Date();
  const vacioC = { fecha: hoy, hora: pad(ahora.getHours()) + ":" + pad(ahora.getMinutes()), tipo: "Desayuno", alimentos: "", grupos: [], hambre: 3, saciedad: 3, contexto: "", notas: "" };
  const [f, setF] = useState(vacioC);
  const [editCom, setEditCom] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [err, setErr] = useState(null);
  const [diaAbierto, setDiaAbierto] = useState(null);
  const [pdfDesde, setPdfDesde] = useState(addDays(hoy, -6));
  const [pdfHasta, setPdfHasta] = useState(hoy);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const aguaHoy = agua[hoy] || 0;
  const ajustarAgua = (d) => {
    const n = Math.max(0, aguaHoy + d);
    persist({ ...data, agua: { ...agua, [hoy]: n } });
    if (d > 0 && n === META_AGUA) avisar("¡Meta de agua del día cumplida! 💧");
  };

  const toggleGrupo = (id) => set("grupos", f.grupos.includes(id) ? f.grupos.filter((g) => g !== id) : [...f.grupos, id]);

  const guardar = () => {
    if (!f.alimentos.trim()) return setErr("Describe qué comiste (ej. 2 tacos de pollo, ensalada, agua de jamaica).");
    setErr(null);
    const c = { id: editCom || uid(), fecha: f.fecha, hora: f.hora, tipo: f.tipo, alimentos: f.alimentos.trim(), grupos: f.grupos, hambre: Number(f.hambre), saciedad: Number(f.saciedad), contexto: f.contexto, notas: f.notas.trim(), ts: new Date().toISOString() };
    persist({ ...data, comidas: editCom ? comidas.map((x) => (x.id === editCom ? c : x)) : [...comidas, c] });
    avisar(editCom ? "Comida corregida" : "Comida registrada");
    setEditCom(null);
    setF({ ...vacioC, fecha: f.fecha, hora: pad(new Date().getHours()) + ":" + pad(new Date().getMinutes()) });
  };

  const editar = (c) => {
    setEditCom(c.id);
    setF({ fecha: c.fecha, hora: c.hora, tipo: c.tipo, alimentos: c.alimentos, grupos: c.grupos || [], hambre: c.hambre, saciedad: c.saciedad, contexto: c.contexto || "", notas: c.notas || "" });
    setErr(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const eliminar = (id) => {
    persist({ ...data, comidas: comidas.filter((c) => c.id !== id) });
    setConfirmDel(null);
    avisar("Registro eliminado");
  };

  const porFecha = (fecha) => comidas.filter((c) => c.fecha === fecha).slice().sort((a, b) => (a.hora < b.hora ? -1 : 1));
  const deHoy = porFecha(hoy);
  const fechasPasadas = [...new Set(comidas.filter((c) => c.fecha < hoy).map((c) => c.fecha))].sort().reverse().slice(0, 14);

  const resumenDia = (lista) => {
    const g = {};
    lista.forEach((c) => (c.grupos || []).forEach((x) => { g[x] = (g[x] || 0) + 1; }));
    return g;
  };

  const exportarComidasPDF = () => {
    if (!(window.jspdf && window.jspdf.jsPDF)) { avisar("No se pudo cargar el generador de PDF. Revisa tu conexión a internet y recarga."); return; }
    const enRango = comidas.filter((c) => c.fecha >= pdfDesde && c.fecha <= pdfHasta).slice().sort((a, b) => ((a.fecha + a.hora) < (b.fecha + b.hora) ? -1 : 1));
    if (enRango.length === 0) { avisar("No hay comidas registradas en ese rango de fechas"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });
    const perfil = data.perfil || {};
    doc.setFontSize(16); doc.setTextColor(6, 78, 59);
    doc.text("Diario de alimentación", 14, 15);
    doc.setFontSize(9); doc.setTextColor(100);
    doc.text((perfil.nombre ? "Paciente: " + perfil.nombre + "  ·  " : "") + "Periodo: " + fmtDateLong(pdfDesde) + " — " + fmtDateLong(pdfHasta) + "  ·  Generado: " + fmtDateLong(todayStr()) + "  ·  MediControl", 14, 21);
    const nombreGrupo = (id) => { const g = GRUPOS_ALIM.find((x) => x.id === id); return g ? g.label.split(" (")[0] : id; };
    doc.autoTable({
      head: [["Fecha", "Hora", "Comida", "Alimentos", "Grupos presentes", "Hambre→Saciedad", "Contexto", "Notas"]],
      body: enRango.map((c) => [
        fmtDate(c.fecha), fmt12(c.hora), c.tipo, c.alimentos,
        (c.grupos || []).map(nombreGrupo).join(", ") || "—",
        c.hambre + " → " + c.saciedad,
        c.contexto || "—", c.notas || "",
      ]),
      startY: 26, styles: { fontSize: 7.5, cellPadding: 1.6 },
      headStyles: { fillColor: [4, 120, 87], fontSize: 8 },
      alternateRowStyles: { fillColor: [245, 250, 248] },
      columnStyles: { 3: { cellWidth: 70 }, 4: { cellWidth: 55 } },
      didParseCell: (d) => {
        if (d.section === "body" && d.column.index === 4) {
          const raw = String(d.cell.raw);
          if (raw.indexOf("Ultraprocesados") >= 0 || raw.indexOf("Bebida azucarada") >= 0 || raw.indexOf("Alcohol") >= 0) { d.cell.styles.textColor = [190, 18, 60]; }
        }
      },
    });
    let yF = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 30) + 8;
    /* análisis nutricional del periodo */
    const dias = [...new Set(enRango.map((c) => c.fecha))];
    const conVerduras = enRango.filter((c) => (c.grupos || []).includes("verduras")).length;
    const conProcesados = enRango.filter((c) => (c.grupos || []).some((g) => ["procesados", "bebidas", "alcohol"].includes(g))).length;
    const sinDesayuno = dias.filter((d) => !enRango.some((c) => c.fecha === d && c.tipo === "Desayuno")).length;
    const conAnsiedad = enRango.filter((c) => c.contexto === "Por ansiedad/estrés").length;
    const conPantalla = enRango.filter((c) => c.contexto === "Viendo pantalla").length;
    const aguaProm = dias.length ? Math.round((dias.reduce((s, d) => s + (agua[d] || 0), 0) / dias.length) * 10) / 10 : 0;
    const satAlta = enRango.filter((c) => c.saciedad >= 5).length;
    doc.setFontSize(11); doc.setTextColor(4, 120, 87);
    doc.text("ANÁLISIS DEL PERIODO", 14, yF); yF += 6;
    doc.setFontSize(9); doc.setTextColor(60);
    const lineas = [
      enRango.length + " comidas registradas en " + dias.length + " días (promedio " + Math.round((enRango.length / dias.length) * 10) / 10 + " al día).",
      "Comidas con verduras: " + conVerduras + " de " + enRango.length + " (" + Math.round((conVerduras / enRango.length) * 100) + "%). Meta experta: incluir verduras en al menos 2 comidas principales al día.",
      "Comidas con ultraprocesados, bebidas azucaradas o alcohol: " + conProcesados + " (" + Math.round((conProcesados / enRango.length) * 100) + "%).",
      "Días sin desayuno registrado: " + sinDesayuno + " de " + dias.length + ".",
      "Comidas por ansiedad/estrés: " + conAnsiedad + "  ·  Comidas viendo pantalla: " + conPantalla + "  ·  Comidas hasta sentirte muy lleno (saciedad 5): " + satAlta + ".",
      "Agua: promedio de " + aguaProm + " vasos al día (meta: " + META_AGUA + ").",
    ];
    lineas.forEach((l) => { doc.text("•  " + l, 14, yF); yF += 5; });
    yF += 3;
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text("Registro basado en grupos de alimentos, escala de hambre-saciedad (1=nada, 5=mucho) y contexto de alimentación. No sustituye la valoración de un nutriólogo.", 14, yF);
    doc.save("diario-alimentacion-" + pdfDesde + "-a-" + pdfHasta + ".pdf");
    avisar("Diario de alimentación en PDF descargado");
  };

  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-white";
  const labelCls = "block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1";

  const TarjetaComida = ({ c }) => (
    <div className="bg-white rounded-2xl border border-slate-200 p-3.5 flex items-start gap-3">
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="font-bold text-slate-800">{c.tipo}</span>
          <span className="text-xs text-slate-400">{fmt12(c.hora)}</span>
          <span className="text-xs text-slate-500">hambre {c.hambre} → saciedad {c.saciedad}</span>
          {c.contexto && <span className={"text-xs px-2 py-0.5 rounded-full border " + (c.contexto === "Por ansiedad/estrés" || c.contexto === "Viendo pantalla" || c.contexto === "Con prisa" ? "bg-amber-100 text-amber-700 border-amber-200" : "bg-emerald-100 text-emerald-700 border-emerald-200")}>{c.contexto}</span>}
        </div>
        <div className="text-sm text-slate-600 mt-0.5">{c.alimentos}</div>
        <div className="flex flex-wrap gap-1 mt-1.5">
          {(c.grupos || []).map((g) => {
            const gr = GRUPOS_ALIM.find((x) => x.id === g);
            if (!gr) return null;
            return <span key={g} className={"text-[10px] px-1.5 py-0.5 rounded-full border " + (gr.buena ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-rose-50 text-rose-600 border-rose-200")}>{gr.label.split(" (")[0]}</span>;
          })}
        </div>
        {c.notas && <div className="text-xs text-slate-400 mt-1">{c.notas}</div>}
      </div>
      {confirmDel === c.id ? (
        <div className="flex items-center gap-1 shrink-0">
          <button onClick={() => eliminar(c.id)} className="text-xs px-2 py-1 rounded-lg bg-rose-600 text-white">Eliminar</button>
          <button onClick={() => setConfirmDel(null)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600">No</button>
        </div>
      ) : (
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => editar(c)} className="text-slate-300 hover:text-emerald-700" title="Corregir"><IEdit cls="w-4 h-4" /></button>
          <button onClick={() => setConfirmDel(c.id)} className="text-slate-300 hover:text-rose-600" title="Eliminar"><ITrash cls="w-4 h-4" /></button>
        </div>
      )}
    </div>
  );

  return (
    <div className="space-y-4">
      {/* agua de hoy */}
      <section className="bg-white rounded-2xl border border-slate-200 p-4">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="font-bold text-slate-700 flex items-center gap-2"><IDrop cls="w-5 h-5 text-cyan-600" /> Agua de hoy</div>
            <div className="text-sm text-slate-500">{aguaHoy} de {META_AGUA} vasos (~{aguaHoy * 250} ml)</div>
          </div>
          <div className="flex items-center gap-2">

const fmtFrac = (x) => {
  const ent = Math.floor(x + 0.0001);
  const dec = x - ent;
  const map = [[0,""],[0.25,"¼"],[1/3,"⅓"],[0.5,"½"],[2/3,"⅔"],[0.75,"¾"]];
  let best = map[0];
  for (const m of map) if (Math.abs(dec - m[0]) < Math.abs(dec - best[0])) best = m;
  if (Math.abs(dec - best[0]) > 0.05) return String(Math.round(x * 100) / 100);
  if (ent === 0 && best[1]) return best[1];
  return best[1] ? ent + " " + best[1] : String(ent);
};

const fmtCantidad = (qty, unidad, mult) => {
  const total = qty * mult;
  if (unidad === "g") return Math.round(total) + " g";
  const plural = total > 1.001;
  const u = plural ? (unidad === "lata" ? "latas" : unidad + "s") : unidad;
  return fmtFrac(total) + " " + u;
};

/* ---------- calculadora de IMC y cintura ---------- */
function CalcNutricion() {
  const [peso, setPeso] = useState("");
  const [estatura, setEstatura] = useState("");
  const [cintura, setCintura] = useState("");
  const [sexo, setSexo] = useState("hombre");

  const p = parseFloat(peso), e = parseFloat(estatura), c = parseFloat(cintura);
  const imc = p > 0 && e > 0 ? p / (e * e) : null;

  const clasifIMC = (v) => {
    if (v < 18.5) return { t: "Bajo peso", cls: "bg-sky-100 text-sky-800 border-sky-200" };
    if (v < 25)   return { t: "Peso saludable", cls: "bg-emerald-100 text-emerald-800 border-emerald-200" };
    if (v < 30)   return { t: "Sobrepeso", cls: "bg-amber-100 text-amber-800 border-amber-200" };
    if (v < 35)   return { t: "Obesidad grado I", cls: "bg-orange-100 text-orange-800 border-orange-200" };
    if (v < 40)   return { t: "Obesidad grado II", cls: "bg-rose-100 text-rose-800 border-rose-200" };
    return { t: "Obesidad grado III", cls: "bg-red-100 text-red-800 border-red-200" };
  };

  const limiteCintura = sexo === "hombre" ? 90 : 80;
  const cinturaOk = c > 0 ? c <= limiteCintura : null;
  const meta = imc && imc >= 25 && p > 0 ? Math.round(p * 0.10 * 10) / 10 : null;
  const inputCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500";

  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-4">
      <h3 className="font-bold text-slate-800 flex items-center gap-2"><IScale cls="w-5 h-5 text-emerald-700" /> Conoce tu estado de nutrición</h3>
      <p className="text-xs text-slate-500 mt-1 mb-3">IMC = peso (kg) ÷ estatura × estatura (m). Clasificación por semáforo.</p>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">

          <input type="number" min="0" step="0.01" className={inputCls + " mt-1"} placeholder="Ej. 1.70" value={estatura} onChange={(ev) => setEstatura(ev.target.value)} />

            <option value="mujer">Mujer</option>

        </label>
      </div>

      {imc && (
        <div className="mt-4 grid sm:grid-cols-3 gap-3">
          <div className={"rounded-xl border p-3 text-center " + clasifIMC(imc).cls}>
            <div className="text-2xl font-extrabold">{(Math.round(imc * 10) / 10).toFixed(1)}</div>
            <div className="text-xs font-semibold mt-0.5">IMC · {clasifIMC(imc).t}</div>

          {cinturaOk !== null && (

              <div className="text-xs font-semibold mt-0.5">{cinturaOk ? "Cintura normal" : "Obesidad central"} (límite {limiteCintura} cm)</div>

            <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-3 text-center text-emerald-900">
              <div className="text-2xl font-extrabold">−{meta} kg</div>
              <div className="text-xs font-semibold mt-0.5">Meta saludable: 10% de tu peso en 6 meses</div>

        <span>🟢 Peso saludable: 18.5 – 24.9 kg/m²</span>

    </div>
  );
}

/* ---------- calculadora de porciones por comida ---------- */
function CalcPorciones({ avisar }) {
  const [comida, setComida] = useState("desayuno");
  const [extra, setExtra] = useState(false);
  const [sel, setSel] = useState({});

  const plan = PLAN_COMIDAS[comida];
  const porciones = useMemo(() => {
    const base = { ...plan.porciones };
    if (extra) {
      if (comida === "colacionV") base.fruta = (base.fruta || 0) + 1;
      if (comida === "comida") base.aoa = (base.aoa || 0) + 1;
      if (comida === "cena") base.cereal = (base.cereal || 0) + 1;
    }
    return base;
  }, [comida, extra]);

  const elegir = (grupo, idx) => setSel((s) => ({ ...s, [comida + "|" + grupo]: idx }));
  const sugerir = () => {
    const next = { ...sel };
    for (const g of Object.keys(porciones)) next[comida + "|" + g] = Math.floor(Math.random() * ALIMENTOS[g].length);
    setSel(next);
    avisar("Menú sugerido al azar 🍽️");
  };

  const totalPorc = Object.values(porciones).reduce((a, b) => a + b, 0);
  const selectCls = "w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white";

  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-4">
      <h3 className="font-bold text-slate-800 flex items-center gap-2"><IFood cls="w-5 h-5 text-emerald-700" /> ¿Cuántas porciones debo consumir en cada comida?</h3>
      <p className="text-xs text-slate-500 mt-1">Basado en un plan de 1,500 calorías al día para bajar de peso de forma segura. Elige el tiempo de comida y arma tu plato con la lista de intercambio.</p>

      <div className="flex gap-1.5 mt-3 overflow-x-auto pb-1">
        {Object.entries(PLAN_COMIDAS).map(([id, c]) => (
          <button key={id} onClick={() => setComida(id)}
            className={"px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition-colors " +
              (comida === id ? "bg-emerald-700 text-white border-emerald-700" : "bg-white text-slate-600 border-slate-300 hover:border-emerald-400")}>
            {c.emoji} {c.label}
          </button>
        ))}
      </div>

      <label className="flex items-start gap-2 mt-3 text-xs text-slate-600 cursor-pointer">
        <input type="checkbox" className="mt-0.5 accent-emerald-700" checked={extra} onChange={(e) => setExtra(e.target.checked)} />
        <span><b>Requerimiento mayor</b> (adolescentes, hombres o actividad física intensa): +1 fruta en la colación vespertina, +1 origen animal en la comida y +1 cereal en la cena.</span>
      </label>

      <div className="mt-4 flex items-center justify-between">
        <div className="text-sm font-semibold text-slate-700">{plan.emoji} {plan.label} · {totalPorc} {totalPorc === 1 ? "porción" : "porciones"}</div>
        <button onClick={sugerir} className="text-xs font-semibold bg-emerald-50 text-emerald-800 border border-emerald-200 rounded-full px-3 py-1.5 hover:bg-emerald-100 transition-colors">🎲 Sugerir menú</button>
      </div>

      <div className="mt-3 space-y-3">
        {Object.entries(porciones).map(([g, n]) => {
          const idx = sel[comida + "|" + g];
          const item = idx != null ? ALIMENTOS[g][idx] : null;
          return (
            <div key={g} className="rounded-xl border border-slate-200 p-3">
              <div className="flex items-center justify-between gap-2 mb-2">
                <span className="text-sm font-semibold text-slate-800">{GRUPOS[g].emoji} {GRUPOS[g].label}</span>
                <span className="text-xs font-bold bg-slate-100 text-slate-600 rounded-full px-2.5 py-1">{n} {n === 1 ? "porción" : "porciones"}</span>
              </div>
              <select className={selectCls} value={idx != null ? idx : ""} onChange={(e) => elegir(g, Number(e.target.value))}>
                <option value="" disabled>Elige un alimento de este grupo…</option>
                {ALIMENTOS[g].map((it, i) => (
                  <option key={it[0]} value={i}>{it[0]} — 1 ración = {fmtCantidad(it[1], it[2], 1)}</option>
                ))}
              </select>
              {item && (
                <div className="mt-2 text-sm bg-emerald-50 border border-emerald-100 text-emerald-900 rounded-lg px-3 py-2">
                  ✅ Come <b>{fmtCantidad(item[1], item[2], n)}</b> de <b>{item[0]}</b>{n > 1 && <span className="text-emerald-700"> ({n} × {fmtCantidad(item[1], item[2], 1)})</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="mt-4 text-xs text-slate-600 bg-amber-50 border border-amber-100 rounded-xl px-3 py-2.5">
        <b>Ejemplo de menú para {plan.label.toLowerCase()}:</b> {plan.ejemplo}
      </div>
      <p className="text-[11px] text-slate-400 mt-2">Si no tienes un alimento, sustitúyelo por otro del mismo grupo (ej. sin manzana, usa 1 taza de papaya). Acude con un profesional de la nutrición para un plan de alimentación personalizado.</p>
    </div>
  );
}
